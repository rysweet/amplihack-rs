name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify cxx-build pin
        run: |
          version=$(grep -A1 'name = "cxx-build"' Cargo.lock | grep version | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$version" != "1.0.138" ]; then
            echo "ERROR: cxx-build must be pinned to 1.0.138, found $version"
            echo "Run: cargo update -p cxx-build --precise 1.0.138"
            exit 1
          fi
      - name: Recipes — no bare python invocations (issue #248)
        run: scripts/check-recipes-no-python.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  install-smoke:
    name: Install Smoke Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install from local checkout
        run: cargo install --path bins/amplihack --locked
      - name: Verify binary
        run: |
          amplihack --version
          amplihack --help
          amplihack recipe list || true

  cross-compile:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            gnu_cross_toolchain: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            gnu_cross_toolchain: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
            gnu_cross_toolchain: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
            gnu_cross_toolchain: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install GNU cross toolchain
        if: matrix.gnu_cross_toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure GNU cross toolchain
        if: matrix.gnu_cross_toolchain
        run: |
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

      # Install cross when a target really needs the container image
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # Native build
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Cross build (Linux ARM64)
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amplihack-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/amplihack
            target/${{ matrix.target }}/release/amplihack-hooks
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, cross-compile]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package binaries
        run: |
          cd artifacts
          for dir in amplihack-*; do
            target="${dir#amplihack-}"
            mkdir -p "../dist/${dir}"
            find "$dir" -type f \( -name amplihack -o -name amplihack-hooks \) -exec cp {} "../dist/${dir}/" \;
            test -f "../dist/${dir}/amplihack"
            test -f "../dist/${dir}/amplihack-hooks"
            tar czf "../${dir}.tar.gz" -C "../dist/${dir}" .
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: amplihack-*.tar.gz
          generate_release_notes: true
