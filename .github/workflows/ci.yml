name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  cross-compile:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            gnu_cross_toolchain: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            gnu_cross_toolchain: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
            gnu_cross_toolchain: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
            gnu_cross_toolchain: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
            gnu_cross_toolchain: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install GNU cross toolchain
        if: matrix.gnu_cross_toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure GNU cross toolchain
        if: matrix.gnu_cross_toolchain
        run: |
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

      # Install cross when a target really needs the container image
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # Native build
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked --target "${{ matrix.target }}"

      # Cross build (Linux ARM64)
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amplihack-${{ matrix.target }}
          # Mixed .exe / no-.exe pattern: all four paths are listed regardless
          # of the target platform.  On Unix targets only the extensionless
          # binaries will exist; on the Windows (msvc) target only the .exe
          # variants will exist.  `if-no-files-found: error` ensures at least
          # one of each pair is present, catching a build failure before upload.
          # CODE-12.
          path: |
            target/${{ matrix.target }}/release/amplihack
            target/${{ matrix.target }}/release/amplihack.exe
            target/${{ matrix.target }}/release/amplihack-hooks
            target/${{ matrix.target }}/release/amplihack-hooks.exe
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, cross-compile]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package binaries
        shell: bash
        run: |
          cd artifacts
          for dir in amplihack-*; do
            mkdir -p "../dist/${dir}"
            find "$dir" -type f \( -name amplihack -o -name "amplihack.exe" -o -name amplihack-hooks -o -name "amplihack-hooks.exe" \) -exec cp {} "../dist/${dir}/" \;
            tar czf "../${dir}.tar.gz" -C "../dist/${dir}" .
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da5edbb5e75588e9e88601b4e2e3e74e6e229e0a # v2.1.0
        with:
          files: amplihack-*.tar.gz
          generate_release_notes: true
