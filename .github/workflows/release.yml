name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Auto-bump patch version on every push to main ─────────────────────
  version-bump:
    name: Auto-bump version
    runs-on: ubuntu-latest
    # Prevent infinite loop: skip if this push is already a version-bump commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          set -euo pipefail

          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Current version: ${CURRENT}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"

          # Find latest release tag to determine next patch
          LATEST_TAG=$(gh release list --limit 50 --json tagName --jq '.[].tagName' \
            | grep -E "^v${MAJOR}\.${MINOR}\.[0-9]+$" \
            | sort -t. -k3 -n -r \
            | head -1 || true)

          if [ -n "${LATEST_TAG}" ]; then
            LATEST_PATCH=$(echo "${LATEST_TAG}" | sed "s/^v${MAJOR}\.${MINOR}\.\([0-9]*\)/\1/")
            NEW_PATCH=$((LATEST_PATCH + 1))
            echo "Latest release: ${LATEST_TAG} → next patch: ${NEW_PATCH}"
          else
            NEW_PATCH="${PATCH}"
            echo "No prior v${MAJOR}.${MINOR}.x release found"
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          if [ "${NEW_VERSION}" = "${CURRENT}" ]; then
            echo "Version already at ${CURRENT} — no bump needed"
            echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Bumping: ${CURRENT} → ${NEW_VERSION}"

          # Escape dots in the version strings so sed treats them as literal
          # characters rather than the regex "match any char" operator. SEC-M4.
          CURRENT_ESCAPED=$(echo "${CURRENT}" | sed 's/\./\\./g')
          NEW_VERSION_ESCAPED=$(echo "${NEW_VERSION}" | sed 's/\./\\./g')

          # Update Cargo.toml workspace version
          sed -i "s/^version = \"${CURRENT_ESCAPED}\"/version = \"${NEW_VERSION_ESCAPED}\"/" Cargo.toml

          # Regenerate lockfile
          cargo generate-lockfile 2>/dev/null || true

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: auto-bump version ${CURRENT} → ${NEW_VERSION} [skip ci]"
          git push

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Build release binaries ────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: version-bump
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            gnu_cross_toolchain: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            gnu_cross_toolchain: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            gnu_cross_toolchain: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            gnu_cross_toolchain: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            gnu_cross_toolchain: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install GNU cross toolchain
        if: matrix.gnu_cross_toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

      - name: Build release
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/amplihack" dist/ 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/amplihack.exe" dist/ 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/amplihack-hooks" dist/ 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/amplihack-hooks.exe" dist/ 2>/dev/null || true
          cd dist && tar czf "../amplihack-${{ matrix.target }}.tar.gz" *
          cd .. && sha256sum "amplihack-${{ matrix.target }}.tar.gz" > "amplihack-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: amplihack-${{ matrix.target }}
          path: |
            amplihack-${{ matrix.target }}.tar.gz
            amplihack-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: [version-bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -name '*.sha256' -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Verify asset count
        # 5 targets × 2 files each (.tar.gz + .sha256) = 10 files expected.
        # Fail fast if any artifact is missing rather than silently uploading
        # an incomplete release.
        run: |
          EXPECTED=10  # 5 targets × 2 files each (.tar.gz + .sha256) = 10
          ACTUAL=$(ls release-assets/ | wc -l)
          if [ "${ACTUAL}" -ne "${EXPECTED}" ]; then
            echo "ERROR: expected ${EXPECTED} release assets, found ${ACTUAL}"
            ls -la release-assets/
            exit 1
          fi
          echo "Asset count OK: ${ACTUAL} files"

      - name: Create tag and release
        run: |
          TAG="v${{ needs.version-bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}" "${{ needs.version-bump.outputs.sha }}" || true
          git push origin "${TAG}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da5edbb5e75588e9e88601b4e2e3e74e6e229e0a # v2.1.0
        with:
          tag_name: v${{ needs.version-bump.outputs.version }}
          name: "amplihack-rs v${{ needs.version-bump.outputs.version }}"
          files: |
            release-assets/amplihack-x86_64-unknown-linux-gnu.tar.gz
            release-assets/amplihack-x86_64-unknown-linux-gnu.tar.gz.sha256
            release-assets/amplihack-aarch64-unknown-linux-gnu.tar.gz
            release-assets/amplihack-aarch64-unknown-linux-gnu.tar.gz.sha256
            release-assets/amplihack-x86_64-apple-darwin.tar.gz
            release-assets/amplihack-x86_64-apple-darwin.tar.gz.sha256
            release-assets/amplihack-aarch64-apple-darwin.tar.gz
            release-assets/amplihack-aarch64-apple-darwin.tar.gz.sha256
            release-assets/amplihack-x86_64-pc-windows-msvc.tar.gz
            release-assets/amplihack-x86_64-pc-windows-msvc.tar.gz.sha256
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            # Linux x86_64
            curl -fsSL https://github.com/rysweet/amplihack-rs/releases/download/v${{ needs.version-bump.outputs.version }}/amplihack-x86_64-unknown-linux-gnu.tar.gz | tar xz -C ~/.local/bin/

            # Linux ARM64
            curl -fsSL https://github.com/rysweet/amplihack-rs/releases/download/v${{ needs.version-bump.outputs.version }}/amplihack-aarch64-unknown-linux-gnu.tar.gz | tar xz -C ~/.local/bin/

            # macOS ARM64 (Apple Silicon)
            curl -fsSL https://github.com/rysweet/amplihack-rs/releases/download/v${{ needs.version-bump.outputs.version }}/amplihack-aarch64-apple-darwin.tar.gz | tar xz -C ~/.local/bin/
            ```

            Or: `amplihack update`
