name: "consensus-issue-worktree"
description: "Phase 2: issue creation + worktree/branch setup (steps 2-3)"
version: "1.0.0"
author: "Amplihack Team"
tags: ["consensus", "prep", "issue", "worktree"]

# consensus-issue-worktree: extracted from consensus-workflow.yaml as a composable phase brick.
#
# Preserves every original step verbatim — every debate round, every panel
# perspective, every consensus gate. The user's design constraint: the LLM
# converges on correct behaviour through many recursive review layers, so
# no layer may be silently dropped. Context flows in from the parent
# consensus-workflow context via _execute_sub_recipe()'s automatic merging;
# outputs propagate back to the parent for subsequent phase recipes.

recursion:
  max_depth: 6
  max_total_steps: 100

context: {}

steps:
  - id: "step2-create-issue"
    type: "bash"
    command: |
      # Create GitHub issue from consensus requirements
      echo "Creating GitHub issue for: $TASK_DESCRIPTION"

      # FIX (#311): Use env vars — safe against injection and word-splitting.
      _TASK_DESC="$TASK_DESCRIPTION"
      _REQS_EXPLICIT="$FINAL_REQUIREMENTS_EXPLICIT_REQUIREMENTS"
      _REQS_SUCCESS="$FINAL_REQUIREMENTS_SUCCESS_CRITERIA"
      _REQS_CONSTRAINTS="$FINAL_REQUIREMENTS_CONSTRAINTS"
      _REQS_MECHANISM="$FINAL_REQUIREMENTS_CONSENSUS_MECHANISM_USED"
      _REQS_AGENTS="$FINAL_REQUIREMENTS_AGENTS_INVOLVED"
      _REQS_CONFIDENCE="$FINAL_REQUIREMENTS_CONFIDENCE_LEVEL"
      _CRITICALITY="$CRITICALITY"
      # NOTE: Unquoted heredoc — $VAR expansion runs with invoking user's privileges (no escalation).
      ISSUE_BODY=$(cat <<ISSUE_EOF
      ## Task Description
      $_TASK_DESC

      ## Requirements (Consensus-Validated)
      $_REQS_EXPLICIT

      ## Success Criteria
      $_REQS_SUCCESS

      ## Constraints
      $_REQS_CONSTRAINTS

      ## Consensus Process
      - Mechanism Used: $_REQS_MECHANISM
      - Agents Involved: $_REQS_AGENTS
      - Confidence: $_REQS_CONFIDENCE

      ---
      Labels: consensus-validated, $_CRITICALITY
      ISSUE_EOF
      )

      # Create issue (truncate title to 200 chars)
      ISSUE_TITLE=$(printf '%s' "$_TASK_DESC" | tr '\n\r' ' ' | cut -c1-200)
      gh issue create \
        --title "$ISSUE_TITLE" \
        --body "$ISSUE_BODY" \
        --label "consensus,$_CRITICALITY" 2>/dev/null || echo "Issue creation skipped (no gh CLI or not in repo)"

      echo '{"issue_created": true, "step": "step2-create-issue"}'
    output: "issue_creation"
    parse_json: true

  # ============================================================================
  # STEP 3: SETUP WORKTREE AND BRANCH
  # ============================================================================

  - id: "step3-setup-worktree"
    agent: "amplihack:worktree-manager"
    working_dir: "{{worktree_setup.worktree_path}}"
    prompt: |
      Setup git worktree and branch for isolated development:

      **Task:** {{task_description}}
      **Issue:** {{issue_number}}
      **Requirements:** {{final_requirements}}
      **Worktree Directory:** {{worktree_dir}}

      Create worktree setup:
      1. Branch name format: `feat/issue-{number}-{brief-description}` or `feat/{brief-description}`
      2. Create worktree in `{{worktree_dir}}/{branch-name}`
      3. Push branch to remote with tracking

      Commands to execute:
      ```bash
      # NOTE: This pipeline mirrors default-workflow.yaml step-04-setup-worktree with a
      # 30-char limit (vs 50). Keep both in sync on security patches. See Issue #2952.
      # FIX (issue #3041): Use heredoc instead of single-quote wrapping.

      # ========================================================================
      # MIRROR (#342): Existing-branch / PR targeting path.
      # When EXISTING_BRANCH or PR_NUMBER is set, reuse the named branch instead
      # of deriving a slug. EXISTING_BRANCH wins on tie (WARNING to stderr).
      # Keep in sync with default-workflow.yaml step-04-setup-worktree.
      # ========================================================================
      EXISTING_BRANCH="${EXISTING_BRANCH:-}"
      PR_NUMBER="${PR_NUMBER:-}"
      if [ -n "$EXISTING_BRANCH" ] || [ -n "$PR_NUMBER" ]; then
        if [ -n "$EXISTING_BRANCH" ] && [ -n "$PR_NUMBER" ]; then
          echo "WARNING: both 'existing_branch' and 'pr_number' set — using existing_branch ('$EXISTING_BRANCH'), ignoring pr_number ('$PR_NUMBER')." >&2
        fi
        if [ -n "$EXISTING_BRANCH" ]; then
          BRANCH_NAME="$EXISTING_BRANCH"
        else
          # SECURITY: PR_NUMBER must be a positive integer before passing to gh.
          if ! [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "ERROR: pr_number '$PR_NUMBER' is not a valid positive integer (arg-injection guard)." >&2
            exit 1
          fi
          if ! command -v gh >/dev/null 2>&1; then
            echo "ERROR: pr_number is set but the 'gh' CLI is not on PATH." >&2
            exit 1
          fi
          BRANCH_NAME="$(gh pr view "$PR_NUMBER" --json headRefName -q .headRefName 2>/dev/null || true)"
          if [ -z "$BRANCH_NAME" ]; then
            echo "ERROR: 'gh pr view $PR_NUMBER' returned no branch name." >&2
            exit 1
          fi
        fi
        # SECURITY: validate (or re-validate) branch name via authoritative checker.
        if ! git check-ref-format --branch "$BRANCH_NAME" >/dev/null 2>&1; then
          echo "ERROR: branch name '$BRANCH_NAME' is invalid (git check-ref-format rejection)." >&2
          exit 1
        fi
        echo "INFO: Targeting existing branch '$BRANCH_NAME' (issue #342 path)." >&2
        git fetch origin "+refs/heads/${BRANCH_NAME}:refs/remotes/origin/${BRANCH_NAME}" >&2 2>/dev/null || true
        WORKTREE_PATH="$WORKTREE_DIR/$BRANCH_NAME"
        EXISTING_WT="$(git worktree list --porcelain | awk -v b="refs/heads/$BRANCH_NAME" '
          $1=="worktree" { wt=$2 }
          $1=="branch" && $2==b { print wt; exit }
        ')"
        if [ -n "$EXISTING_WT" ]; then
          WORKTREE_PATH="$EXISTING_WT"
        elif [ "$(git symbolic-ref --short HEAD 2>/dev/null || true)" = "$BRANCH_NAME" ]; then
          WORKTREE_PATH="$(pwd)"
        elif git show-ref --verify --quiet "refs/heads/$BRANCH_NAME"; then
          git worktree add -- "$WORKTREE_PATH" "$BRANCH_NAME" >&2
        elif git show-ref --verify --quiet "refs/remotes/origin/$BRANCH_NAME"; then
          git worktree add --track -b "$BRANCH_NAME" -- "$WORKTREE_PATH" "origin/$BRANCH_NAME" >&2
        else
          echo "ERROR: branch '$BRANCH_NAME' not found locally or on origin." >&2
          exit 1
        fi
        printf '{"branch_name": "%s", "worktree_path": "%s", "commands_executed": ["existing-branch path #342"], "setup_complete": true}\n' \
          "$BRANCH_NAME" "$WORKTREE_PATH"
        exit 0
      fi

      # --- Bootstrap detection (same pattern as #3603 fix in default-workflow) ---
      # Detect whether origin remote and origin/main exist. New repos (first commit,
      # no remote, or empty remote) must not crash on git fetch / git push.
      HAS_ORIGIN=false
      HAS_ORIGIN_MAIN=false
      if git remote get-url origin >/dev/null 2>&1; then
        HAS_ORIGIN=true
        if git ls-remote --exit-code origin refs/heads/main >/dev/null 2>&1; then
          HAS_ORIGIN_MAIN=true
          BASE_REF="origin/main"
        else
          echo "BOOTSTRAP: origin exists but has no 'main' branch — using HEAD as base" >&2
          BASE_REF="HEAD"
        fi
      else
        echo "BOOTSTRAP: no origin remote configured — running in bootstrap mode" >&2
        BASE_REF="HEAD"
      fi

      # FIX (#469/#311): Use env var — safe against injection and word-splitting.
      TASK_DESC="$TASK_DESCRIPTION"
      TASK_SLUG=$(printf '%s' "$TASK_DESC" | tr '\n\r' '  ' | tr '[:upper:] ' '[:lower:]-' | tr -cd 'a-z0-9-' | sed 's/-\{2,\}/-/g;s/^-//;s/-$//' | cut -c1-30 | sed 's/-$//')
      # Guard: empty slug (blank/all-symbol input) produces a trailing-hyphen branch that
      # git check-ref-format accepts as valid but is undesirable. Catch it explicitly first.
      if [ -z "$TASK_SLUG" ]; then
        echo "WARNING: task_description produced an empty slug — falling back to task-unnamed" >&2
        BRANCH_NAME="feat/task-unnamed-$(date +%s)"
      else
        BRANCH_NAME="feat/consensus-${TASK_SLUG}"
        if ! git check-ref-format --branch "${BRANCH_NAME}" >/dev/null 2>&1; then
          echo "WARNING: derived branch name '${BRANCH_NAME}' is invalid — falling back to task-unnamed" >&2
          BRANCH_NAME="feat/task-unnamed-$(date +%s)"
        fi
      fi

      # Create worktree
      # --- Bootstrap detection (BL-003 / issue #3603) ---
      # Mirror default-workflow bootstrap logic: detect missing origin/main
      # and fall back to HEAD with visible messaging.
      # Guard: HEAD must resolve — a zero-commit repo cannot be used as a base ref.
      if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
        echo "ERROR: No commits in repository — create an initial commit before running the workflow." >&2
        exit 1
      fi
      BOOTSTRAP=false
      BASE_REF="HEAD"
      if ! git remote get-url origin >/dev/null 2>&1; then
        echo "BOOTSTRAP: No 'origin' remote — creating worktree from HEAD." >&2
        BOOTSTRAP=true
      else
        LS_EXIT=0
        git ls-remote --exit-code origin refs/heads/main >/dev/null 2>&1 || LS_EXIT=$?
        if [ "$LS_EXIT" -eq 2 ]; then
          echo "BOOTSTRAP: origin exists but refs/heads/main not found — creating worktree from HEAD." >&2
          BOOTSTRAP=true
        elif [ "$LS_EXIT" -ne 0 ]; then
          echo "ERROR: git ls-remote failed (exit $LS_EXIT) — possible network error." >&2
          exit 1
        else
          BASE_REF="origin/main"
          git fetch origin main >&2
        fi
      fi

      # Idempotency guard (mirrors default-workflow three-state check)
      WORKTREE_PATH="$WORKTREE_DIR/$BRANCH_NAME"
      BRANCH_EXISTS=$(git branch --list "$BRANCH_NAME")
      WORKTREE_EXISTS=$(git worktree list --porcelain | grep -Fx "worktree $WORKTREE_PATH" || true)

      if [ -n "$BRANCH_EXISTS" ] && [ -n "$WORKTREE_EXISTS" ]; then
        # FIX (issue #200): Verify branch cleanliness before reusing.
        WORKTREE_DIRTY=$(git -C "$WORKTREE_PATH" status --porcelain 2>/dev/null || true)
        COMMITS_AHEAD=$(git -C "$WORKTREE_PATH" rev-list --count origin/main..HEAD 2>/dev/null || echo "0")
        if [ -n "$WORKTREE_DIRTY" ] || [ "$COMMITS_AHEAD" -gt 0 ]; then
          echo "WARNING: Existing branch '$BRANCH_NAME' is dirty — resetting to origin/main." >&2
          git -C "$WORKTREE_PATH" checkout -- . 2>/dev/null || true
          git -C "$WORKTREE_PATH" clean -fd 2>/dev/null || true
          git -C "$WORKTREE_PATH" reset --hard origin/main >&2
        else
          echo "INFO: Branch '$BRANCH_NAME' and worktree already exist and are clean — reusing." >&2
        fi
      elif [ -n "$BRANCH_EXISTS" ] && [ -z "$WORKTREE_EXISTS" ]; then
        # FIX (issue #200): Check for unmerged commits before reattaching.
        COMMITS_AHEAD=$(git rev-list --count origin/main.."$BRANCH_NAME" 2>/dev/null || echo "0")
        if [ "$COMMITS_AHEAD" -gt 0 ]; then
          echo "WARNING: Existing branch '$BRANCH_NAME' has unmerged commits — resetting." >&2
          git branch -D "$BRANCH_NAME" >&2
          git worktree add "$WORKTREE_PATH" -b "$BRANCH_NAME" "$BASE_REF"
        else
          echo "INFO: Branch '$BRANCH_NAME' exists (clean) but worktree missing — adding without -b." >&2
          git worktree add "$WORKTREE_PATH" "$BRANCH_NAME"
        fi
      else
        git worktree add "$WORKTREE_PATH" -b "$BRANCH_NAME" "$BASE_REF"
      fi

      # Push with tracking (bootstrap-aware)
      cd "$WORKTREE_PATH"
      if [ "$BOOTSTRAP" = "true" ]; then
        echo "BOOTSTRAP: Skipping push — no remote main branch available." >&2
      else
        git push -u origin "$BRANCH_NAME" > /dev/null 2>&1 || \
          echo "WARNING: Initial push of '$BRANCH_NAME' failed — will retry at PR creation." >&2
      fi
      ```

      Return setup details as JSON:
      ```json
      {
        "branch_name": "the branch name created",
        "worktree_path": "full path to worktree",
        "commands_executed": ["list of git commands"],
        "setup_complete": true/false
      }
      ```
    output: "worktree_setup"
    parse_json: true

  # ============================================================================
  # STEP 4: RESEARCH AND DESIGN WITH TDD (ALWAYS CONSENSUS)
  # MANDATORY CONSENSUS TRIGGER: Design decisions have long-term architectural impact
  # ============================================================================

  # ---------------------------------------------------------------------------
  # CONSENSUS GATE 2: Multi-Agent Debate for Architecture (MANDATORY)
  # Deploy 5 agents in parallel: architect, api-designer, database, security, tester
  # ---------------------------------------------------------------------------

