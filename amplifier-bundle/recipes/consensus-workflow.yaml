name: "consensus-workflow"
description: "Composable 15-step consensus workflow — orchestrates 10 phase sub-recipes with 7 consensus gates"
version: "3.0.0"
author: "Amplihack Team"
tags: ["consensus", "quality", "multi-agent", "critical", "validation", "debate", "n-version", "expert-panel", "composable"]

# CONSENSUS_WORKFLOW (v3): Composable Phase Sub-Recipes
#
# Same 15-step / 7-consensus-gate contract as v2, but the steps live in ten
# focused phase bricks. Every debate round, panel perspective, and consensus
# gate is preserved verbatim — the LLM converges on correct behaviour through
# many recursive review layers, so every layer must stay intact.
#
# Phases (each is a sub-recipe in amplifier-bundle/recipes/):
#   1.  consensus-prep             — preflight + 3-round requirements debate
#   2.  consensus-issue-worktree   — create issue + worktree
#   3.  consensus-design           — 3-round design debate (5 perspectives)
#   4.  consensus-tdd-impl         — tests + standard impl + N-version vote
#   5.  consensus-panel-cleanup    — 4-perspective refactor panel
#   6.  consensus-test-fix         — tests + fix + local validate
#   7.  consensus-publish          — commit + create PR
#   8.  consensus-pr-review        — 5-perspective PR review panel
#   9.  consensus-pr-feedback      — feedback + 4-perspective philosophy panel
#   10. consensus-merge-finalize   — CI + mergeable + final-quality panel

recursion:
  max_depth: 6
  max_total_steps: 100

context:
  task_description: ""
  requirements: ""
  repo_path: "."
  branch_prefix: "feat"
  workstream: ""
  issue_number: ""
  branch_name: ""
  worktree_dir: "./worktrees"
  output_dir: "./ai_working/consensus"
  requirements_debate: ""
  n_version_implementations: ""
  refined_implementation: ""

steps:
  - id: "consensus-preflight"
    type: "recipe"
    recipe: "consensus-preflight"

  - id: "consensus-requirements-debate"
    type: "recipe"
    recipe: "consensus-requirements-debate"

  - id: "consensus-issue-worktree"
    type: "recipe"
    recipe: "consensus-issue-worktree"

  - id: "consensus-design"
    type: "recipe"
    recipe: "consensus-design"

  - id: "consensus-tdd-impl"
    type: "recipe"
    recipe: "consensus-tdd-impl"

  - id: "consensus-panel-cleanup"
    type: "recipe"
    recipe: "consensus-panel-cleanup"

  - id: "consensus-test-fix"
    type: "recipe"
    recipe: "consensus-test-fix"

  - id: "consensus-publish"
    type: "recipe"
    recipe: "consensus-publish"

  - id: "consensus-pr-review"
    type: "recipe"
    recipe: "consensus-pr-review"

  - id: "consensus-pr-feedback"
    type: "recipe"
    recipe: "consensus-pr-feedback"

  - id: "consensus-merge-finalize"
    type: "recipe"
    recipe: "consensus-merge-finalize"
