name: "default-workflow"
description: "Composable 23-step development workflow — orchestrates 9 phase sub-recipes"
version: "3.0.0"
author: "Amplihack Team"
tags: ["development", "feature", "bugfix", "refactoring", "standard", "full-workflow", "composable"]

# DEFAULT_WORKFLOW (v3): Composable Phase Sub-Recipes
#
# Same 23-step contract as v2, but the steps live in nine focused phase bricks.
# Every original step ID, prompt, condition, output declaration, and ordering
# is preserved across the bricks — the LLM converges on correct behaviour
# through many recursive review layers, so every layer must stay intact.
#
# Phases (each is a sub-recipe in amplifier-bundle/recipes/):
#   1. workflow-prep             — steps 00-03b   (requirements + issue creation)
#   2. workflow-worktree         — step  04       (worktree + branch setup)
#   3. workflow-design           — steps 05-06d   (design specification)
#   4. workflow-tdd              — steps 07-08c   (tests + implementation)
#   5. workflow-refactor-review  — steps 09-11b   (refactor + reviews)
#   6. workflow-precommit-test   — steps 12-13    (pre-commit + tests)
#   7. workflow-publish          — steps 14-16b   (version + commit + PR)
#   8. workflow-pr-review        — steps 17a-19d  (PR review panels)
#   9. workflow-finalize         — steps 20-22b   (CI + merge + finalize)
#
# Context flows automatically between sub-recipes via recipe-runner's
# `_execute_sub_recipe()` context-merging.

recursion:
  max_depth: 6
  max_total_steps: 80

context:
  # Description of the task
  task_description: ""

  # Specific requirements (user-provided or empty)
  requirements: ""

  # Path to the repository
  repo_path: "."

  # Branch name prefix (default: feat)
  branch_prefix: "feat"

  # Issue #342: target an existing PR branch instead of deriving a new one.
  # When set, step-04-setup-worktree skips slug derivation and reuses the
  # named branch. Empty string => legacy behaviour (derive a new branch).
  # SECURITY: validated via `git check-ref-format --branch` before any use.
  existing_branch: ""

  # Issue #342: alternative to existing_branch — resolve a PR number to its
  # head branch via `gh pr view <N> --json headRefName -q .headRefName`.
  # Empty string => legacy behaviour. Must be a positive integer (regex-validated
  # before invoking gh; the gh response is re-validated through check-ref-format).
  # Precedence: if both are set, `existing_branch` wins and a WARNING is emitted.
  pr_number: ""

  # Workstream name for parallel workflows (optional)
  workstream: ""

  # Resume support: set to a checkpoint ID to skip steps already completed.
  resume_checkpoint: ""

  # Outputs populated during execution (propagated through phase sub-recipes)
  clarified_requirements: ""
  issue_number: ""
  branch_name: ""
  worktree_path: ""
  design_spec: ""
  documentation: ""
  test_spec: ""
  implementation: ""
  refactored_code: ""
  pre_commit_review: ""
  review_feedback: ""
  pr_url: ""
  pr_review: ""
  pr_security_review: ""
  pr_philosophy_review: ""
  blocking_issues_addressed: ""
  pr_feedback_changes: ""
  philosophy_check: ""
  final_cleanup: ""
  quality_audit_results: ""
  ci_status: ""

steps:
  - id: "workflow-prep"
    type: "recipe"
    recipe: "workflow-prep"

  - id: "workflow-worktree"
    type: "recipe"
    recipe: "workflow-worktree"

  - id: "workflow-design"
    type: "recipe"
    recipe: "workflow-design"

  - id: "workflow-tdd"
    type: "recipe"
    recipe: "workflow-tdd"

  - id: "workflow-refactor-review"
    type: "recipe"
    recipe: "workflow-refactor-review"

  - id: "workflow-precommit-test"
    type: "recipe"
    recipe: "workflow-precommit-test"

  - id: "workflow-publish"
    type: "recipe"
    recipe: "workflow-publish"

  - id: "workflow-pr-review"
    type: "recipe"
    recipe: "workflow-pr-review"

  - id: "workflow-finalize"
    type: "recipe"
    recipe: "workflow-finalize"
