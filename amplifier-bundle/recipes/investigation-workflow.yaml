name: "investigation-workflow"
description: "Composable investigation workflow — prep, explore, verify, report via 4 phase sub-recipes"
version: "3.0.0"
author: "Amplihack Team"
tags: ["investigation","workflow","composable","explore","verify","report"]

# INVESTIGATION_WORKFLOW (v3): Composable Phase Sub-Recipes
#
#   1. investigation-prep      — preflight + question + tracking + scope + clarify
#   2. investigation-explore   — exploration strategy + past-check + historical + deep-dives
#   3. investigation-verify    — hypotheses + verification + patterns + synthesis
#   4. investigation-report    — discoveries + report + transition + efficiency + final-output
#
# Context flows automatically between sub-recipes.

context:
  # The main question to investigate
  investigation_question: ""
context_validation:
  task_description: "nonempty"
  repo_path: "git_repo"

  # Path to focus investigation on (optional)
  codebase_path: ""

  # Investigation type determines agent selection:
  # - code: analyzer + patterns (default)
  # - architecture: architect + api-designer
  # - performance: optimizer + analyzer
  # - security: security + patterns
  # - integration: integration + database
  investigation_type: "code"

  # Investigation depth: surface, standard, deep
  depth: "standard"

  # Output directory for findings
  output_dir: "./ai_working/investigation"

  # Knowledge file paths
  discoveries_path: ".claude/context/DISCOVERIES.md"
  patterns_path: ".claude/context/PATTERNS.md"

  # Efficiency tracking (internal)
  _start_time: ""
  _message_count: 0

steps:
  - id: "investigation-prep"
    type: "recipe"
    recipe: "investigation-prep"

  - id: "investigation-explore"
    type: "recipe"
    recipe: "investigation-explore"

  - id: "investigation-verify"
    type: "recipe"
    recipe: "investigation-verify"

  - id: "investigation-report"
    type: "recipe"
    recipe: "investigation-report"
