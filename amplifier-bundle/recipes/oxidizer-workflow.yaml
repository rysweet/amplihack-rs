      **ZERO TOLERANCE POLICY**: Convergence means 100% parity. Nothing less.

      **Current Parity:** {{parity_percentage}}%
      **Target Parity:** {{parity_target}}%
      **Iteration:** {{iteration_number}} of {{max_iterations}}
      **Scorecard:** {{scorecard}}
      **Latest Comparison:** {{comparison_result}}
      **Silent Degradation Findings:** {{silent_degradation_result}}
      **Allow Partial:** {{allow_partial_convergence}}

      Evaluation rules:
      1. Parity is EXACTLY 100% AND zero silent degradation findings → CONVERGED
      2. Any remaining gaps, failing tests, or degradation findings → NOT_CONVERGED
      3. max_iterations reached BUT parity < 100% → NOT_CONVERGED (keep going,
         raise max_iterations if needed — we do NOT accept partial results)

      For NOT_CONVERGED, identify the SPECIFIC gaps remaining and what must be
      done in the next iteration to close them.

      **Output as JSON**:
      ```json
      {
        "convergence_status": "CONVERGED" | "NOT_CONVERGED",
        "parity_percentage": N,
        "remaining_modules": [...],
        "remaining_gaps": ["specific gap description"],
        "silent_degradation_clear": true/false,
        "quality_audit_clear": true/false,
        "recommendation": "specific action for next iteration",
        "iteration_number": N
