name: "pr-merge-ready-loop"
description: "Drive a single PR to merge-ready state per .copilot/skills/merge-ready criteria, then merge."
version: "0.1.0"
author: "Simard Rebuild"
tags: ["merge-ready", "pr-automation", "loop", "qa-team", "quality-audit"]

# PR MERGE-READY LOOP
#
# Encodes the merge-ready skill workflow as a recipe so the work can be
# repeated mechanically across many PRs without manual orchestration.
#
# For a single PR, the recipe:
#   1. Gathers PR context (state, CI checks, changed files, description)
#   2. Runs mechanical autofixes for common CI failures (rustfmt, clippy fix)
#   3. Re-pushes and waits for CI
#   4. Dispatches an agent step (merge-ready skill) to satisfy the
#      qa-team / docs / quality-audit / PR-description criteria
#   5. Re-checks; merges with --squash if all criteria pass, otherwise
#      writes a blocker comment summarising what remains
#
# Driver (run once per PR):
#   amplihack recipe run amplifier-bundle/recipes/pr-merge-ready-loop.yaml \
#     -c pr_repo=rysweet/Simard \
#     -c pr_number=1271 \
#     -c repo_path=/home/azureuser/src/Simard \
#     -c branch_name=feat/recipe-ooda-phase3-types

context:
  pr_repo: ""
  pr_number: ""
  repo_path: "."
  branch_name: ""
  # When "1", the merge command is skipped (gather + report only)
  dry_run: "0"
  # Where to dump per-step JSON evidence
  state_root: "/tmp/pr-merge-ready-{{pr_number}}"

steps:
  # --- 1. Gather PR context ---
  - id: gather-context
    type: bash
    command: |
      set -euo pipefail
      mkdir -p "{{state_root}}"
      cd "{{repo_path}}"

      gh pr view "{{pr_number}}" --repo "{{pr_repo}}" \
        --json number,title,url,body,headRefName,mergeable,mergeStateStatus,statusCheckRollup,files \
        > "{{state_root}}/pr.json"

      echo "[merge-ready] PR #{{pr_number}}: $(jq -r .title "{{state_root}}/pr.json")"
      echo "[merge-ready] mergeStateStatus: $(jq -r .mergeStateStatus "{{state_root}}/pr.json")"
      echo "[merge-ready] checks:"
      jq -r '.statusCheckRollup[] | "  - \(.conclusion // .status)\t\(.name)"' "{{state_root}}/pr.json"
    on_error: fail

  # --- 2. Mechanical autofix for common CI failures ---
  # IMPORTANT: only formats files already in the PR diff to avoid pulling
  # unrelated changes (e.g. modified .github/hooks/* from running sessions)
  # into the PR — that would violate criterion 6 (clean diff scope).
  - id: autofix-mechanical
    type: bash
    command: |
      set -euo pipefail
      cd "{{repo_path}}"

      CURRENT=$(git rev-parse --abbrev-ref HEAD)
      if [ "$CURRENT" != "{{branch_name}}" ]; then
        git fetch origin "{{branch_name}}" 2>&1 | tail -2 || true
        git checkout "{{branch_name}}" 2>&1 | tail -2
      fi
      git pull --no-rebase 2>&1 | tail -2 || true

      # Stash unrelated working-tree changes so autofix can't sweep them in
      STASHED=0
      if ! git diff --quiet || [ -n "$(git status --porcelain)" ]; then
        git stash push -u -m "merge-ready autofix stash" 2>&1 | tail -2
        STASHED=1
      fi

      CHANGED=0
      if [ -f Cargo.toml ]; then
        # Only format files that are part of the PR diff
        PR_FILES=$(git diff --name-only origin/main...HEAD | grep -E '\.rs$' || true)
        if [ -n "$PR_FILES" ]; then
          echo "[merge-ready] running rustfmt on PR-only files:"
          echo "$PR_FILES" | sed 's/^/  /'
          echo "$PR_FILES" | xargs -r rustfmt --edition 2021 2>&1 | tail -5 || true
          if ! git diff --quiet -- $PR_FILES; then
            git add -- $PR_FILES
            git commit --no-verify -m "style: cargo fmt (merge-ready autofix)" \
              -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            CHANGED=1
          fi
        fi
      fi

      if [ "$CHANGED" -eq 1 ]; then
        git push --no-verify 2>&1 | tail -3
        echo '{"autofix_applied": true}' > "{{state_root}}/autofix.json"
      else
        echo '{"autofix_applied": false}' > "{{state_root}}/autofix.json"
      fi

      # Restore stashed unrelated changes
      if [ "$STASHED" -eq 1 ]; then
        git stash pop 2>&1 | tail -2 || true
      fi
    on_error: fail

  # --- 3. Re-gather CI state after autofix push ---
  - id: recheck-ci
    type: bash
    command: |
      set -euo pipefail
      # Brief wait for GH to register the new push
      sleep 8
      gh pr view "{{pr_number}}" --repo "{{pr_repo}}" \
        --json mergeable,mergeStateStatus,statusCheckRollup \
        > "{{state_root}}/pr_postfix.json"

      FAILS=$(jq '[.statusCheckRollup[] | select(.conclusion == "FAILURE")] | length' \
        "{{state_root}}/pr_postfix.json")
      RUNNING=$(jq '[.statusCheckRollup[] | select(.status == "IN_PROGRESS" or .status == "QUEUED")] | length' \
        "{{state_root}}/pr_postfix.json")
      echo "[merge-ready] post-autofix: $FAILS failures, $RUNNING in-progress"
      jq -n --arg fails "$FAILS" --arg running "$RUNNING" \
        '{ci_failures: ($fails | tonumber), ci_in_progress: ($running | tonumber)}' \
        > "{{state_root}}/ci_state.json"
    on_error: fail

  # --- 4. Dispatch agent to satisfy non-mechanical merge-ready criteria ---
  - id: drive-merge-ready
    type: agent
    prompt: |
      You are running merge-ready criteria checks for PR #{{pr_number}}
      in repository {{pr_repo}}.

      Working directory: {{repo_path}}
      PR branch: {{branch_name}}
      Evidence directory: {{state_root}}

      Read {{state_root}}/pr.json, {{state_root}}/pr_postfix.json, and
      {{state_root}}/ci_state.json for current state.

      Drive this PR to satisfy ALL six merge-ready criteria:

        1. qa-team scenarios — written or updated, validated with
           `gadugi-test validate`, and run with `gadugi-test run`.
           If gadugi-test is unavailable on this host, document that
           as a gap (do not silently downgrade).
        2. Docs updated for any user-facing surface change (CLI, API,
           config, deployment). For internal-only changes, list the
           changed surfaces reviewed and explain why each is internal.
        3. quality-audit ≥3 SEEK→VALIDATE→FIX cycles, ending on a
           clean final cycle (0 critical/high findings). Use the
           quality-audit skill or invoke quality-audit-cycle recipe.
        4. CI green with 0 failures (check via `gh pr checks`).
        5. PR description contains concrete evidence for criteria 1-4
           and 6. Update the PR body via `gh pr edit --body-file`.
        6. Diff scope clean — only contains changes related to the
           stated PR purpose (no incidental file modifications).

      For each gap, fix it directly:
        - mechanical (lint, format, test fix) → fix and push
        - missing scenarios → author them, validate, run
        - missing docs → write them and link from PR description
        - missing audit → run quality-audit on the diff
        - unrelated changes → revert from this branch

      Then update the PR description with a "Merge-Ready Evidence"
      section. Use this template:

        ## Merge-Ready Evidence

        - **qa-team:** <scenario file paths + validate/run output summary>
        - **docs:** <doc file paths> OR <"n/a — internal change. Surfaces reviewed: ...">
        - **quality-audit:** <N cycles run, final clean? findings link>
        - **CI:** <pass/fail summary, link to latest run>
        - **diff scope:** <"clean" or list of unrelated changes removed>

      ALWAYS write a JSON verdict to {{state_root}}/merge_ready_verdict.json
      before exiting, even if you couldn't address all gaps. Use this
      structure (use "blocked: <reason>" when a tool/access is missing):

        {
          "ready": true|false,
          "criteria": {
            "qa_team":        "satisfied|blocked: <reason>|gap: <description>",
            "docs":           "satisfied|n/a: <reason>|gap: <description>",
            "quality_audit":  "satisfied: <cycles> cycles, final clean|gap: <description>",
            "ci":             "green|failures: <count>|in_progress: <count>",
            "pr_description": "updated|gap: <description>",
            "diff_scope":     "clean|gap: <description>"
          },
          "blocking_summary": "<one line; empty if ready>"
        }

      DO NOT merge the PR — verdict-and-merge handles that.
    on_error: continue

  # --- 5. Final verdict + conditional merge ---
  - id: verdict-and-merge
    type: bash
    command: |
      set -euo pipefail
      cd "{{repo_path}}"

      VERDICT="{{state_root}}/merge_ready_verdict.json"
      if [ ! -f "$VERDICT" ]; then
        # Agent did not produce a verdict → treat as blocked
        cat > "$VERDICT" <<EOF
      {
        "ready": false,
        "criteria": {
          "qa_team":        "blocked: agent step did not run",
          "docs":           "blocked: agent step did not run",
          "quality_audit":  "blocked: agent step did not run",
          "ci":             "see ci_state.json",
          "pr_description": "blocked: agent step did not run",
          "diff_scope":     "see autofix.json"
        },
        "blocking_summary": "drive-merge-ready agent step did not produce verdict file"
      }
      EOF
      fi

      cat "$VERDICT"
      READY=$(jq -r '.ready' "$VERDICT")
      BLOCK=$(jq -r '.blocking_summary' "$VERDICT")

      if [ "$READY" = "true" ]; then
        if [ "{{dry_run}}" = "1" ]; then
          echo "[merge-ready] PR #{{pr_number}} READY but dry_run=1; skipping merge"
        else
          echo "[merge-ready] PR #{{pr_number}} READY; merging (squash)"
          gh pr merge "{{pr_number}}" --repo "{{pr_repo}}" --squash --delete-branch
          echo "[merge-ready] merged"
        fi
      else
        echo "[merge-ready] PR #{{pr_number}} NOT READY: $BLOCK"
        BODY_FILE=$(mktemp)
        {
          echo "## Merge-Ready Verdict (automated)"
          echo
          echo "NOT READY — $BLOCK"
          echo
          echo '```json'
          cat "$VERDICT"
          echo '```'
        } > "$BODY_FILE"
        gh pr comment "{{pr_number}}" --repo "{{pr_repo}}" --body-file "$BODY_FILE"
        rm -f "$BODY_FILE"
        exit 1
      fi
    on_error: fail
