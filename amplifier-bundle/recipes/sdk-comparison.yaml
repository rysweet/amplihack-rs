# =============================================================================
# Trade-off: graceful skip for optional Python module (refs #248, #285)
# =============================================================================
#
# This recipe historically required the Python module
# `amplihack.eval.sdk_eval_loop` (a multi-SDK evaluation harness) to be
# importable. As part of the parity work for issues #248 and #285, the four
# eval steps below now perform a probe for the module and gracefully skip
# (with a clear `[skip]` warning to stderr and a fallback JSON payload to
# stdout) when it is not available, so the recipe always loads/parses and
# downstream steps can proceed.
#
# Why graceful skip instead of a native port:
#   - `amplihack.eval.sdk_eval_loop` is a multi-SDK evaluation harness whose
#     full port to native Rust would substantially exceed the scope of the
#     parity-cleanup tracked by #248 / #285.
#   - The skip path preserves the existing JSON contract (`{"sdk": "<name>",
#     "error": "..."}`), so the downstream `generate-comparison` step keeps
#     working — it simply receives an explicit "skipped" marker instead of
#     real eval data.
#   - Operators who do have the Python module installed see no behaviour
#     change: the probe succeeds and the original eval runs verbatim.
#
# Skip contract per eval step:
#   - Probe order: `python3` then `python`.
#   - Probe imports `amplihack.eval.sdk_eval_loop` with `PYTHONPATH=src` so
#     the probe and the real run resolve the module via the same path.
#   - On absence: `[skip] ...` warning -> stderr (visible in audit logs);
#     fallback JSON `{"sdk":"<name>","error":"..."}` -> stdout (sole/last
#     JSON object so `parse_json: true` still works); `exit 0`.
#   - On presence: original behaviour, with `python` -> `"$PY"`.
# =============================================================================

name: "sdk-comparison"
description: "Run L1-L12 eval on all 4 SDKs and generate comparative report"
version: "1.0.0"
author: "Amplihack Team"
tags: ["eval", "sdk", "comparison", "benchmark", "multi-sdk"]

# SDK COMPARISON RECIPE
#
# Runs the progressive test suite against all 4 SDK implementations and
# produces a comparative report showing strengths and weaknesses of each.
#
# SDKs evaluated:
#   - mini: Minimal SDK implementation
#   - claude: Claude SDK (Anthropic)
#   - copilot: Copilot SDK (Microsoft)
#   - microsoft: Microsoft SDK
#
# This recipe wraps the sdk_eval_loop.py module, encoding the
# comparison workflow that was previously run manually.
#
# Philosophy:
#   - Same test suite, different SDKs -> apples-to-apples comparison
#   - Multiple runs per SDK for statistical stability
#   - Scores and rankings saved as artifacts
#
# Usage:
#   amplifier recipes execute sdk-comparison.yaml --context '{
#     "sdks": "mini claude copilot microsoft",
#     "levels": "L1 L2 L3 L4 L5 L6",
#     "loops_per_sdk": "3"
#   }'
#
# CLI equivalent:
#   python -m amplihack.eval.sdk_eval_loop --all-sdks --loops 3

recursion:
  max_depth: 4
  max_total_steps: 30

context:
  # Space-separated list of SDKs to evaluate
  sdks: "mini claude copilot microsoft"

  # Levels to evaluate (space-separated)
  levels: "L1 L2 L3 L4 L5 L6"

  # Number of improvement loops per SDK (for score stability)
  loops_per_sdk: "3"

  # Output directory for results
  output_dir: "./eval_sdk_comparison"

  # Internal state (populated during execution)
  mini_results: ""
  claude_results: ""
  copilot_results: ""
  microsoft_results: ""
  comparison_report: ""

steps:
  # ==========================================================================
  # STEP 1: EVAL MINI SDK
  # ==========================================================================
  - id: "eval-mini"
    type: "bash"
    command: |
      echo "=== Step 1: Evaluating Mini SDK ==="

      # Probe for python + amplihack.eval.sdk_eval_loop (refs #248 / #285).
      PY=""
      for cand in python3 python; do
        if command -v "$cand" >/dev/null 2>&1; then
          if PYTHONPATH=src "$cand" -c 'import amplihack.eval.sdk_eval_loop' >/dev/null 2>&1; then
            PY="$cand"
            break
          fi
        fi
      done

      if [ -z "$PY" ]; then
        echo "[skip] amplihack.eval.sdk_eval_loop not available; skipping eval-mini" >&2
        echo '{"sdk":"mini","error":"amplihack.eval.sdk_eval_loop not installed; step skipped"}'
        exit 0
      fi

      LEVELS_ARGS=""
      for level in {{levels}}; do
        LEVELS_ARGS="$LEVELS_ARGS $level"
      done

      PYTHONPATH=src "$PY" -m amplihack.eval.sdk_eval_loop \
        --sdks mini \
        --loops {{loops_per_sdk}} \
        --levels $LEVELS_ARGS \
        --output-dir "{{output_dir}}" \
        2>&1

      echo ""
      echo "=== Mini SDK Eval Complete ==="

      if [ -f "{{output_dir}}/mini/sdk_report.json" ]; then
        cat "{{output_dir}}/mini/sdk_report.json"
      else
        echo '{"sdk": "mini", "error": "report not found"}'
      fi
    output: "mini_results"
    parse_json: true

  # ==========================================================================
  # STEP 2: EVAL CLAUDE SDK
  # ==========================================================================
  - id: "eval-claude"
    type: "bash"
    command: |
      echo "=== Step 2: Evaluating Claude SDK ==="

      # Probe for python + amplihack.eval.sdk_eval_loop (refs #248 / #285).
      PY=""
      for cand in python3 python; do
        if command -v "$cand" >/dev/null 2>&1; then
          if PYTHONPATH=src "$cand" -c 'import amplihack.eval.sdk_eval_loop' >/dev/null 2>&1; then
            PY="$cand"
            break
          fi
        fi
      done

      if [ -z "$PY" ]; then
        echo "[skip] amplihack.eval.sdk_eval_loop not available; skipping eval-claude" >&2
        echo '{"sdk":"claude","error":"amplihack.eval.sdk_eval_loop not installed; step skipped"}'
        exit 0
      fi

      LEVELS_ARGS=""
      for level in {{levels}}; do
        LEVELS_ARGS="$LEVELS_ARGS $level"
      done

      PYTHONPATH=src "$PY" -m amplihack.eval.sdk_eval_loop \
        --sdks claude \
        --loops {{loops_per_sdk}} \
        --levels $LEVELS_ARGS \
        --output-dir "{{output_dir}}" \
        2>&1

      echo ""
      echo "=== Claude SDK Eval Complete ==="

      if [ -f "{{output_dir}}/claude/sdk_report.json" ]; then
        cat "{{output_dir}}/claude/sdk_report.json"
      else
        echo '{"sdk": "claude", "error": "report not found"}'
      fi
    output: "claude_results"
    parse_json: true

  # ==========================================================================
  # STEP 3: EVAL COPILOT SDK
  # ==========================================================================
  - id: "eval-copilot"
    type: "bash"
    command: |
      echo "=== Step 3: Evaluating Copilot SDK ==="

      # Probe for python + amplihack.eval.sdk_eval_loop (refs #248 / #285).
      PY=""
      for cand in python3 python; do
        if command -v "$cand" >/dev/null 2>&1; then
          if PYTHONPATH=src "$cand" -c 'import amplihack.eval.sdk_eval_loop' >/dev/null 2>&1; then
            PY="$cand"
            break
          fi
        fi
      done

      if [ -z "$PY" ]; then
        echo "[skip] amplihack.eval.sdk_eval_loop not available; skipping eval-copilot" >&2
        echo '{"sdk":"copilot","error":"amplihack.eval.sdk_eval_loop not installed; step skipped"}'
        exit 0
      fi

      LEVELS_ARGS=""
      for level in {{levels}}; do
        LEVELS_ARGS="$LEVELS_ARGS $level"
      done

      PYTHONPATH=src "$PY" -m amplihack.eval.sdk_eval_loop \
        --sdks copilot \
        --loops {{loops_per_sdk}} \
        --levels $LEVELS_ARGS \
        --output-dir "{{output_dir}}" \
        2>&1

      echo ""
      echo "=== Copilot SDK Eval Complete ==="

      if [ -f "{{output_dir}}/copilot/sdk_report.json" ]; then
        cat "{{output_dir}}/copilot/sdk_report.json"
      else
        echo '{"sdk": "copilot", "error": "report not found"}'
      fi
    output: "copilot_results"
    parse_json: true

  # ==========================================================================
  # STEP 4: EVAL MICROSOFT SDK
  # ==========================================================================
  - id: "eval-microsoft"
    type: "bash"
    command: |
      echo "=== Step 4: Evaluating Microsoft SDK ==="

      # Probe for python + amplihack.eval.sdk_eval_loop (refs #248 / #285).
      PY=""
      for cand in python3 python; do
        if command -v "$cand" >/dev/null 2>&1; then
          if PYTHONPATH=src "$cand" -c 'import amplihack.eval.sdk_eval_loop' >/dev/null 2>&1; then
            PY="$cand"
            break
          fi
        fi
      done

      if [ -z "$PY" ]; then
        echo "[skip] amplihack.eval.sdk_eval_loop not available; skipping eval-microsoft" >&2
        echo '{"sdk":"microsoft","error":"amplihack.eval.sdk_eval_loop not installed; step skipped"}'
        exit 0
      fi

      LEVELS_ARGS=""
      for level in {{levels}}; do
        LEVELS_ARGS="$LEVELS_ARGS $level"
      done

      PYTHONPATH=src "$PY" -m amplihack.eval.sdk_eval_loop \
        --sdks microsoft \
        --loops {{loops_per_sdk}} \
        --levels $LEVELS_ARGS \
        --output-dir "{{output_dir}}" \
        2>&1

      echo ""
      echo "=== Microsoft SDK Eval Complete ==="

      if [ -f "{{output_dir}}/microsoft/sdk_report.json" ]; then
        cat "{{output_dir}}/microsoft/sdk_report.json"
      else
        echo '{"sdk": "microsoft", "error": "report not found"}'
      fi
    output: "microsoft_results"
    parse_json: true

  # ==========================================================================
  # STEP 5: GENERATE COMPARISON REPORT
  # Synthesize results from all 4 SDKs into a ranked comparison.
  # ==========================================================================
  - id: "generate-comparison"
    agent: "amplihack:architect"
    prompt: |
      # Step 5: Generate SDK Comparison Report

      **Mini SDK Results:** {{mini_results}}
      **Claude SDK Results:** {{claude_results}}
      **Copilot SDK Results:** {{copilot_results}}
      **Microsoft SDK Results:** {{microsoft_results}}

      ## Your Task

      Generate a comprehensive comparison report:

      1. **Rankings**: Rank SDKs by best overall score
      2. **Per-Level Comparison**: Which SDK wins each level?
      3. **Strengths/Weaknesses**: What is each SDK best/worst at?
      4. **Score Stability**: Which SDK has most consistent scores across loops?
      5. **Recommendations**: Which SDK to use for which use case?

      Also generate the comparison as a markdown table and save it.

      Output as JSON:
      ```json
      {
        "ranking": [
          {"rank": 1, "sdk": "...", "best_overall": 0.0, "level_wins": 0}
        ],
        "per_level_winners": {
          "L1": {"winner": "...", "score": 0.0},
          "L2": {"winner": "...", "score": 0.0}
        },
        "sdk_profiles": {
          "mini": {
            "strengths": ["..."],
            "weaknesses": ["..."],
            "best_for": "..."
          }
        },
        "stability_ranking": ["most stable to least stable"],
        "recommendations": ["..."],
        "markdown_table": "| SDK | L1 | L2 | ... | Overall |\n|...|"
      }
      ```
    output: "comparison_report"
    parse_json: true

  # ==========================================================================
  # FINAL OUTPUT
  # ==========================================================================
  - id: "save-report"
    type: "bash"
    parse_json: true
    command: |
      echo "=== Saving Comparison Report ==="

      # Check for the multi-SDK report
      if [ -f "{{output_dir}}/multi_sdk_report.json" ]; then
        echo "Multi-SDK report found at: {{output_dir}}/multi_sdk_report.json"
      fi

      cat << 'EOF'
      {
        "workflow": "sdk-comparison",
        "version": "1.0.0",
        "sdks_evaluated": "{{sdks}}",
        "levels": "{{levels}}",
        "loops_per_sdk": "{{loops_per_sdk}}",
        "status": "complete",
        "steps_completed": 5,
        "steps": [
          "1. Eval Mini SDK",
          "2. Eval Claude SDK",
          "3. Eval Copilot SDK",
          "4. Eval Microsoft SDK",
          "5. Generate Comparison Report"
        ],
        "outputs": {
          "report_dir": "{{output_dir}}",
          "multi_sdk_report": "{{output_dir}}/multi_sdk_report.json"
        }
      }
      EOF
    output: "final_result"
