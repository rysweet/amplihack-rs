name: "smart-orchestrator"
description: |
  Unified intelligent task orchestrator. Replaces ultrathink.
  Classifies -> formulates goal -> decomposes into workstreams ->
  executes via recipe runner (single or parallel) -> goal-seeking
  reflection loop (3 rounds max, auto-mode pattern) -> summarizes.
version: "1.4.0"
author: "Amplihack Team"
tags: ["orchestration", "routing", "parallel", "auto-classify", "goal-seeking"]

context:
  task_description: ""
  repo_path: "."
  decomposition_json: ""
  session_id: ""
  tree_id: ""
  session_info: ""
  task_type: ""
  workstream_count: ""
  workstreams_file: ""
  recursion_guard: ""
  round_1_result: ""
  reflection_1: ""
  round_2_result: ""
  reflection_2: ""
  round_3_result: ""
  reflection_final: ""
  summary: ""
  session_complete_status: ""
  force_single_workstream: "false" # set to "true" to prevent parallel decomposition

steps:
  # ─────────────────────────────────────────────────────────────────────────
  # Phase 1: Classify & Decompose
  # ─────────────────────────────────────────────────────────────────────────

  - id: "classify-and-decompose"
    type: "agent"
    agent: "amplihack:core:architect"
    prompt: |
      === [RECIPE PROGRESS] Step: classify-and-decompose ===

      You are an intelligent task orchestrator. Analyze this request and produce a
      structured orchestration plan.

      **REQUEST**: {{task_description}}

      Output:
      1. task_type: Q&A | Operations | Investigation | Development
      2. goal: clear 1-sentence goal
      3. success_criteria: numbered list of verifiable criteria
      4. workstreams: array of independent parallel units
         - 1 workstream for cohesive/sequential tasks
         - 2-5 for CLEARLY INDEPENDENT components
           e.g. "build webui + api" -> 2 workstreams
                "investigate X then implement Y" -> 2 workstreams
         - recipe: "default-workflow" (dev) | "investigation-workflow" (research)

      **Decomposition override**: {{force_single_workstream}} — if "true", use exactly 1 workstream regardless of task structure.

      **Output exactly this JSON**:
      ```json
      {
        "task_type": "Development",
        "goal": "One sentence goal",
        "success_criteria": ["Criterion 1", "Criterion 2"],
        "workstreams": [
          {"name": "slug", "description": "full task", "recipe": "default-workflow"}
        ]
      }
      ```
    output: "decomposition_json"

  # parse-decomposition: extract task_type from architect JSON output.
  # Outputs ONLY the canonical task_type string (e.g. "Development").
  # Previously also extracted workstream_count here; that moved to activate-workflow.
  - id: "parse-decomposition"
    type: "bash"
    command: |
      HELPER_PATH="${AMPLIHACK_HOME:-$(git rev-parse --show-toplevel 2>/dev/null || echo '.')}/amplifier-bundle/tools/orch_helper.py"
      if [ ! -f "$HELPER_PATH" ]; then
          echo "ERROR: orch_helper.py not found at: $HELPER_PATH" >&2
          echo "Set AMPLIHACK_HOME to your amplihack repo root, or run from within the repo." >&2
          exit 1
      fi
      DECOMP_JSON=$(cat <<'EOFDECOMP'
      {{decomposition_json}}
      EOFDECOMP
      )
      export DECOMP_JSON HELPER_PATH
      python3 - <<'PYEOF'
      import sys, json, os, importlib.util

      helper_path = os.environ['HELPER_PATH']
      decomp_json = os.environ['DECOMP_JSON']

      spec = importlib.util.spec_from_file_location('orch_helper', helper_path)
      h = importlib.util.module_from_spec(spec); spec.loader.exec_module(h)
      obj = h.extract_json(decomp_json)

      if not obj:
          msg = (
              "\n"
              "╔══════════════════════════════════════════════════════════════════╗\n"
              "║  WARNING: decomposition JSON parse failed                        ║\n"
              "║  The architect agent returned non-JSON prose instead of the      ║\n"
              "║  expected structured plan. Defaulting to:                        ║\n"
              "║    task_type=Development, workstream_count=1 (no goal spec).     ║\n"
              "║  The goal specification will be EMPTY — execution quality may    ║\n"
              "║  be degraded. Consider re-running /dev if results are wrong.     ║\n"
              "╚══════════════════════════════════════════════════════════════════╝\n"
          )
          print(msg, file=sys.stderr)
          # Do NOT print to stdout — stdout is captured as the output variable
          # and box-drawing characters would corrupt downstream template substitution

      task_type = h.normalise_type(obj.get("task_type", "Development"))
      print(task_type)
      PYEOF
    output: "task_type"

  # activate-workflow: compute workstream_count, set workflow semaphore, announce.
  # Replaces the former extract-workstream-count + announce-classification steps.
  - id: "activate-workflow"
    type: "bash"
    command: |
      HELPER_PATH="${AMPLIHACK_HOME:-$(git rev-parse --show-toplevel 2>/dev/null || echo '.')}/amplifier-bundle/tools/orch_helper.py"
      DECOMP_JSON=$(cat <<'EOFDECOMP'
      {{decomposition_json}}
      EOFDECOMP
      )
      TASK_TYPE={{task_type}}
      HOOKS_DIR="${AMPLIHACK_HOME:-$(git rev-parse --show-toplevel 2>/dev/null || echo '.')}/amplifier-bundle/tools/amplihack/hooks"
      export DECOMP_JSON HELPER_PATH TASK_TYPE HOOKS_DIR
      python3 - <<'PYEOF'
      import os, sys, importlib.util

      helper_path = os.environ['HELPER_PATH']
      decomp_json = os.environ['DECOMP_JSON']
      task_type = os.environ['TASK_TYPE']
      hooks_dir = os.environ['HOOKS_DIR']

      # Compute workstream count from decomposition JSON
      spec = importlib.util.spec_from_file_location('orch_helper', helper_path)
      h = importlib.util.module_from_spec(spec); spec.loader.exec_module(h)
      obj = h.extract_json(decomp_json)
      count = max(1, len(obj.get("workstreams", [{}])))

      # Set workflow-active semaphore so the hook skips injection during execution
      try:
          sys.path.insert(0, hooks_dir)
          from dev_intent_router import set_workflow_active
          set_workflow_active(task_type, count)
      except Exception:
          pass  # Hook may not exist in all environments

      # Announce classification to stderr (visible to user, not captured as output)
      print(f"[dev-orchestrator] Classified as: {task_type} | Workstreams: {count} — starting execution...", file=sys.stderr)

      # Output workstream count (captured by recipe runner)
      print(count)
      PYEOF
    output: "workstream_count"

  # ─────────────────────────────────────────────────────────────────────────
  # Setup: register this session in the session tree (atomic check+register)
  # Runs for Development and Investigation tasks before any workstream spawning.
  # session_info output format: JSON {"session_id":..,"tree_id":..,"depth":..,"status":..}
  # ─────────────────────────────────────────────────────────────────────────

  - id: "setup-session"
    type: "bash"
    condition: "'Development' in task_type or 'Investigation' in task_type or task_type == ''"
    command: |
      TREE_SCRIPT="${AMPLIHACK_HOME:-$(git rev-parse --show-toplevel 2>/dev/null || echo '.')}/amplifier-bundle/tools/session_tree.py"
      SESSION_ID=$(python3 -c "import uuid; print(uuid.uuid4().hex[:8])")

      if [ -f "$TREE_SCRIPT" ]; then
        # Register this session — atomic check+register under lock
        if OUTPUT=$(python3 "$TREE_SCRIPT" register "$SESSION_ID" 2>&1); then
          # Output: "TREE_ID=abc123 DEPTH=0"
          TREE_ID=$(echo "$OUTPUT" | grep -oE 'TREE_ID=[A-Za-z0-9_-]+' | head -1 | cut -d= -f2)
          DEPTH_STR=$(echo "$OUTPUT" | grep -oE 'DEPTH=[0-9]+' | head -1 | cut -d= -f2)
          DEPTH_VAL=${DEPTH_STR:-0}
          # Validate extracted values
          if ! echo "$TREE_ID" | grep -qE '^[A-Za-z0-9_-]+$'; then
            python3 -c "import json; print(json.dumps({'session_id': 'error', 'tree_id': 'error', 'depth': 0, 'status': 'registration_failed', 'error': 'invalid tree_id extracted'}))"
            exit 0
          fi
          python3 -c "import sys,json; sid,tid,depth=sys.argv[1],sys.argv[2],int(sys.argv[3]); print(json.dumps({'session_id':sid,'tree_id':tid,'depth':depth,'status':'ok'}))" "$SESSION_ID" "$TREE_ID" "$DEPTH_VAL"
        else
          # Registration failed (capacity exceeded or depth limit) — encode structured error
          echo "NOTE: Session registration failed — proceeding without recursion tracking." >&2
          python3 -c "import json; print(json.dumps({'session_id': 'none', 'tree_id': 'none', 'depth': 0, 'status': 'registration_failed'}))"
        fi
      else
        # No session_tree.py — generate a tree_id from env or fresh uuid
        TREE_ID=$(echo "${AMPLIHACK_TREE_ID:-}" | grep -E '^[A-Za-z0-9_-]+$' | head -1)
        if [ -z "$TREE_ID" ]; then
          TREE_ID=$(python3 -c "import uuid; print(uuid.uuid4().hex[:8])")
        fi
        DEPTH_RAW="${AMPLIHACK_SESSION_DEPTH:-0}"
        # Validate it's an integer (default to 0 if not)
        DEPTH_VAL=$(echo "$DEPTH_RAW" | grep -E '^[0-9]+$' || echo '0')
        python3 -c "import sys,json; sid,tid,depth=sys.argv[1],sys.argv[2],int(sys.argv[3]); print(json.dumps({'session_id':sid,'tree_id':tid,'depth':depth,'status':'no_tree_script'}))" "$SESSION_ID" "$TREE_ID" "$DEPTH_VAL"
      fi
    output: "session_info"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2a: Q&A -- route by intent (technical vs general)
  # ─────────────────────────────────────────────────────────────────────────

  - id: "handle-qa"
    type: "agent"
    condition: "'Q&A' in task_type"
    agent: "amplihack:core:analyzer"
    prompt: |
      Answer this question directly.

      **Question**: {{task_description}}

      - Technical/code question: provide detailed technical answer with examples
      - General/factual question: provide brief direct answer
      - Code analysis: examine and explain the relevant code

      Do NOT invoke any workflow. Just answer concisely.
    output: "round_1_result"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2b: Operations -- route to builder agent
  # ─────────────────────────────────────────────────────────────────────────

  - id: "handle-ops-agent"
    type: "agent"
    condition: "'Operations' in task_type"
    agent: "amplihack:core:builder"
    prompt: |
      Execute this operational task directly.

      **Task**: {{task_description}}
      **Repo**: {{repo_path}}

      Perform the operation, report what was done. End with "STATUS: COMPLETE".
    output: "round_1_result"

  # ─────────────────────────────────────────────────────────────────────────
  # Recursion guard -- derive from session_info (registered atomically in setup-session)
  # Uses pure shell grep instead of Python subprocess for status extraction.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "derive-recursion-guard"
    type: "bash"
    condition: "'Development' in task_type or 'Investigation' in task_type"
    command: |
      SESSION_JSON={{session_info}}
      # Extract status using shell grep — no Python subprocess needed
      if echo "$SESSION_JSON" | grep -qE '"status" *: *"ok"'; then
        echo "ALLOWED"
      elif echo "$SESSION_JSON" | grep -qE '"status" *: *"no_tree_script"'; then
        echo "ALLOWED"
      elif echo "$SESSION_JSON" | grep -qE '"status" *: *"registration_failed"'; then
        echo "NOTE: Session tree registration was skipped — depth and capacity limits inactive." >&2
        echo "BLOCKED:registration_failed"
      else
        # Unknown status — default to blocked
        echo "BLOCKED:unknown"
      fi
    output: "recursion_guard"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2c: Single dev/investigation workstream -- round 1
  # NOTE: workstream_count is a bash command output and may contain a trailing
  # newline. The .strip() and `or '1'` are load-bearing — do not remove them.
  # If workstream_count is empty (step failed), we default to 1 (single workstream).
  # ─────────────────────────────────────────────────────────────────────────

  - id: "execute-single-round-1"
    type: "recipe"
    condition: |
      ('Development' in task_type or 'Investigation' in task_type) and ((workstream_count == '1' or workstream_count == '') or force_single_workstream == 'true')
    recipe: "default-workflow"
    # No explicit context needed: task_description and repo_path flow through
    # from the parent smart-orchestrator context automatically via context merging
    # in _execute_sub_recipe().
    output: "round_1_result"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2d: Parallel workstreams -- round 1
  # ─────────────────────────────────────────────────────────────────────────

  - id: "create-workstreams-config"
    type: "bash"
    condition: |
      ('Development' in task_type or 'Investigation' in task_type) and workstream_count != '1' and workstream_count != '' and 'ALLOWED' in recursion_guard and force_single_workstream != 'true'
    command: |
      HELPER_PATH="${AMPLIHACK_HOME:-$(git rev-parse --show-toplevel 2>/dev/null || echo '.')}/amplifier-bundle/tools/orch_helper.py"
      if [ ! -f "$HELPER_PATH" ]; then
          echo "ERROR: orch_helper.py not found at: $HELPER_PATH" >&2
          echo "Set AMPLIHACK_HOME to your amplihack repo root, or run from within the repo." >&2
          exit 1
      fi
      DECOMP_JSON=$(cat <<'EOFDECOMP'
      {{decomposition_json}}
      EOFDECOMP
      )
      export DECOMP_JSON HELPER_PATH
      python3 - <<'PYEOF'
      import json, os, re, tempfile, sys
      sys.path.insert(0, os.path.dirname(os.environ['HELPER_PATH']))
      import orch_helper
      decomp = os.environ['DECOMP_JSON']
      obj = orch_helper.extract_json(decomp)
      config = []
      for i, ws in enumerate(obj.get("workstreams", [])):
          name = ws.get("name", f"workstream-{i+1}")
          slug = re.sub(r'[^a-z0-9-]', '-', name.lower())[:30].strip('-') or f"ws-{i+1}"
          config.append({
              "issue": "TBD",
              "branch": f"feat/orch-{i+1}-{slug}",
              "description": name,
              "task": ws.get("description", name),
              "recipe": ws.get("recipe", "default-workflow")
          })
      fd, p = tempfile.mkstemp(prefix="smart-orch-ws-", suffix=".json", dir="/tmp")
      os.chmod(p, 0o600)
      with os.fdopen(fd, "w") as f: json.dump(config, f, indent=2)
      print(p)
      PYEOF
    output: "workstreams_file"

  - id: "launch-parallel-round-1"
    type: "bash"
    condition: |
      ('Development' in task_type or 'Investigation' in task_type) and workstream_count != '1' and workstream_count != '' and 'ALLOWED' in recursion_guard and force_single_workstream != 'true'
    command: |
      REPO_PATH={{repo_path}}
      WS_FILE={{workstreams_file}}
      SESSION_JSON={{session_info}}
      # Parse tree_id, depth, and validate workstreams file in one Python subprocess.
      # Uses env vars instead of pipe+heredoc to avoid stdin conflict (issue #2581).
      export SESSION_JSON WS_FILE
      read -r TREE_ID SESSION_DEPTH WS_COUNT_CHECK < <(python3 <<'PYEOF'
      import os, json
      try:
          d = json.loads(os.environ.get('SESSION_JSON', '{}'))
          tid = d.get('tree_id', '')
          depth = d.get('depth', 0)
      except Exception:
          tid, depth = '', 0
      ws_file = os.environ.get('WS_FILE', '')
      ws_count = 0
      if ws_file:
          try:
              with open(ws_file) as f:
                  ws_count = len(json.load(f))
          except Exception:
              pass
      print(tid, depth, ws_count)
      PYEOF
      )
      TREE_ID=${TREE_ID:-}
      SESSION_DEPTH=${SESSION_DEPTH:-0}
      WS_COUNT_CHECK=${WS_COUNT_CHECK:-0}

      if [ -z "$WS_FILE" ] || [ ! -f "$WS_FILE" ]; then
        echo "ERROR: workstreams_file is missing or empty. create-workstreams-config may have failed." >&2
        exit 1
      fi

      if [ "$WS_COUNT_CHECK" = "0" ]; then
        echo "ERROR: workstreams config has 0 entries — decomposition may have failed." >&2
        exit 1
      fi

      if [ ! -d "$REPO_PATH" ]; then
        echo "ERROR: repo_path does not exist: $REPO_PATH" >&2; exit 1
      fi
      cd "$REPO_PATH"
      echo "Launching parallel workstreams (tree: $TREE_ID, depth: $SESSION_DEPTH):"
      cat "$WS_FILE"
      echo "---"
      AMPLIHACK_TREE_ID="$TREE_ID" AMPLIHACK_SESSION_DEPTH="$SESSION_DEPTH" \
        python3 .claude/skills/multitask/orchestrator.py "$WS_FILE"
    output: "round_1_result"

  # ─────────────────────────────────────────────────────────────────────────
  # Recursion depth limit: fall back to single-session execution
  # Uses default-workflow sub-recipe (same as primary path) so workflow
  # steps are enforced even when parallel spawning is blocked.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "execute-single-fallback-blocked"
    type: "recipe"
    # Fires when blocked from spawning subworkstreams — executes as single session instead
    condition: |
      ('Development' in task_type or 'Investigation' in task_type) and 'BLOCKED' in recursion_guard and workstream_count != '1' and workstream_count != ''
    recipe: "default-workflow"
    # No explicit context needed: task_description and repo_path flow through
    # from the parent smart-orchestrator context automatically.
    output: "round_1_result"

  # Cleanup temp workstreams file
  - id: "cleanup-helper"
    type: "bash"
    command: |
      WS_FILE={{workstreams_file}}
      [ -f "$WS_FILE" ] && rm -f "$WS_FILE"
      echo "ok"
    output: "cleanup_status"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 3: Goal-seeking reflection loop (up to 3 rounds)
  # Pattern from auto-workflow.yaml: CONTINUE/COMPLETE on each round.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "reflect-round-1"
    type: "agent"
    condition: |
      'Q&A' not in task_type and 'Operations' not in task_type and round_1_result
    agent: "amplihack:core:reviewer"
    prompt: |
      Evaluate goal achievement after round 1.

      **Goal + Success Criteria**: {{decomposition_json}}
      **Round 1 Result**: {{round_1_result}}

      Was each success criterion met?

      End with EXACTLY one of:
      - `GOAL_STATUS: ACHIEVED` -- all criteria met
      - `GOAL_STATUS: PARTIAL -- [what's missing]` -- needs another round
      - `GOAL_STATUS: NOT_ACHIEVED -- [reason]` -- needs another round
    output: "reflection_1"

  - id: "execute-round-2"
    type: "agent"
    condition: |
      reflection_1 and ('PARTIAL' in reflection_1 or 'NOT_ACHIEVED' in reflection_1)
    agent: "amplihack:core:builder"
    prompt: |
      Round 1 was incomplete. Continue from where it left off.

      **Original Goal**: {{decomposition_json}}
      **Round 1 Result**: {{round_1_result}}
      **What's Missing**: {{reflection_1}}

      Address only what's missing. Do not redo completed work.
      Create PRs for new changes. Report PR URLs.
      End with "STATUS: COMPLETE" or "STATUS: CONTINUE".
    output: "round_2_result"

  - id: "reflect-round-2"
    type: "agent"
    condition: |
      round_2_result and ('PARTIAL' in reflection_1 or 'NOT_ACHIEVED' in reflection_1)
    agent: "amplihack:core:reviewer"
    prompt: |
      Evaluate goal achievement after round 2.

      **Goal**: {{decomposition_json}}
      **Round 1**: {{round_1_result}}
      **Round 2**: {{round_2_result}}

      End with:
      - `GOAL_STATUS: ACHIEVED`
      - `GOAL_STATUS: PARTIAL -- [gaps]`
      - `GOAL_STATUS: NOT_ACHIEVED -- [reason]`
    output: "reflection_2"

  - id: "execute-round-3"
    type: "agent"
    condition: |
      reflection_2 and ('PARTIAL' in reflection_2 or 'NOT_ACHIEVED' in reflection_2)
    agent: "amplihack:core:builder"
    prompt: |
      Final round. Complete as much remaining work as possible.

      **Original Goal**: {{decomposition_json}}
      **Round 2 Result**: {{round_2_result}}
      **Round 2 Gaps**: {{reflection_2}}

      Prioritize the most critical missing items. This is the last round.
      Report what was and was not completed.
      End with "STATUS: COMPLETE" or "STATUS: PARTIAL".
    output: "round_3_result"

  - id: "reflect-final"
    type: "agent"
    condition: "'Q&A' not in task_type and 'Operations' not in task_type and round_1_result"
    agent: "amplihack:core:reviewer"
    prompt: |
      Final assessment after all execution rounds.

      **Goal**: {{decomposition_json}}

      **Results**:
      - Round 1: {{round_1_result}}
      - Round 2 (if any): {{round_2_result}}
      - Round 3 (if any): {{round_3_result}}

      Note: empty strings above mean that round was not needed.

      Was the overall goal achieved? Summarize what was done.
      End with `GOAL_STATUS: ACHIEVED`, `GOAL_STATUS: PARTIAL -- [gaps]`,
      or `GOAL_STATUS: NOT_ACHIEVED -- [reason]`.
    output: "reflection_final"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 4: Outside-In Testing Validation
  # Mandatory for ALL Development tasks — single and multi-workstream alike.
  #
  # FIX (#2925): The previous condition required PR URLs in round_1_result.
  # For parallel/multitask workstreams, round_1_result is the orchestrator
  # report which never contains PR URLs, so this step was always SKIPPED.
  # Fixed by removing the PR-URL requirement: validation now runs for any
  # Development task that produced results, letting the reviewer agent
  # determine if PRs exist and whether outside-in testing was performed.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "validate-outside-in-testing"
    type: "agent"
    condition: "'Q&A' not in task_type and 'Operations' not in task_type and 'Development' in task_type and round_1_result"
    agent: "amplihack:core:reviewer"
    prompt: |
      Outside-in testing validation check.

      **Task**: {{task_description}}

      **Execution results**:
      - Round 1: {{round_1_result}}
      - Round 2 (if any): {{round_2_result}}
      - Round 3 (if any): {{round_3_result}}

      ## Important: Multi-Workstream Execution

      If Round 1 looks like an orchestrator report (contains "PARALLEL WORKSTREAM
      REPORT" or lists multiple workstreams with log paths), this was a parallel
      multitask execution. In that case, PR URLs will NOT appear directly in the
      round results — they are in each workstream's individual log file.

      For parallel workstreams: inspect the round results for evidence that each
      workstream completed, and check whether the log references mention outside-in
      testing being performed (look for "Step 13", "outside-in-testing", or
      "local testing" references in the results).

      ## Validation Steps

      1. Determine execution mode:
         - **Single workstream**: PR URL appears directly in round results
         - **Parallel workstreams**: Round 1 is an orchestrator report; PR URLs
           are in individual workstream logs

      2. For each workstream, determine whether outside-in testing was performed:
         - Look for "Step 13: Local Testing Results" evidence
         - Look for `outside-in-testing` skill invocation
         - Look for at least 2 test scenario results (PASS/FAIL)

      3. Report your findings in this format:

         ```
         OUTSIDE-IN TESTING VALIDATION REPORT
         =====================================
         Execution mode: single / parallel
         PR(s) found: <list PR URLs or "see workstream logs">

         For each workstream:
           - Workstream: <name or PR URL>
           - outside-in-testing skill invoked: YES / NO / UNKNOWN
           - Step 13 results documented: YES / NO / UNKNOWN
           - Test scenarios executed: <count or UNKNOWN>
           - VERDICT: PASS / FAIL / CANNOT_VERIFY
         ```

      4. If ALL workstreams have PASS or CANNOT_VERIFY verdict, end with:
         `OUTSIDE_IN_VALIDATION: PASSED`

      5. If ANY workstream has FAIL verdict (evidence shows testing was skipped),
         end with:
         `OUTSIDE_IN_VALIDATION: FAILED -- <describe which workstreams are missing outside-in testing>`

         When FAILED, state clearly what outside-in testing is missing and the
         command the developer should run to complete it.

      6. If no Development work was done (e.g., task was purely informational
         and produced no code changes or PRs), end with:
         `OUTSIDE_IN_VALIDATION: N/A -- no code changes produced`
    output: "outside_in_validation"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 5: Summary
  # ─────────────────────────────────────────────────────────────────────────

  - id: "summarize"
    type: "agent"
    condition: "'Q&A' not in task_type and 'Operations' not in task_type and round_1_result"
    agent: "amplihack:core:architect"
    prompt: |
      Produce a concise execution summary.

      **Task**: {{task_description}}
      **Final Reflection**: {{reflection_final}}
      **Outside-In Testing Validation**: {{outside_in_validation}}
      **Round 1**: {{round_1_result}}
      **Round 2 (if any)**: {{round_2_result}}
      **Round 3 (if any)**: {{round_3_result}}

      Note: empty strings above mean that round was not needed.

      Provide:
      1. What was accomplished (2-3 sentences)
      2. PR links (if any)
      3. Outside-in testing status (PASSED / FAILED / N/A — not applicable when no PR was created)
      4. Goal status (ACHIEVED / PARTIAL / NOT_ACHIEVED)
      5. Remaining work if PARTIAL or if outside-in testing FAILED
    output: "summary"

  # ─────────────────────────────────────────────────────────────────────────
  # Teardown: mark this session complete in the session tree
  # Runs unconditionally so the slot is freed even on partial/failed runs.
  # Combines session completion + workflow semaphore clearing in one Python call.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "complete-session"
    type: "bash"
    command: |
      SESSION_JSON={{session_info}}
      TREE_SCRIPT="${AMPLIHACK_HOME:-$(git rev-parse --show-toplevel 2>/dev/null || echo '.')}/amplifier-bundle/tools/session_tree.py"
      HOOKS_DIR="${AMPLIHACK_HOME:-$(git rev-parse --show-toplevel 2>/dev/null || echo '.')}/amplifier-bundle/tools/amplihack/hooks"
      # Parse session fields and clear workflow semaphore in one Python subprocess.
      # Uses env vars instead of pipe+heredoc to avoid stdin conflict (issue #2581).
      export SESSION_JSON HOOKS_DIR
      read -r SESSION_ID TREE_ID STATUS < <(python3 <<'PYEOF'
      import json, os, sys
      try:
          d = json.loads(os.environ.get('SESSION_JSON', '{}'))
          sid, tid, status = d.get('session_id',''), d.get('tree_id',''), d.get('status','')
      except Exception:
          sid, tid, status = '', '', ''
      # Clear workflow-active semaphore so the hook resumes injection
      try:
          hooks_dir = os.environ.get('HOOKS_DIR', '')
          if hooks_dir:
              sys.path.insert(0, hooks_dir)
              from dev_intent_router import clear_workflow_active
              clear_workflow_active()
      except Exception:
          pass
      print(sid, tid, status)
      PYEOF
      )
      SESSION_ID=${SESSION_ID:-}
      TREE_ID=${TREE_ID:-}
      STATUS=${STATUS:-}

      if [ -n "$SESSION_ID" ] && [ "$STATUS" = "ok" ] && [ -f "$TREE_SCRIPT" ]; then
        AMPLIHACK_TREE_ID="$TREE_ID" python3 "$TREE_SCRIPT" complete "$SESSION_ID"
        echo "Session $SESSION_ID completed in tree $TREE_ID"
      else
        echo "No session to complete (status: ${STATUS:-empty})"
      fi
    output: "session_complete_status"

output:
  format: "markdown"
  template: |
    # Dev Orchestrator -- Execution Complete

    **Task**: {{task_description}}
    **Type**: {{task_type}}
    **Workstreams**: {{workstream_count}}

    ## Summary

    {{summary}}

    ---
    *amplihack dev-orchestrator v1.4.0 (smart-orchestrator)*
