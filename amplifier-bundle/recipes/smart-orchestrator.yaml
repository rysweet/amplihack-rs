name: "smart-orchestrator"
description: |
  Unified intelligent task orchestrator. Replaces ultrathink.
  Classifies -> formulates goal -> decomposes into workstreams ->
  executes via recipe runner (single or parallel) -> goal-seeking
  reflection loop (3 rounds max, auto-mode pattern) -> summarizes.
version: "1.5.0"
author: "Amplihack Team"
tags: ["orchestration", "routing", "parallel", "auto-classify", "goal-seeking"]

# Agent steps launch full Claude sessions (including plugin installation)
# which can easily exceed the recipe-runner's built-in 60s default.
# Set a 5-minute recipe-level default so steps without an explicit
# timeout_seconds still get adequate time.  Fixes #210.
default_step_timeout: 300

context:
  task_description: ""
  repo_path: "."
  decomposition_json: ""
  session_id: ""
  tree_id: ""
  session_info: ""
  task_type: ""
  workstream_count: ""
  workstreams_file: ""
  recursion_guard: ""
  round_1_result: ""
  reflection_1: ""
  round_2_result: ""
  reflection_2: ""
  round_3_result: ""
  reflection_final: ""
  summary: ""
  session_complete_status: ""
  force_single_workstream: "false" # set to "true" to prevent parallel decomposition
  adaptive_recipe: "" # set by detect-execution-gap when routing fails
  infra_error_details: "" # diagnostic info for infrastructure failures
  ops_modified_files: "" # set by ops-file-change-check when Operations modifies files

context_validation:
  task_description: "nonempty"
  repo_path: "git_repo"

steps:
  # ─────────────────────────────────────────────────────────────────────────
  # Phase 0: Pre-flight Validation
  # ─────────────────────────────────────────────────────────────────────────
  - id: "preflight-validation"
    type: "bash"
    command: |
      ERRORS=""
      REPO="$REPO_PATH"
      TASK="$TASK_DESCRIPTION"
      if [ -z "$TASK" ]; then
        ERRORS="${ERRORS}\n  ✗ task_description is empty"
      fi
      if [ ! -d "$REPO" ]; then
        ERRORS="${ERRORS}\n  ✗ repo_path '$REPO' does not exist"
      elif ! git -C "$REPO" rev-parse --git-dir >/dev/null 2>&1; then
        ERRORS="${ERRORS}\n  ✗ repo_path '$REPO' is not a git repository"
      fi
      HELPER_PATH="$(amplihack resolve-bundle-asset helper-path 2>/dev/null || true)"
      if [ -z "$HELPER_PATH" ] || [ ! -f "$HELPER_PATH" ]; then
        ERRORS="${ERRORS}\n  ✗ Cannot find orch_helper.py — set AMPLIHACK_HOME to a valid amplihack root"
      fi
      if ! command -v recipe-runner-rs >/dev/null 2>&1 && [ ! -f "$HOME/.cargo/bin/recipe-runner-rs" ]; then
        ERRORS="${ERRORS}\n  ✗ recipe-runner-rs not found (run: cargo install --git https://github.com/rysweet/amplihack-recipe-runner)"
      fi
      if [ -n "$ERRORS" ]; then
        echo "=== SMART-ORCHESTRATOR PRE-FLIGHT FAILED ===" >&2
        printf "%b\n" "$ERRORS" >&2
        echo "Restart: run_recipe_by_name('smart-orchestrator', user_context={'task_description': '...', 'repo_path': '...'}, progress=True)" >&2
        exit 1
      fi
      echo "=== Pre-flight passed ==="
    output: "preflight_status"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 1: Classify & Decompose
  # ─────────────────────────────────────────────────────────────────────────

  - id: "classify-and-decompose"
    type: "agent"
    timeout_seconds: 300
    agent: "amplihack:core:architect"
    prompt: |
      === [RECIPE PROGRESS] Step: classify-and-decompose ===

      You are an intelligent task orchestrator. Analyze this request and produce a
      structured orchestration plan.

      **IMPORTANT**: You are ONLY classifying and decomposing. Do NOT implement,
      build, code, or make any changes. Do NOT create files, edit code, or run
      commands. Do NOT invoke any skills, workflows, or tools. Do NOT call
      dev-orchestrator or any other orchestrator. Return ONLY the JSON object below.

      **REQUEST**: {{task_description}}

      Output:
      1. task_type: Q&A | Operations | Investigation | Development
      2. goal: clear 1-sentence goal
      3. success_criteria: numbered list of verifiable criteria
      4. workstreams: array of independent parallel units
         - 1 workstream for cohesive/sequential tasks
         - 2-5 for CLEARLY INDEPENDENT components
           e.g. "build webui + api" -> 2 workstreams
                "investigate X then implement Y" -> 2 workstreams
         - recipe: "default-workflow" (dev) | "investigation-workflow" (research)

      **Classification rules — read carefully (#269)**:
      - **Operations** is ONLY for one-shot read-only or trivial mutating
        commands the user could type themselves: "git status", "ls", "delete
        old logs", "show disk usage", "run cargo test". Operations NEVER
        writes new functions, NEVER opens PRs, NEVER writes tests, NEVER
        modifies source files in `src/`, `crates/`, `bins/`, etc.
      - **Development** is the correct type whenever the task asks you to:
        "Add", "Extend", "Implement", "Create", "Build", "Refactor", or "Port"
        ANY code; OR write/add tests; OR open a PR; OR modify files in
        `src/` / `crates/` / `bins/`. Multi-requirement tasks with numbered
        items `(1)`, `(2)`, `(3)` are almost always Development.
      - When in doubt between Operations and Development, choose Development.

      **Decomposition override**: {{force_single_workstream}} — if "true", use exactly 1 workstream regardless of task structure.

      **Output exactly this JSON**:
      ```json
      {
        "task_type": "Development",
        "goal": "One sentence goal",
        "success_criteria": ["Criterion 1", "Criterion 2"],
        "workstreams": [
          {"name": "slug", "description": "full task", "recipe": "default-workflow"}
        ]
      }
      ```
    output: "decomposition_json"

  # parse-decomposition: extract task_type from architect JSON output.
  # Outputs ONLY the canonical task_type string (e.g. "Development").
  # Uses native Rust `amplihack orch helper` (#270).
  - id: "parse-decomposition"
    type: "bash"
    command: |
      _DECOMP_TMPFILE=$(mktemp)
      trap 'rm -f "$_DECOMP_TMPFILE"' EXIT
      # FIX (heredoc-bulletproof): use env var — no heredoc needed.
      printf '%s' "$DECOMPOSITION_JSON" > "$_DECOMP_TMPFILE"
      RAW_OBJ=$(amplihack orch helper extract-json < "$_DECOMP_TMPFILE")
      if [ "$RAW_OBJ" = "{}" ]; then
        cat <<'WARN' >&2

      ╔══════════════════════════════════════════════════════════════════╗
      ║  ERROR: decomposition JSON parse failed                         ║
      ║  The architect agent returned non-JSON prose instead of the     ║
      ║  expected structured plan.                                      ║
      ║                                                                 ║
      ║  Action: defaulting to task_type=Development so execution can   ║
      ║  continue. The adaptive strategy step will evaluate whether     ║
      ║  direct recipe invocation should be attempted.                  ║
      ║                                                                 ║
      WARN
      fi
      # Extract the task_type field from the JSON object via a one-liner
      # Rust call: pipe extracted JSON into a small inline tool. We use
      # `amplihack orch helper normalise-type` directly on the raw value.
      RAW_TYPE=$(printf '%s' "$RAW_OBJ" | amplihack orch helper extract-field --field task_type --default Development)
      CANONICAL_TYPE=$(printf '%s' "$RAW_TYPE" | amplihack orch helper normalise-type)
      # Deterministic safety net (#269): if the LLM said Operations but the
      # task description has strong development signals (file paths, "Add"+
      # path, PR mention, tests, multi-requirement), promote to Development.
      _TASK_TMPFILE=$(mktemp)
      # FIX (heredoc-bulletproof): use env var — no heredoc needed.
      printf '%s' "$TASK_DESCRIPTION" > "$_TASK_TMPFILE"
      FINAL_TYPE=$(amplihack orch helper reclassify-task-type --current "$CANONICAL_TYPE" < "$_TASK_TMPFILE")
      rm -f "$_TASK_TMPFILE"
      if [ "$FINAL_TYPE" != "$CANONICAL_TYPE" ]; then
        echo "[dev-orchestrator] Reclassified $CANONICAL_TYPE → $FINAL_TYPE based on task description signals (#269)" >&2
      fi
      echo "$FINAL_TYPE"
    output: "task_type"

  # activate-workflow: compute workstream_count, set workflow semaphore, announce.
  # Uses native Rust `amplihack orch helper count-workstreams` (#270). The
  # only Python that remains is the `dev_intent_router` hook integration —
  # tracked separately as a follow-up port.
  - id: "activate-workflow"
    type: "bash"
    command: |
      _DECOMP_TMPFILE=$(mktemp)
      trap 'rm -f "$_DECOMP_TMPFILE"' EXIT
      # FIX (heredoc-bulletproof): use env var — no heredoc needed.
      printf '%s' "$DECOMPOSITION_JSON" > "$_DECOMP_TMPFILE"
      TASK_TYPE="$TASK_TYPE"
      FORCE_SINGLE="$FORCE_SINGLE_WORKSTREAM"
      HOOKS_DIR="$(amplihack resolve-bundle-asset hooks-dir 2>/dev/null || true)"

      RAW_COUNT=$(amplihack orch helper count-workstreams < "$_DECOMP_TMPFILE")
      case "$(printf '%s' "$FORCE_SINGLE" | tr '[:upper:]' '[:lower:]')" in
        true|1) COUNT=1 ;;
        *)      COUNT="$RAW_COUNT" ;;
      esac

      # Set workflow-active semaphore so the hook skips injection during execution.
      # This is the only remaining Python in this step; tracked as a follow-up
      # port (the hooks system itself hasn't been ported yet).
      if [ -d "$HOOKS_DIR" ]; then
        TASK_TYPE="$TASK_TYPE" COUNT="$COUNT" HOOKS_DIR="$HOOKS_DIR" python3 - <<'PYEOF' >/dev/null 2>&1 || true
      import os, sys
      sys.path.insert(0, os.environ['HOOKS_DIR'])
      from dev_intent_router import set_workflow_active
      set_workflow_active(os.environ['TASK_TYPE'], int(os.environ['COUNT']))
      PYEOF
      fi

      if [ "$COUNT" != "$RAW_COUNT" ]; then
        echo "[dev-orchestrator] force_single_workstream=true — overriding $RAW_COUNT workstreams to 1" >&2
      fi
      echo "[dev-orchestrator] Classified as: $TASK_TYPE | Workstreams: $COUNT — starting execution..." >&2

      # Output workstream count without trailing newline (fix #3570).
      printf '%s' "$COUNT"
    output: "workstream_count"

  # ─────────────────────────────────────────────────────────────────────────
  # Materialize user_context overrides into step outputs so they are
  # available in condition evaluation (fix #3075, #3130).
  # The Rust runner's --set flag updates template variables ({{...}}) but
  # the condition evaluator only sees step outputs and initial context.
  # This step bridges the gap by echoing the context value to stdout.
  # NOTE: Use "$ENV_VAR" — safe against word-splitting and injection.
  # ─────────────────────────────────────────────────────────────────────────
  - id: "materialize-force-single-workstream"
    type: "bash"
    command: |
      printf '%s' "$FORCE_SINGLE_WORKSTREAM"
    output: "force_single_workstream"

  # ─────────────────────────────────────────────────────────────────────────
  # Setup: register this session in the session tree (atomic check+register)
  # Runs for Development and Investigation tasks before any workstream spawning.
  # session_info output format: JSON {"session_id":..,"tree_id":..,"depth":..,"status":..}
  # ─────────────────────────────────────────────────────────────────────────

  - id: "setup-session"
    type: "bash"
    condition: "'Development' in task_type or 'Investigation' in task_type or task_type == ''"
    command: |
      TREE_SCRIPT="$(amplihack resolve-bundle-asset session-tree-path 2>/dev/null || true)"
      # #283: replace python3 uuid with /proc/sys/kernel/random/uuid (POSIX)
      SESSION_ID=$(tr -d '-' < /proc/sys/kernel/random/uuid | head -c 8)

      if [ -f "$TREE_SCRIPT" ]; then
        # Register this session — atomic check+register under lock
        if OUTPUT=$(python3 "$TREE_SCRIPT" register "$SESSION_ID" 2>&1); then
          # Output: "TREE_ID=abc123 DEPTH=0"
          TREE_ID=$(echo "$OUTPUT" | grep -oE 'TREE_ID=[A-Za-z0-9_-]+' | head -1 | cut -d= -f2)
          DEPTH_STR=$(echo "$OUTPUT" | grep -oE 'DEPTH=[0-9]+' | head -1 | cut -d= -f2)
          DEPTH_VAL=${DEPTH_STR:-0}
          # Validate extracted values
          if ! echo "$TREE_ID" | grep -qE '^[A-Za-z0-9_-]+$'; then
            # #283: replace python3 json with printf (inputs are fixed literals)
            printf '{"session_id":"error","tree_id":"error","depth":0,"status":"registration_failed","error":"invalid tree_id extracted"}\n'
            exit 0
          fi
          # #283: DEPTH_VAL is already validated as numeric above; SESSION_ID
          # and TREE_ID are both constrained to [A-Za-z0-9_-], safe for JSON
          printf '{"session_id":"%s","tree_id":"%s","depth":%d,"status":"ok"}\n' "$SESSION_ID" "$TREE_ID" "$DEPTH_VAL"
        else
          # Registration failed (capacity exceeded or depth limit) — encode structured error
          echo "NOTE: Session registration failed — proceeding without recursion tracking." >&2
          printf '{"session_id":"none","tree_id":"none","depth":0,"status":"registration_failed"}\n'
        fi
      else
        # No session_tree.py — generate a tree_id from env or fresh uuid
        TREE_ID=$(echo "${AMPLIHACK_TREE_ID:-}" | grep -E '^[A-Za-z0-9_-]+$' | head -1)
        if [ -z "$TREE_ID" ]; then
          TREE_ID=$(tr -d '-' < /proc/sys/kernel/random/uuid | head -c 8)
        fi
        DEPTH_RAW="${AMPLIHACK_SESSION_DEPTH:-0}"
        # Validate it's an integer (default to 0 if not)
        DEPTH_VAL=$(echo "$DEPTH_RAW" | grep -E '^[0-9]+$' || echo '0')
        printf '{"session_id":"%s","tree_id":"%s","depth":%d,"status":"no_tree_script"}\n' "$SESSION_ID" "$TREE_ID" "$DEPTH_VAL"
      fi
    output: "session_info"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2a: Q&A -- route by intent (technical vs general)
  # ─────────────────────────────────────────────────────────────────────────

  - id: "handle-qa"
    type: "agent"
    timeout_seconds: 300
    condition: "'Q&A' in task_type"
    agent: "amplihack:core:analyzer"
    prompt: |
      Answer this question directly.

      **Question**: {{task_description}}

      - Technical/code question: provide detailed technical answer with examples
      - General/factual question: provide brief direct answer
      - Code analysis: examine and explain the relevant code

      Do NOT invoke any workflow. Just answer concisely.
    output: "round_1_result"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2b: Operations -- route to builder agent
  # ─────────────────────────────────────────────────────────────────────────

  - id: "handle-ops-agent"
    type: "agent"
    timeout_seconds: 300
    condition: "'Operations' in task_type"
    agent: "amplihack:core:builder"
    prompt: |
      Execute this operational task directly.

      **Task**: {{task_description}}
      **Repo**: {{repo_path}}

      Perform the operation, report what was done. End with "STATUS: COMPLETE".
    output: "round_1_result"

  # Detect if Operations modified tracked files (fix #227).
  # When files were changed, downstream review/cleanup/summarize steps
  # must still run so changes get reviewed and committed properly.
  - id: "ops-file-change-check"
    type: "bash"
    condition: "'Operations' in task_type"
    command: |
      cd "$REPO_PATH" 2>/dev/null || true
      CHANGED=$(git diff --name-only 2>/dev/null | head -1)
      UNTRACKED=$(git ls-files --others --exclude-standard 2>/dev/null | head -1)
      if [ -n "$CHANGED" ] || [ -n "$UNTRACKED" ]; then
        echo "true"
      else
        echo ""
      fi
    output: "ops_modified_files"

  # ─────────────────────────────────────────────────────────────────────────
  # Recursion guard -- derive from session_info (registered atomically in setup-session)
  # Uses pure shell grep instead of Python subprocess for status extraction.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "derive-recursion-guard"
    type: "bash"
    condition: "'Development' in task_type or 'Investigation' in task_type"
    command: |
      # FIX (#469/#311): Use env var — safe against injection and word-splitting.
      SESSION_JSON="$SESSION_INFO"
      # Extract status using shell grep — no Python subprocess needed
      if echo "$SESSION_JSON" | grep -qE '"status" *: *"ok"'; then
        echo "ALLOWED"
      elif echo "$SESSION_JSON" | grep -qE '"status" *: *"no_tree_script"'; then
        echo "ALLOWED"
      elif echo "$SESSION_JSON" | grep -qE '"status" *: *"registration_failed"'; then
        echo "NOTE: Session tree registration was skipped — depth and capacity limits inactive." >&2
        echo "BLOCKED:registration_failed"
      else
        # Unknown status — default to blocked
        echo "BLOCKED:unknown"
      fi
    output: "recursion_guard"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2c: Single dev/investigation workstream -- round 1
  # NOTE: workstream_count may be stored as a Number (int) by the Rust
  # recipe runner's parse_context_value (which auto-detects "1" → Number).
  # Conditions compare against both int (1) and string ('1') to avoid
  # calling .strip() on non-string types (fix #3606, supersedes #3570).
  # If workstream_count is empty (step failed), we default to single workstream.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "execute-single-round-1-development"
    type: "recipe"
    # NOTE: force_single_workstream may be Value::Bool(true) when set via CLI
    # --set (parse_context_value coerces "true" -> Bool). The condition evaluator
    # handles Bool/String cross-type coercion (fix #3069 in recipe-runner-rs).
    # workstream_count may be an integer (parse_context_value auto-detects "1"
    # as Number) or a string with trailing whitespace. Compare against both
    # types to avoid .strip() on non-strings (fix #3606).
    condition: |
      'Development' in task_type and ((workstream_count == 1 or workstream_count == '1' or workstream_count == '') or force_single_workstream == 'true')
    recipe: "default-workflow"
    # No explicit context needed: task_description and repo_path flow through
    # from the parent smart-orchestrator context automatically via context merging
    # in _execute_sub_recipe().
    output: "round_1_result"

  - id: "execute-single-round-1-investigation"
    type: "recipe"
    # workstream_count may be Number or String (fix #3606, supersedes #3570).
    condition: |
      'Investigation' in task_type and ((workstream_count == 1 or workstream_count == '1' or workstream_count == '') or force_single_workstream == 'true')
    recipe: "investigation-workflow"
    # No explicit context needed: task_description and repo_path flow through
    # from the parent smart-orchestrator context automatically via context merging
    # in _execute_sub_recipe().
    output: "round_1_result"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2d: Parallel workstreams -- round 1
  # ─────────────────────────────────────────────────────────────────────────

  - id: "create-workstreams-config"
    type: "bash"
    # workstream_count may be Number or String (fix #3606, supersedes #3570).
    condition: |
      ('Development' in task_type or 'Investigation' in task_type) and workstream_count != 1 and workstream_count != '1' and workstream_count != '' and 'ALLOWED' in recursion_guard and force_single_workstream != 'true'
    command: |
      _DECOMP_TMPFILE=$(mktemp)
      trap 'rm -f "$_DECOMP_TMPFILE"' EXIT
      # FIX (heredoc-bulletproof): use env var — no heredoc needed.
      printf '%s' "$DECOMPOSITION_JSON" > "$_DECOMP_TMPFILE"
      amplihack orch helper build-workstreams-config < "$_DECOMP_TMPFILE"
    output: "workstreams_file"

  - id: "launch-parallel-round-1"
    type: "bash"
    # workstream_count may be Number or String (fix #3606, supersedes #3570).
    condition: |
      ('Development' in task_type or 'Investigation' in task_type) and workstream_count != 1 and workstream_count != '1' and workstream_count != '' and 'ALLOWED' in recursion_guard and force_single_workstream != 'true'
    command: |
      set -o pipefail
      # Emit step-transition marker for progress tracking (#3625)
      echo '{"transition":"step_started","step":"launch-parallel-round-1","timestamp":'$(date +%s)'}' >&2
      REPO_PATH="$REPO_PATH"
      WS_FILE="$WORKSTREAMS_FILE"
      # FIX (#469/#311): Use env var — safe against injection and word-splitting.
      SESSION_JSON="$SESSION_INFO"
      # #283: parse tree_id, depth, and workstreams count using jq instead of
      # inline Python. jq is a standard CLI tool and removes a python3 heredoc.
      TREE_ID=$(printf '%s' "$SESSION_JSON" | jq -r '.tree_id // ""' 2>/dev/null || echo "")
      SESSION_DEPTH=$(printf '%s' "$SESSION_JSON" | jq -r '.depth // 0' 2>/dev/null || echo "0")
      if [ -n "$WS_FILE" ] && [ -f "$WS_FILE" ]; then
        WS_COUNT_CHECK=$(jq 'length' "$WS_FILE" 2>/dev/null || echo "0")
      else
        WS_COUNT_CHECK=0
      fi
      TREE_ID=${TREE_ID:-}
      SESSION_DEPTH=${SESSION_DEPTH:-0}
      WS_COUNT_CHECK=${WS_COUNT_CHECK:-0}

      if [ -z "$WS_FILE" ] || [ ! -f "$WS_FILE" ]; then
        echo "ERROR: workstreams_file is missing or empty. create-workstreams-config may have failed." >&2
        emit_step_transition fail
        exit 1
      fi

      if [ "$WS_COUNT_CHECK" = "0" ]; then
        echo "ERROR: workstreams config has 0 entries — decomposition may have failed." >&2
        emit_step_transition fail
        exit 1
      fi

      if [ ! -d "$REPO_PATH" ]; then
        echo "ERROR: repo_path does not exist: $REPO_PATH" >&2
        emit_step_transition fail
        exit 1
      fi
      cd "$REPO_PATH"

      # Resolve multitask orchestrator from AMPLIHACK_HOME, not from repo root.
      # The orchestrator.py is an amplihack asset, not a repo file (#3762).
      ORCH_SCRIPT=""
      for candidate in \
        "${AMPLIHACK_HOME:+$AMPLIHACK_HOME/.claude/skills/multitask/orchestrator.py}" \
        "${HOME}/.amplihack/.claude/skills/multitask/orchestrator.py" \
        "${HOME}/.copilot/skills/multitask/orchestrator.py" \
        ".claude/skills/multitask/orchestrator.py"; do
        if [ -n "$candidate" ] && [ -f "$candidate" ]; then
          ORCH_SCRIPT="$candidate"
          break
        fi
      done
      if [ -z "$ORCH_SCRIPT" ]; then
        echo "ERROR: multitask orchestrator.py not found." >&2
        echo "  Searched: AMPLIHACK_HOME/.claude/skills/multitask/orchestrator.py" >&2
        echo "  Set AMPLIHACK_HOME or ensure amplihack is installed." >&2
        emit_step_transition fail
        exit 1
      fi
      echo "Selected orchestrator source: $ORCH_SCRIPT" >&2

      echo "Launching parallel workstreams (tree: $TREE_ID, depth: $SESSION_DEPTH):"
      cat "$WS_FILE"
      echo "---"
      status=0
      AMPLIHACK_TREE_ID="$TREE_ID" AMPLIHACK_SESSION_DEPTH="$SESSION_DEPTH" \
        AMPLIHACK_PARENT_STEP="launch-parallel-round-1" \
        AMPLIHACK_REPO_PATH="$REPO_PATH" \
        python3 -u "$ORCH_SCRIPT" "$WS_FILE" | tee /dev/stderr || status=$?
      # Clean up workstreams file now, before this step's output inflates
      # the recipe context. Doing it here avoids the E2BIG error that
      # occurs when a later bash step inherits megabytes of env vars
      # from accumulated round_1_result (fix: cleanup-helper-arg-overflow).
      rm -f "$WS_FILE" 2>/dev/null || true
      exit $status
    output: "round_1_result"

  # ─────────────────────────────────────────────────────────────────────────
  # Recursion depth limit: adapt to single-session execution
  # Uses the task-appropriate sub-recipe (default-workflow for Development,
  # investigation-workflow for Investigation) so workflow steps are enforced
  # even when parallel spawning is blocked.
  # This is an ADAPTIVE strategy (announced via recursion_guard), not a
  # degradation — the depth-limited banner makes the change visible.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "execute-single-fallback-blocked-development"
    type: "recipe"
    # Fires when blocked from spawning subworkstreams — adapts to single session
    # workstream_count may be Number or String (fix #3606, supersedes #3570).
    condition: |
      'Development' in task_type and 'BLOCKED' in recursion_guard and workstream_count != 1 and workstream_count != '1' and workstream_count != ''
    recipe: "default-workflow"
    # No explicit context needed: task_description and repo_path flow through
    # from the parent smart-orchestrator context automatically.
    output: "round_1_result"

  - id: "execute-single-fallback-blocked-investigation"
    type: "recipe"
    # Fires when blocked from spawning subworkstreams — adapts to single session
    # workstream_count may be Number or String (fix #3606, supersedes #3570).
    condition: |
      'Investigation' in task_type and 'BLOCKED' in recursion_guard and workstream_count != 1 and workstream_count != '1' and workstream_count != ''
    recipe: "investigation-workflow"
    # No explicit context needed: task_description and repo_path flow through
    # from the parent smart-orchestrator context automatically.
    output: "round_1_result"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2e: Adaptive error recovery (fix #3132)
  # When ALL execution paths are skipped (round_1_result is empty), this
  # is an infrastructure or routing error. Instead of silently producing
  # no results, surface the error, file a bug, and attempt direct recipe
  # invocation as an ADAPTIVE STRATEGY (announced, not silent).
  # ─────────────────────────────────────────────────────────────────────────

  - id: "detect-execution-gap"
    type: "bash"
    condition: |
      ('Development' in task_type or 'Investigation' in task_type) and not round_1_result
    command: |
      TASK_TYPE="$TASK_TYPE"
      WS_COUNT="$WORKSTREAM_COUNT"
      FORCE_SINGLE="$FORCE_SINGLE_WORKSTREAM"
      GUARD="$RECURSION_GUARD"

      cat >&2 <<ERRMSG

      ╔══════════════════════════════════════════════════════════════════╗
      ║  ERROR: No execution path produced results                     ║
      ║  All routing conditions evaluated to false — this indicates    ║
      ║  a routing or infrastructure bug in smart-orchestrator.        ║
      ║                                                                ║
      ║  Diagnostic context:                                           ║
      ║    task_type:               $TASK_TYPE                         ║
      ║    workstream_count:        $WS_COUNT                          ║
      ║    force_single_workstream: $FORCE_SINGLE                      ║
      ║    recursion_guard:         $GUARD                             ║
      ╚══════════════════════════════════════════════════════════════════╝

      ERRMSG

      # Determine the appropriate direct recipe based on task type
      if echo "$TASK_TYPE" | grep -qi "investigation"; then
        RECIPE="investigation-workflow"
      else
        RECIPE="default-workflow"
      fi

      echo "[ADAPTIVE] No execution path ran for $TASK_TYPE task." >&2
      echo "[ADAPTIVE] Switching to direct $RECIPE invocation." >&2
      echo "$RECIPE"
    output: "adaptive_recipe"

  - id: "file-routing-bug"
    type: "bash"
    condition: |
      adaptive_recipe and adaptive_recipe != ''
    command: |
      TASK_TYPE="$TASK_TYPE"
      WS_COUNT="$WORKSTREAM_COUNT"
      FORCE_SINGLE="$FORCE_SINGLE_WORKSTREAM"
      GUARD="$RECURSION_GUARD"
      RECIPE="$ADAPTIVE_RECIPE"
      # FIX (#469/#311): Use env var — safe against injection and word-splitting.
      TASK_DESC="$TASK_DESCRIPTION"

      # Build diagnostic body
      BODY=$(cat <<EOFBODY
      ## smart-orchestrator routing gap: no execution path ran

      **Symptom**: All execution routing conditions evaluated to false.
      No execution step (single, parallel, or blocked-fallback) ran.

      ### Diagnostic context
      - task_type: \`$TASK_TYPE\`
      - workstream_count: \`$WS_COUNT\`
      - force_single_workstream: \`$FORCE_SINGLE\`
      - recursion_guard: \`$GUARD\`
      - adaptive_recipe selected: \`$RECIPE\`

      ### Task description (truncated)
      $(echo "$TASK_DESC" | head -c 500)

      ### Environment
      - AMPLIHACK_HOME: \`${AMPLIHACK_HOME:-<unset>}\`
      - recipe-runner-rs: \`$(which recipe-runner-rs 2>/dev/null || echo '<not found>')\`
      - hostname: \`$(hostname -s 2>/dev/null || echo unknown)\`
      - date: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`

      ### Expected behavior
      At least one execution path should have run based on the classification.
      The adaptive strategy step ran \`$RECIPE\` directly to recover.

      ---
      *Auto-filed by smart-orchestrator adaptive error recovery (fix #3132)*
      EOFBODY
      )

      # Attempt to file a GH issue — non-fatal if gh is unavailable or auth fails
      ISSUE_URL=$(gh issue create \
        --title "smart-orchestrator routing gap: $TASK_TYPE task, workstream_count=$WS_COUNT" \
        --body "$BODY" \
        --label "bug" 2>/dev/null) || true

      if [ -n "$ISSUE_URL" ]; then
        echo "[ADAPTIVE] Filed infrastructure bug: $ISSUE_URL" >&2
        echo "$ISSUE_URL"
      else
        # Log the diagnostic info so it's preserved even if filing fails
        DIAG_FILE=$(mktemp /tmp/smart-orch-diag-XXXXXX.md)
        echo "$BODY" > "$DIAG_FILE"
        echo "[ADAPTIVE] Could not file GH issue (gh unavailable or auth failed)." >&2
        echo "[ADAPTIVE] Diagnostic info saved to: $DIAG_FILE" >&2
        echo "diag:$DIAG_FILE"
      fi
    output: "infra_error_details"

  - id: "adaptive-execute-development"
    type: "recipe"
    condition: |
      adaptive_recipe == 'default-workflow'
    recipe: "default-workflow"
    output: "round_1_result"

  - id: "adaptive-execute-investigation"
    type: "recipe"
    condition: |
      adaptive_recipe == 'investigation-workflow'
    recipe: "investigation-workflow"
    output: "round_1_result"

  # Cleanup temp workstreams file (best-effort fallback).
  # Primary cleanup happens inside launch-parallel-round-1 before context
  # bloat.  This step uses a glob instead of {{workstreams_file}} so it
  # carries no template variables — reducing the env-var payload the Rust
  # runner passes to bash.  The command is unconditionally successful so a
  # cleanup failure never aborts the recipe (fix: cleanup-helper-arg-overflow).
  - id: "cleanup-helper"
    fatal: false
    type: "bash"
    command: |
      rm -f /tmp/smart-orch-ws-*.json 2>/dev/null || true
      echo "ok"
    output: "cleanup_status"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 3: Goal-seeking reflection loop (up to 3 rounds)
  # Pattern from auto-workflow.yaml: CONTINUE/COMPLETE on each round.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "reflect-round-1"
    type: "agent"
    timeout_seconds: 300
    condition: |
      'Q&A' not in task_type and ('Operations' not in task_type or ops_modified_files) and round_1_result
    agent: "amplihack:core:reviewer"
    prompt: |
      Evaluate goal achievement after round 1.

      **Goal + Success Criteria**: {{decomposition_json}}
      **Round 1 Result**: {{round_1_result}}

      Was each success criterion met?

      ## Hollow Success Detection

      A hollow success is when execution completes structurally but agents
      clearly could not perform the work. Only flag HOLLOW when ALL of these
      are true:
      1. Agent explicitly states it cannot access the codebase, repository,
         or files (e.g. "no codebase exists", "I could not access the code",
         "cannot find the repository")
      2. No concrete code changes, findings, or artifacts are described
      3. The round result contains no file paths, diff output, test results,
         or specific code references

      Do NOT flag HOLLOW when:
      - The agent completed the work but results are partial or imperfect
      - Some success criteria are met but others are not (use PARTIAL instead)
      - The agent produced real output with specific findings, even if brief
      - The task was investigative and the agent reported concrete conclusions

      If the result is a hollow success, use GOAL_STATUS: HOLLOW and explain
      what specific outputs are missing. When in doubt between HOLLOW and
      PARTIAL, choose PARTIAL — it triggers a follow-up round rather than
      flagging a false infrastructure failure.

      ## Adaptive Strategy Context

      If an infrastructure error was detected and adaptive strategy was used:
      **Adaptive recipe**: {{adaptive_recipe}}
      **Error details**: {{infra_error_details}}

      Factor this into your evaluation — if the task ran via adaptive strategy
      due to a routing failure, note this in your assessment.

      End with EXACTLY one of:
      - `GOAL_STATUS: ACHIEVED` -- all criteria met with verifiable evidence
      - `GOAL_STATUS: PARTIAL -- [what's missing]` -- needs another round
      - `GOAL_STATUS: NOT_ACHIEVED -- [reason]` -- needs another round
      - `GOAL_STATUS: HOLLOW -- [what was empty]` -- agents ran but produced no real work
    output: "reflection_1"

  - id: "execute-round-2"
    type: "agent"
    timeout_seconds: 600
    condition: |
      reflection_1 and ('PARTIAL' in reflection_1 or 'NOT_ACHIEVED' in reflection_1 or 'HOLLOW' in reflection_1)
    agent: "amplihack:core:builder"
    prompt: |
      Round 1 was incomplete. Continue from where it left off.

      **Original Goal**: {{decomposition_json}}
      **Round 1 Result**: {{round_1_result}}
      **What's Missing**: {{reflection_1}}

      Address only what's missing. Do not redo completed work.
      Create PRs for new changes. Report PR URLs.
      End with "STATUS: COMPLETE" or "STATUS: CONTINUE".
    output: "round_2_result"

  - id: "reflect-round-2"
    type: "agent"
    timeout_seconds: 300
    condition: |
      round_2_result and ('PARTIAL' in reflection_1 or 'NOT_ACHIEVED' in reflection_1)
    agent: "amplihack:core:reviewer"
    prompt: |
      Evaluate goal achievement after round 2.

      **Goal**: {{decomposition_json}}
      **Round 1**: {{round_1_result}}
      **Round 2**: {{round_2_result}}

      End with:
      - `GOAL_STATUS: ACHIEVED`
      - `GOAL_STATUS: PARTIAL -- [gaps]`
      - `GOAL_STATUS: NOT_ACHIEVED -- [reason]`
    output: "reflection_2"

  - id: "execute-round-3"
    type: "agent"
    timeout_seconds: 600
    condition: |
      reflection_2 and ('PARTIAL' in reflection_2 or 'NOT_ACHIEVED' in reflection_2)
    agent: "amplihack:core:builder"
    prompt: |
      Final round. Complete as much remaining work as possible.

      **Original Goal**: {{decomposition_json}}
      **Round 2 Result**: {{round_2_result}}
      **Round 2 Gaps**: {{reflection_2}}

      Prioritize the most critical missing items. This is the last round.
      Report what was and was not completed.
      End with "STATUS: COMPLETE" or "STATUS: PARTIAL".
    output: "round_3_result"

  - id: "reflect-final"
    type: "agent"
    timeout_seconds: 300
    condition: "'Q&A' not in task_type and ('Operations' not in task_type or ops_modified_files) and round_1_result"
    agent: "amplihack:core:reviewer"
    prompt: |
      Final assessment after all execution rounds.

      **Goal**: {{decomposition_json}}

      **Results**:
      - Round 1: {{round_1_result}}
      - Round 2 (if any): {{round_2_result}}
      - Round 3 (if any): {{round_3_result}}

      Note: empty strings above mean that round was not needed.

      Was the overall goal achieved? Summarize what was done.
      End with `GOAL_STATUS: ACHIEVED`, `GOAL_STATUS: PARTIAL -- [gaps]`,
      or `GOAL_STATUS: NOT_ACHIEVED -- [reason]`.
    output: "reflection_final"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 4: Outside-In Testing Validation
  # Mandatory for ALL Development tasks — single and multi-workstream alike.
  #
  # FIX (#2925): The previous condition required PR URLs in round_1_result.
  # For parallel/multitask workstreams, round_1_result is the orchestrator
  # report which never contains PR URLs, so this step was always SKIPPED.
  # Fixed by removing the PR-URL requirement: validation now runs for any
  # Development task that produced results, letting the reviewer agent
  # determine if PRs exist and whether outside-in testing was performed.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "validate-outside-in-testing"
    type: "agent"
    timeout_seconds: 300
    condition: "'Q&A' not in task_type and ('Operations' not in task_type or ops_modified_files) and 'Development' in task_type and round_1_result"
    agent: "amplihack:core:reviewer"
    prompt: |
      Outside-in testing validation check.

      **Task**: {{task_description}}

      **Execution results**:
      - Round 1: {{round_1_result}}
      - Round 2 (if any): {{round_2_result}}
      - Round 3 (if any): {{round_3_result}}

      ## Important: Multi-Workstream Execution

      If Round 1 looks like an orchestrator report (contains "PARALLEL WORKSTREAM
      REPORT" or lists multiple workstreams with log paths), this was a parallel
      multitask execution. In that case, PR URLs will NOT appear directly in the
      round results — they are in each workstream's individual log file.

      For parallel workstreams: inspect the round results for evidence that each
      workstream completed, and check whether the log references mention outside-in
      testing being performed (look for "Step 13", "qa-team", "outside-in-testing", or
      "local testing" references in the results).

      ## Validation Steps

      1. Determine execution mode:
         - **Single workstream**: PR URL appears directly in round results
         - **Parallel workstreams**: Round 1 is an orchestrator report; PR URLs
           are in individual workstream logs

      2. For each workstream, determine whether outside-in testing was performed:
         - Look for "Step 13: Local Testing Results" evidence
         - Look for `qa-team` or `outside-in-testing` skill invocation
         - Look for at least 2 test scenario results (PASS/FAIL)

      3. Report your findings in this format:

         ```
         OUTSIDE-IN TESTING VALIDATION REPORT
         =====================================
         Execution mode: single / parallel
         PR(s) found: <list PR URLs or "see workstream logs">

         For each workstream:
           - Workstream: <name or PR URL>
           - qa-team / outside-in-testing skill invoked: YES / NO / UNKNOWN
           - Step 13 results documented: YES / NO / UNKNOWN
           - Test scenarios executed: <count or UNKNOWN>
           - VERDICT: PASS / FAIL / CANNOT_VERIFY
         ```

      4. If ALL workstreams have PASS or CANNOT_VERIFY verdict, end with:
         `OUTSIDE_IN_VALIDATION: PASSED`

      5. If ANY workstream has FAIL verdict (evidence shows testing was skipped),
         end with:
         `OUTSIDE_IN_VALIDATION: FAILED -- <describe which workstreams are missing outside-in testing>`

         When FAILED, state clearly what outside-in testing is missing and the
         command the developer should run to complete it.

      6. If no Development work was done (e.g., task was purely informational
         and produced no code changes or PRs), end with:
         `OUTSIDE_IN_VALIDATION: N/A -- no code changes produced`
    output: "outside_in_validation"

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 5: Summary
  # ─────────────────────────────────────────────────────────────────────────

  - id: "summarize"
    type: "agent"
    timeout_seconds: 300
    condition: "'Q&A' not in task_type and ('Operations' not in task_type or ops_modified_files) and round_1_result"
    agent: "amplihack:core:architect"
    prompt: |
      Produce a concise execution summary.

      **Task**: {{task_description}}
      **Final Reflection**: {{reflection_final}}
      **Outside-In Testing Validation**: {{outside_in_validation}}
      **Round 1**: {{round_1_result}}
      **Round 2 (if any)**: {{round_2_result}}
      **Round 3 (if any)**: {{round_3_result}}

      Note: empty strings above mean that round was not needed.

      **Adaptive strategy used**: {{adaptive_recipe}}
      **Infrastructure error details**: {{infra_error_details}}

      Provide:
      1. What was accomplished (2-3 sentences)
      2. PR links (if any)
      3. Outside-in testing status (PASSED / FAILED / N/A — not applicable when no PR was created)
      4. Goal status (ACHIEVED / PARTIAL / NOT_ACHIEVED / HOLLOW)
      5. Remaining work if PARTIAL or if outside-in testing FAILED
      6. If adaptive strategy was used, note what failed and what strategy was applied
    output: "summary"

  # ─────────────────────────────────────────────────────────────────────────
  # Teardown: mark this session complete in the session tree
  # Runs unconditionally so the slot is freed even on partial/failed runs.
  # Combines session completion + workflow semaphore clearing in one Python call.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "complete-session"
    type: "bash"
    command: |
      # FIX (#469/#311): Use env var — safe against injection and word-splitting.
      SESSION_JSON="$SESSION_INFO"
      TREE_SCRIPT="$(amplihack resolve-bundle-asset session-tree-path 2>/dev/null || true)"
      HOOKS_DIR="$(amplihack resolve-bundle-asset hooks-dir 2>/dev/null || true)"
      # #283: parse session fields via jq instead of inline Python.
      SESSION_ID=$(printf '%s' "$SESSION_JSON" | jq -r '.session_id // ""' 2>/dev/null || echo "")
      TREE_ID=$(printf '%s' "$SESSION_JSON" | jq -r '.tree_id // ""' 2>/dev/null || echo "")
      STATUS=$(printf '%s' "$SESSION_JSON" | jq -r '.status // ""' 2>/dev/null || echo "")
      # Clear workflow-active semaphore so the hook resumes injection.
      # The dev_intent_router hook is still Python; tracked separately in #285.
      if [ -n "$HOOKS_DIR" ] && [ -d "$HOOKS_DIR" ]; then
        HOOKS_DIR="$HOOKS_DIR" python3 <<'PYEOF' 2>/dev/null || true
      import os, sys
      try:
          sys.path.insert(0, os.environ.get('HOOKS_DIR', ''))
          from dev_intent_router import clear_workflow_active
          clear_workflow_active()
      except Exception:
          pass
      PYEOF
      fi
      SESSION_ID=${SESSION_ID:-}
      TREE_ID=${TREE_ID:-}
      STATUS=${STATUS:-}

      if [ -n "$SESSION_ID" ] && [ "$STATUS" = "ok" ] && [ -f "$TREE_SCRIPT" ]; then
        AMPLIHACK_TREE_ID="$TREE_ID" python3 "$TREE_SCRIPT" complete "$SESSION_ID"
        echo "Session $SESSION_ID completed in tree $TREE_ID"
      else
        echo "No session to complete (status: ${STATUS:-empty})"
      fi
    output: "session_complete_status"

output:
  format: "markdown"
  template: |
    # Dev Orchestrator -- Execution Complete

    **Task**: {{task_description}}
    **Type**: {{task_type}}
    **Workstreams**: {{workstream_count}}
    **Adaptive strategy**: {{adaptive_recipe}}

    ## Summary

    {{summary}}

    ---
    *amplihack dev-orchestrator v1.5.0 (smart-orchestrator)*
