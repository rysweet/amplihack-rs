name: "smart-orchestrator"
description: "Composable smart task orchestrator — classify, route, reflect, validate via 4 phase sub-recipes"
version: "3.0.0"
author: "Amplihack Team"
tags: ["smart-orchestrator","orchestrator","composable","classify","route","reflect"]

# SMART_ORCHESTRATOR (v3): Composable Phase Sub-Recipes
#
# Same multi-phase contract as v2, but the 28 steps live in four focused
# bricks. Each brick is independently editable, testable, and reusable:
#
#   1. smart-classify-route       — preflight + classify + parse + activate + session
#   2. smart-execute-routing      — Q&A/Ops/dev routing (single + parallel + fallback + adaptive)
#   3. smart-reflect-loop         — 3-round goal-seeking reflection
#   4. smart-validate-summarize   — outside-in validation + summary + completion
#
# Context flows automatically between sub-recipes via recipe-runner's
# _execute_sub_recipe() merging. task_type, workstream_count, recursion_guard,
# round_N_result, and other intermediate outputs propagate forward.

context:
  task_description: ""
  repo_path: "."
  # Issue #342: target an existing PR branch in sub-recipes.
  # Propagated automatically to default-workflow / consensus-workflow via
  # context-merging. Empty strings preserve legacy behaviour.
  existing_branch: ""
  pr_number: ""
  decomposition_json: ""
  session_id: ""
  tree_id: ""
  session_info: ""
  task_type: ""
  workstream_count: ""
  workstreams_file: ""
  recursion_guard: ""
  round_1_result: ""
  reflection_1: ""
  round_2_result: ""
  reflection_2: ""
  round_3_result: ""
  reflection_final: ""
  summary: ""
  session_complete_status: ""
  force_single_workstream: "false" # set to "true" to prevent parallel decomposition
  adaptive_recipe: "" # set by detect-execution-gap when routing fails
  infra_error_details: "" # diagnostic info for infrastructure failures
  ops_modified_files: "" # set by ops-file-change-check when Operations modifies files
  # Skip pre-agent project validation (npm test, build) — default true to avoid blocking on large codebases (see #453)
  skip_pre_agent_validation: "true"

context_validation:
  task_description: "nonempty"
  repo_path: "git_repo"

steps:
  - id: "smart-classify-route"
    type: "recipe"
    recipe: "smart-classify-route"

  - id: "smart-execute-routing"
    type: "recipe"
    recipe: "smart-execute-routing"

  - id: "smart-reflect-loop"
    type: "recipe"
    recipe: "smart-reflect-loop"

  - id: "smart-validate-summarize"
    type: "recipe"
    recipe: "smart-validate-summarize"
