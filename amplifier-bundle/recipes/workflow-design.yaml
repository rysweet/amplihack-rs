name: "workflow-design"
description: "Phase 2: architecture, API/DB/security design, docs (05-06d)"
version: "1.0.0"
author: "Amplihack Team"
tags: ["development", "design", "architecture"]

# workflow-design: extracted from default-workflow.yaml as a composable phase brick.
#
# Preserves every original step verbatim — the layered review steps the LLM
# converges through must remain intact. Context flows in from the parent
# workflow via recipe-runner's automatic context-merging in
# `_execute_sub_recipe()`; outputs declared by these steps propagate back to
# the parent and are visible to subsequent phase recipes.

recursion:
  max_depth: 6
  max_total_steps: 80

context: {}

steps:
  - id: "step-05-architecture"
    agent: "amplihack:architect"
    working_dir: "{{worktree_setup.worktree_path}}"
    prompt: |
      # Step 5: Research and Design - Architecture

      **Task:** {{task_description}}
      **Requirements:** {{final_requirements}}
      **Codebase Analysis:** {{codebase_analysis}}
      **Worktree:** {{worktree_setup}}

      Design the solution architecture:

      1. Identify components involved
      2. Define module boundaries
      3. Plan implementation approach
      4. Document module specifications
      5. Identify risks and dependencies

      Consider the INVESTIGATION-FIRST PATTERN if the codebase is unfamiliar.

      ## Automated GitHub Actions failure investigation contract

      If the task reports scheduled action runs, automated action failures, or
      GitHub Actions workflow failures, prove the failing runs from GitHub
      Actions evidence before proposing code changes:

      1. Confirm the GitHub CLI service adapter is usable with
         `gh auth status`; use the existing authenticated session only and do
         not create, print, or persist tokens.
      2. Check true schedule-event runs first:
         `gh run list --event schedule --limit 50`.
      3. If there are no true schedule-event failures, state exactly:
         `No recent `schedule` event failures found; treating the report as
         user-reported automated GitHub Actions failures.`
      4. Then inspect recent failed automation:
         `gh run list --status failure --limit 50`.
      5. For each relevant failed run, inspect metadata and failed logs:
         `gh run view RUN_ID --json name,url,event,headBranch,headSha,status,conclusion`
         and `gh run view RUN_ID --log-failed`.
      6. For GitHub service errors, fail visibly: record the command,
         permission/authentication failure, rate limit, network failure, or
         missing log access. Retry once only for transient rate limit or
         network errors; if the retry still fails, classify the run as
         external-transient or inaccessible and do not infer a repo root cause.
      7. Produce an evidence table with: workflow, run URL, event,
         branch/SHA, failing job, failing step, root-cause excerpt, and
         classification.
      8. Classify each failure as one of: repo-caused,
         generated-template-caused, external-transient, stale, unrelated, or
         inaccessible.
      9. Select code/config changes only for repo-caused or
         generated-template-caused failures; do not patch external-transient,
         stale, unrelated, or inaccessible failures.
      10. Implement the narrowest fix and add regression coverage or equivalent
         static validation for the proven failure mode.
      11. Closure must include `pre-commit run --all-files`, targeted tests,
         `gh pr create`, `gh pr checks --watch`, and evidence that the PR is
         merge-ready.

      Output a comprehensive design specification.
    output: "architecture_design"

  - id: "step-05b-api-design"
    agent: "amplihack:api-designer"
    working_dir: "{{worktree_setup.worktree_path}}"
    prompt: |
      # Step 5b: API Design (if applicable)

      **Architecture:** {{architecture_design}}
      **Requirements:** {{final_requirements}}

      Design API contracts:
      - Endpoint definitions
      - Request/response schemas
      - Error handling patterns
      - Versioning strategy

      Skip if no API work is required.
    output: "api_design"

  - id: "step-05c-database-design"
    agent: "amplihack:database"
    working_dir: "{{worktree_setup.worktree_path}}"
    prompt: |
      # Step 5c: Database Design (if applicable)

      **Architecture:** {{architecture_design}}
      **Requirements:** {{final_requirements}}

      Design data model:
      - Schema definitions
      - Migrations needed
      - Indexes and constraints
      - Data relationships

      Skip if no database work is required.
    output: "database_design"

  - id: "step-05d-security-review"
    agent: "amplihack:security"
    working_dir: "{{worktree_setup.worktree_path}}"
    prompt: |
      # Step 5d: Security Requirements Review

      **Architecture:** {{architecture_design}}
      **Requirements:** {{final_requirements}}
      **API Design:** {{api_design}}
      **Database Design:** {{database_design}}

      Identify security requirements:
      - Authentication/authorization needs
      - Input validation requirements
      - Data protection considerations
      - Security risks and mitigations

      Provide security guidelines for implementation.
    output: "security_requirements"

  - id: "step-05e-design-consolidation"
    agent: "amplihack:architect"
    working_dir: "{{worktree_setup.worktree_path}}"
    prompt: |
      # Step 5e: Design Consolidation

      **Architecture:** {{architecture_design}}
      **API Design:** {{api_design}}
      **Database Design:** {{database_design}}
      **Security Requirements:** {{security_requirements}}

      Consolidate all design inputs into a final implementation plan:

      ```json
      {
        "components": [{"name": "...", "action": "create/modify", "purpose": "..."}],
        "files_to_change": ["list of file paths"],
        "new_files": ["files to create"],
        "test_files": ["test files to create/modify"],
        "implementation_order": ["ordered steps"],
        "risks": ["potential issues"],
        "security_considerations": ["security notes"]
      }
      ```
    output: "design_spec"
    parse_json: true

  # ==========================================================================
  # STEP 6: RETCON DOCUMENTATION WRITING
  # ==========================================================================
  - id: "step-06-documentation"
    agent: "amplihack:documentation-writer"
    working_dir: "{{worktree_setup.worktree_path}}"
    prompt: |
      # Step 6: Retcon Documentation Writing

      **Task:** {{task_description}}
      **Requirements:** {{final_requirements}}
      **Design Specification:** {{design_spec}}

      Write documentation for the feature AS IF IT ALREADY EXISTS.
      This is "retcon" documentation - describing the finished state.

      Write ONLY the documentation, NOT the code:
      - Usage documentation
      - API documentation (if applicable)
      - Configuration documentation
      - Examples and tutorials

      This documentation serves as the specification for implementation.
    output: "documentation"

  - id: "step-06b-documentation-review"
    agent: "amplihack:architect"
    working_dir: "{{worktree_setup.worktree_path}}"
    # Documentation review is a QUALITY SIGNAL, not a gate (#834): non-fatal so a
    # failed/empty review never discards durable upstream work. The follow-on
    # step-06b-checkpoint-doc-review reports the degraded state (see its header).
    continue_on_error: true
    prompt: |
      # Step 6b: Documentation Review

      **Design Specification:** {{design_spec}}
      **Documentation:** {{documentation}}

      Review the documentation to verify:
      1. Aligns with the architectural vision
      2. Accurately describes intended behavior
      3. Highlights any changes needed to the design

      Provide feedback for documentation refinement.
    output: "doc_review_feedback"

  - id: "step-06c-documentation-refinement"
    agent: "amplihack:documentation-writer"
    working_dir: "{{worktree_setup.worktree_path}}"
    continue_on_error: true
    prompt: |
      # Step 6c: Documentation Refinement

      **Original Documentation:** {{documentation}}
      **Architect Feedback:** {{doc_review_feedback}}

      Revise the documentation based on the architect's review.
      Ensure it accurately represents the feature we will build.
    output: "final_documentation"

  # ==========================================================================
  # STEP 6b-CHECKPOINT: NON-FATAL DOCUMENTATION-REVIEW CHECKPOINT (#834)
  # ==========================================================================
  # step-06b-documentation-review carries `continue_on_error: true`, so a failed
  # or empty review no longer hard-fails the workflow and destroys durable work
  # already produced upstream (pushed commits, opened/merged PRs, posted review
  # threads). This checkpoint records that degraded-success state: it emits a
  # visible WARNING on stderr and writes a machine-consumable NEEDS_ATTENTION
  # summary (the `doc_review_checkpoint` output) listing every durable artifact
  # reference it can see, so the recipe summary shows what SUCCEEDED plus the
  # doc-review follow-up item — instead of a generic 'failed'.
  #
  # Security: the untrusted agent feedback is consumed strictly as DATA. It is
  # piped through `printf '%s'` into grep and is NEVER interpolated into the
  # summary or used to build a command. Only fixed markers + allow-listed,
  # non-sensitive metadata refs are printed. No eval/source/indirect expansion,
  # no env/secret dumps. `set -uo pipefail` without `-e`; structurally exits 0.
  - id: "step-06b-checkpoint-doc-review"
    type: "bash"
    command: |
      set -uo pipefail

      # Untrusted documentation-review feedback, flattened to an env var by the
      # runner (same convention as ISSUE_NUMBER in step-06d). Consumed as data.
      DOC_FEEDBACK="${DOC_REVIEW_FEEDBACK:-}"

      # Durable artifact references — each guarded so an absent ref is omitted
      # rather than raising an unbound-variable error. Allow-list only; these are
      # non-sensitive metadata (no tokens/secrets), with fallbacks for the
      # alternate names the runner may flatten depending on the producing step.
      BRANCH_REF="${BRANCH_NAME:-${WORKTREE_SETUP_BRANCH:-}}"
      PR_NUMBER_REF="${PR_NUMBER:-${PULL_REQUEST_NUMBER:-}}"
      PR_URL_REF="${PR_URL:-${PULL_REQUEST_URL:-}}"
      COMMIT_REF="${COMMIT_SHA:-${HEAD_SHA:-}}"
      REVIEW_THREAD_REF="${REVIEW_THREAD_ID:-${REVIEW_COMMENT_ID:-}}"

      # Classify the review outcome. Failure/empty is checked first so mixed or
      # missing feedback is treated conservatively as a follow-up item. Empty
      # feedback means the review produced no notes (the agent step likely
      # errored out under continue_on_error) — still flag it for attention.
      STATUS="OK"
      REASON="documentation-review passed"
      if [ -z "$DOC_FEEDBACK" ]; then
        STATUS="NEEDS_ATTENTION"
        REASON="documentation-review produced no feedback (step may have failed)"
      elif printf '%s' "$DOC_FEEDBACK" | grep -qiE 'fail|error|cannot|could not|unable|missing|incomplete|does not|blocker'; then
        STATUS="NEEDS_ATTENTION"
        REASON="documentation-review reported issues requiring follow-up"
      fi

      if [ "$STATUS" = "NEEDS_ATTENTION" ]; then
        # Visible, non-swallowed diagnostic on stderr.
        echo "WARNING: step-06b-documentation-review did not cleanly pass: ${REASON}." >&2
        echo "WARNING: continuing — documentation review is a quality signal, not a gate;" >&2
        echo "WARNING: durable work (commits/PRs/review threads) is preserved and summarized below." >&2
      fi

      # Machine-consumable summary on stdout — becomes the step output and lands
      # in the recipe summary. Only fixed markers + allow-listed refs are emitted.
      echo "DOC_REVIEW_CHECKPOINT: ${STATUS}"
      echo "  reason: ${REASON}"
      if [ "$STATUS" = "NEEDS_ATTENTION" ]; then
        echo "  marker: NEEDS_ATTENTION"
        echo "  follow_up: re-run documentation-review or address the noted gaps"
      fi
      echo "  durable_artifacts:"
      [ -n "$BRANCH_REF" ]        && echo "    branch: ${BRANCH_REF}"
      [ -n "$PR_NUMBER_REF" ]     && echo "    pr_number: ${PR_NUMBER_REF}"
      [ -n "$PR_URL_REF" ]        && echo "    pr_url: ${PR_URL_REF}"
      [ -n "$COMMIT_REF" ]        && echo "    commit_sha: ${COMMIT_REF}"
      [ -n "$REVIEW_THREAD_REF" ] && echo "    review_thread: ${REVIEW_THREAD_REF}"

      # Structurally non-fatal: always succeed so reconciliation/summary runs.
      exit 0
    output: "doc_review_checkpoint"

  # ==========================================================================
  # STEP 6d: PRE-FLIGHT "GOAL ALREADY MET" PROBE (#368)
  # ==========================================================================
  # Detect whether the linked GitHub issue is already CLOSED by a merged PR
  # *before* paying for tests + implementation. When the goal is already met
  # this short-circuits steps 07/08/08c, saving ~30min of agent runtime per
  # round (typical case: a previous orchestrator round shipped the fix and
  # this round was queued as a duplicate).
  #
  # Defensive: if `gh` is missing, ISSUE_NUMBER is unset, or any probe call
  # fails, we set goal_already_met="false" and let the workflow proceed
  # normally — never short-circuit on uncertainty. Even when true, this legacy
  # signal is only supporting evidence; workflow-terminal-state remains the
  # authoritative fail-closed arbiter for dirty worktrees, PR state, diffs, and CI.
  - id: "step-06d-goal-already-met-probe"
    type: "bash"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    command: |
      set -euo pipefail
      ISSUE_NUM="${ISSUE_NUMBER:-}"
      if [ -z "$ISSUE_NUM" ] || ! command -v gh >/dev/null 2>&1; then
        echo "false"
        exit 0
      fi
      ISSUE_STATE=$(gh issue view "$ISSUE_NUM" --json state --jq '.state' 2>/dev/null || true)
      if [ "$ISSUE_STATE" != "CLOSED" ]; then
        echo "false"
        exit 0
      fi
      # closedByPullRequestsReferences items DO NOT carry .state; we must
      # fetch each PR's mergedAt explicitly. Capture (number, owner/repo)
      # pairs so cross-repo closing PRs are looked up in the correct repo
      # rather than silently misresolved against the current repo (COE
      # cohort review #2, REAL_BUG #2).
      CLOSING_PR_REFS=$(gh issue view "$ISSUE_NUM" \
        --json closedByPullRequestsReferences \
        --jq '[.closedByPullRequestsReferences[]? | "\(.number) \(.repository.owner.login)/\(.repository.name)"] | join("\n")' \
        2>/dev/null || true)
      # Cap the fan-out (DESIGN_RISK #3): an issue with hundreds of linked
      # PRs would otherwise serially walk the GitHub API and chew rate
      # limit; the typical real case is 1-2 PRs.
      MAX_PROBE=10
      probed=0
      while IFS= read -r ref; do
        [ -z "$ref" ] && continue
        probed=$((probed + 1))
        if [ "$probed" -gt "$MAX_PROBE" ]; then
          echo "WARN: hit MAX_PROBE=${MAX_PROBE} linked-PR cap; assuming goal not met." >&2
          break
        fi
        PR_NUM=$(printf '%s' "$ref" | awk '{print $1}')
        PR_REPO=$(printf '%s' "$ref" | awk '{print $2}')
        # Cap each gh call at 30s to prevent stalling the whole workflow on
        # a slow API response (DESIGN_RISK #3).
        if [ -n "$PR_REPO" ] && [ "$PR_REPO" != "/" ]; then
          PR_MERGED=$(timeout 30 gh pr view "$PR_NUM" --repo "$PR_REPO" --json mergedAt --jq '.mergedAt' 2>/dev/null || true)
        else
          PR_MERGED=$(timeout 30 gh pr view "$PR_NUM" --json mergedAt --jq '.mergedAt' 2>/dev/null || true)
        fi
        if [ -n "$PR_MERGED" ] && [ "$PR_MERGED" != "null" ]; then
          echo "INFO: issue #${ISSUE_NUM} is already CLOSED by merged PR ${PR_REPO}#${PR_NUM}." >&2
          echo "  Short-circuiting steps 07/08/08c/08b/09-16b — goal already met (#368)." >&2
          echo "true"
          exit 0
        fi
      done <<< "$CLOSING_PR_REFS"
      echo "false"
    output: "goal_already_met"

  # ==========================================================================
  # STEP 7: TDD - WRITE TESTS FIRST
  # ==========================================================================
