name: "workflow-finalize"
description: "Phase 8: cleanup, quality audit, mergeable, complete (20-22b)"
version: "1.0.0"
author: "Amplihack Team"
tags: ["development", "cleanup", "merge"]

recursion:
  max_depth: 6
  max_total_steps: 80

inputs:
  - name: worktree_setup.worktree_path
    description: "Absolute path to the per-task worktree produced by workflow-worktree (step-04). Required by bash steps in step-20b-push-cleanup and step-21-pr-ready that cd into the worktree."
  - name: repo_path
    description: "Absolute path to the repository root. Required by step-22b-final-status that runs the final status report against the parent repo."

context:
  worktree_setup: ""
  allow_no_op: false
  terminal_success: "false"
  terminal_state: ""
  terminal_reason: ""
  publish_status: ""
  should_publish: "true"
  should_finalize: "true"
  should_run_ci_wait: "true"
  should_merge: "true"
  finalization_evidence: ""
  agentic_finalizer_output: ""
  workflow_result: ""

steps:
  - id: "finalize-terminal-state"
    type: "recipe"
    recipe: "workflow-terminal-state"
    context:
      terminal_fail_mode: "report"

  - id: "step-20-final-cleanup"
    agent: "amplihack:cleanup"
    condition: "terminal_state.terminal_success != 'true' && terminal_state.should_finalize == 'true'"
    prompt: |
      # Step 20: Final Cleanup and Verification

      **CRITICAL:** Original user requirements:
      {{final_requirements}}

      **Implementation:** {{pr_feedback_changes}}
      **Philosophy Check:** {{philosophy_check}}
      **Patterns Check:** {{patterns_check}}

      Final quality pass:

      1. Review all changes for philosophy compliance WITHIN user constraints
      2. Review all changes for Forbidden Pattern violations (FORBIDDEN_PATTERNS.md)
      3. Remove temporary artifacts or test files (unless user wanted them)
      4. Eliminate unnecessary complexity (without violating requirements)
      5. Verify module boundaries remain clean
      6. Ensure zero dead code or stub implementations

      **PR Cleanliness Final Check:**
      - [ ] Full diff review - all changes intentional
      - [ ] No temporary patterns (test_*.py, temp_*.js, etc.)
      - [ ] No debugging code
      - [ ] Documentation audit passed
      - [ ] Git hygiene verified

      **FINAL CHECK:** All explicit user requirements preserved.
    output: "final_cleanup"

  - id: "step-20a-artifact-guard"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true' && terminal_state.should_finalize == 'true'"
    command: |
      set -euo pipefail
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-}}"
      if [ -d "${WORKTREE_SETUP_WORKTREE_PATH:-}" ]; then
        cd "$WORKTREE_SETUP_WORKTREE_PATH"
      elif [ -d "${REPO_PATH:-}" ]; then
        cd "$REPO_PATH"
      fi
      RUNTIME_ARTIFACT_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${REPO_PATH:-$(pwd)}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="$(pwd)/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.copilot/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.amplihack/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || { echo "ERROR: workflow runtime artifact helper not found (searched AMPLIHACK_HOME, REPO_PATH, worktree, ~/.copilot, ~/.amplihack): $RUNTIME_ARTIFACT_HELPER" >&2; exit 2; }
      # shellcheck source=/dev/null
      . "$RUNTIME_ARTIFACT_HELPER"
      preflight_known_workflow_runtime_artifacts .
      amplihack hygiene artifact-guard --repo . --mode pre-publish

  - id: "step-20b-push-cleanup"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true' && terminal_state.should_finalize == 'true'"
    command: |
      set -euo pipefail
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-}}"
      if [ -d "${WORKTREE_SETUP_WORKTREE_PATH:-}" ]; then
        cd "$WORKTREE_SETUP_WORKTREE_PATH"
      elif [ -d "${REPO_PATH:-}" ]; then
        echo "WARNING: step-20b worktree path gone, falling back to REPO_PATH=$REPO_PATH" >&2
        cd "$REPO_PATH"
      else
        echo "WARNING: step-20b worktree path gone and REPO_PATH unset, using cwd=$(pwd)" >&2
      fi
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        echo "ERROR: step-20b-push-cleanup requires a git repo at $(pwd); either \`git init\` or rerun from a checkout" >&2
        exit 1
      fi
      export GIT_PAGER=cat
      export PAGER=cat
      export LESS=FRX
      redact_sensitive_output() {
        sed -E 's#(https?://)[^@[:space:]]+@#\1REDACTED@#g'
      }
      echo "=== Pushing Cleanup Changes ==="
      current_branch=$(git branch --show-current)
      if [ -z "$current_branch" ]; then
        echo "ERROR: current branch is empty; cannot push cleanup changes from detached HEAD" >&2
        exit 1
      fi
      RUNTIME_ARTIFACT_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${REPO_PATH:-$(pwd)}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="$(pwd)/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.copilot/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.amplihack/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || { echo "ERROR: workflow runtime artifact helper not found (searched AMPLIHACK_HOME, REPO_PATH, worktree, ~/.copilot, ~/.amplihack): $RUNTIME_ARTIFACT_HELPER" >&2; exit 2; }
      # shellcheck source=/dev/null
      . "$RUNTIME_ARTIFACT_HELPER"
      preflight_known_workflow_runtime_artifacts .
      amplihack hygiene artifact-guard --repo . --mode pre-publish
      git add -A
      STAGED=$(git diff --cached --name-only)
      if [ -n "$STAGED" ]; then
        GIT_IDENTITY_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(git rev-parse --show-toplevel)}}/amplifier-bundle/tools/git-identity.sh"; [ -f "$GIT_IDENTITY_HELPER" ] || GIT_IDENTITY_HELPER="$(git rev-parse --show-toplevel)/amplifier-bundle/tools/git-identity.sh"; [ -f "$GIT_IDENTITY_HELPER" ] || { echo "ERROR: git identity helper not found: $GIT_IDENTITY_HELPER" >&2; exit 2; }; . "$GIT_IDENTITY_HELPER"
        commit_with_pre_commit_guard() {
          local pre_commit_hook
          amplihack_prepare_git_commit_identity
          pre_commit_hook="$(git rev-parse --git-path hooks/pre-commit)"
          if [ -f "$pre_commit_hook" ] && [ ! -f .pre-commit-config.yaml ]; then
            PRE_COMMIT_ALLOW_NO_CONFIG=1 git commit "$@"
          elif git commit "$@"; then
            return 0
          else
            return "$?"
          fi
        }
        commit_output_file=$(mktemp -t step20b-cleanup-commit-XXXXXX)
        if commit_with_pre_commit_guard -m "final cleanup pass" >"$commit_output_file" 2>&1; then
          cat "$commit_output_file"
          rm -f "$commit_output_file"
          echo "Cleanup commit created with $(wc -l <<< "$STAGED") file(s)"
        else
          commit_rc=$?
          echo "ERROR: git commit failed during step-20b-push-cleanup (exit $commit_rc)" >&2
          cat "$commit_output_file" >&2
          rm -f "$commit_output_file"
          git --no-pager diff --cached --name-status >&2
          git --no-pager status --short >&2
          exit "$commit_rc"
        fi
      else
        echo "No staged changes from cleanup"
      fi
      push_output_file=$(mktemp -t step20b-cleanup-push-XXXXXX)
      if git rev-parse --abbrev-ref '@{u}' >/dev/null 2>&1; then
        pull_output_file=$(mktemp -t step20b-cleanup-pull-XXXXXX)
        if git --no-pager pull --rebase >"$pull_output_file" 2>&1; then
          redact_sensitive_output < "$pull_output_file"
          rm -f "$pull_output_file"
        else
          pull_rc=$?
          echo "ERROR: git pull --rebase failed during step-20b-push-cleanup (exit $pull_rc)" >&2
          redact_sensitive_output < "$pull_output_file" >&2
          rm -f "$pull_output_file"
          git --no-pager status --short >&2
          exit "$pull_rc"
        fi
        if git push >"$push_output_file" 2>&1; then
          redact_sensitive_output < "$push_output_file"
          rm -f "$push_output_file"
        else
          push_rc=$?
          echo "ERROR: git push failed during step-20b-push-cleanup (exit $push_rc)" >&2
          redact_sensitive_output < "$push_output_file" >&2
          rm -f "$push_output_file"
          git --no-pager status --short >&2
          exit "$push_rc"
        fi
      else
        if git push -u origin "$current_branch" >"$push_output_file" 2>&1; then
          redact_sensitive_output < "$push_output_file"
          rm -f "$push_output_file"
        else
          push_rc=$?
          echo "ERROR: git push failed during step-20b-push-cleanup (exit $push_rc)" >&2
          redact_sensitive_output < "$push_output_file" >&2
          rm -f "$push_output_file"
          git --no-pager status --short >&2
          exit "$push_rc"
        fi
      fi
      echo "=== Cleanup Complete ==="
    output: "cleanup_push_result"

  - id: "step-20c-quality-audit"
    agent: "amplihack:core:reviewer"
    condition: "terminal_state.terminal_success != 'true' && terminal_state.should_finalize == 'true'"
    prompt: |
      # Step 20c: Quality Audit Loop

      **Requirements:** {{final_requirements}}
      **PR URL:** {{pr_publish_result.pr_url}}
      **Repository:** {{repo_path}}

      Run 3-6 quality-audit cycles over changed PR files. Each cycle must:
      1. Seek issues in security, reliability, dead code, test/doc gaps,
         silent fallbacks, swallowed errors, structural complexity, and docs.
      2. Validate findings with technical, skeptical, and adversarial reads;
         confirm only when at least two perspectives agree.
      3. Fix confirmed findings minimally, with tests where appropriate.
      4. Continue until at least cycle 3; after that stop only when no
         high/critical and at most three medium findings remain, or at cycle 6.

      Finish with a self-improvement pass for systemic critical issues.
      Output "QUALITY AUDIT: CLEAN" or list remaining findings and fixes.
    output: "quality_audit_results"

  - id: "step-21-pr-ready"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true' && terminal_state.should_run_ci_wait == 'true'"
    command: |
      set -euo pipefail
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-}}"
      if [ -d "${WORKTREE_SETUP_WORKTREE_PATH:-}" ]; then cd "$WORKTREE_SETUP_WORKTREE_PATH"; elif [ -d "${REPO_PATH:-}" ]; then echo "WARNING: step-21 worktree path gone, falling back to REPO_PATH=$REPO_PATH" >&2; cd "$REPO_PATH"; else echo "WARNING: step-21 worktree path gone and REPO_PATH unset, using cwd=$(pwd)" >&2; fi
      export GIT_PAGER=cat GH_PAGER=cat PAGER=cat LESS=FRX
      PR_URL="${PR_URL:-${RECIPE_VAR_pr_url:-${PR_PUBLISH_RESULT_PR_URL:-${RECIPE_VAR_pr_publish_result__pr_url:-}}}}"
      PR_NUMBER="${PR_NUMBER:-${RECIPE_VAR_pr_number:-${PR_PUBLISH_RESULT_PR_NUMBER:-${RECIPE_VAR_pr_publish_result__pr_number:-}}}}"
      HOST_TYPE="${REMOTE_HOST_TYPE:-other}"
      if [ "$HOST_TYPE" != "github" ]; then echo "INFO: non-GitHub host ($HOST_TYPE) — skipping gh pr ready" >&2; exit 0; fi
      if [ -z "$PR_URL" ]; then :; fi
      # Helper contract: command -v gh; command -v jq; gh auth status; timeout; gh pr view; gh pr list; git branch --show-current; PR_NUMBER; isDraft; state; mergedAt; for pr_target in discovered targets; no PR_URL, valid PR_NUMBER, or branch PR found; terminal_status may be already-merged, closed-after-merge, or closed-unmerged; closed-unmerged exits with exit 1.
      READY_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_pr_ready.sh"
      if [ ! -f "$READY_HELPER" ] && [ -n "${REPO_PATH:-}" ]; then READY_HELPER="$REPO_PATH/amplifier-bundle/tools/workflow_pr_ready.sh"; fi
      [ -f "$READY_HELPER" ] || { echo "ERROR: workflow PR-ready helper not found: $READY_HELPER" >&2; exit 1; }
      bash "$READY_HELPER"
    output: "pr_ready_result"

  - id: "step-22-ensure-mergeable"
    agent: "amplihack:ci-diagnostic-workflow"
    condition: "terminal_state.terminal_success != 'true' && terminal_state.should_run_ci_wait == 'true'"
    prompt: |
      # Step 21: Ensure PR is Mergeable (TASK COMPLETION POINT)

      **PR URL:** {{pr_publish_result.pr_url}}
      **Repository:** {{repo_path}}

      Verify the PR is ready to merge: CI passing, no conflicts, review
      comments addressed, and approval present. If CI fails, diagnose and fix.
      This is the task completion point.
    output: "ci_status"

  - id: "step-22b-final-status"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true' && terminal_state.should_finalize == 'true'"
    command: |
      set -euo pipefail
      cd "${REPO_PATH:?step-22b-final-status requires repo_path; ensure parent recipe propagated repo_path context}"
      export GH_PAGER=cat PAGER=cat LESS=FRX
      HOST_TYPE="${REMOTE_HOST_TYPE:-other}"
      PR_URL="${PR_URL:-${PR_PUBLISH_RESULT_PR_URL:-${RECIPE_VAR_pr_publish_result__pr_url:-}}}"
      if [ -z "$PR_URL" ]; then : "N/A"; fi
      RUNTIME_ARTIFACT_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${REPO_PATH:-$(pwd)}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="$(pwd)/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.copilot/amplifier-bundle/tools/workflow_runtime_artifacts.sh"; [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.amplihack/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || { echo "ERROR: workflow runtime artifact helper not found (searched AMPLIHACK_HOME, REPO_PATH, worktree, ~/.copilot, ~/.amplihack): $RUNTIME_ARTIFACT_HELPER" >&2; exit 2; }
      # shellcheck source=/dev/null
      . "$RUNTIME_ARTIFACT_HELPER"
      preflight_known_workflow_runtime_artifacts .
      # Helper contract: git diff --quiet identifies no-diff; terminal_status accepts no-diff, already-merged, and closed-after-merge; GitHub-only status uses gh pr view.
      # Terminal-state contract: FAILED_CLOSED_UNMERGED, FAILED_MEANINGFUL_DIFF, BLOCKED_CI, MERGED, CLOSED_OBSOLETE, NO_DIFF_SUCCESS, FOLLOWUP_CREATED.
      FINAL_STATUS_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_final_status.sh"
      if [ ! -f "$FINAL_STATUS_HELPER" ] && [ -n "${REPO_PATH:-}" ]; then FINAL_STATUS_HELPER="$REPO_PATH/amplifier-bundle/tools/workflow_final_status.sh"; fi
      [ -f "$FINAL_STATUS_HELPER" ] || { echo "ERROR: workflow final-status helper not found: $FINAL_STATUS_HELPER" >&2; exit 1; }
      bash "$FINAL_STATUS_HELPER"
    output: "final_status"

  - id: "collect-finalization-evidence"
    type: "bash"
    parse_json: true
    command: |
      set -euo pipefail
      FINALIZER_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_agentic_finalization.sh"
      if [ ! -f "$FINALIZER_HELPER" ] && [ -n "${REPO_PATH:-}" ]; then FINALIZER_HELPER="$REPO_PATH/amplifier-bundle/tools/workflow_agentic_finalization.sh"; fi
      [ -f "$FINALIZER_HELPER" ] || { echo "ERROR: agentic finalization helper not found: $FINALIZER_HELPER" >&2; exit 2; }
      bash "$FINALIZER_HELPER" collect
    output: "finalization_evidence"

  - id: "agentic-finalizer"
    agent: "amplihack:core:reviewer"
    prompt: |
      # Agentic Finalization Classifier

      Classify the default workflow terminal state from structured evidence.
      This replaces brittle parsing for judgment-heavy terminal assessment, but
      deterministic recipe steps still validate, persist, and report the final
      state. Use the structured evidence only; do not infer from optimism.

      ## Structured evidence
      {{finalization_evidence}}
      ## Observed failure modes to preserve

      Recent finalization failures came from brittle parsing, missing metadata,
      stale PR metadata, dirty worktree misclassification, generated runtime artifacts
      left in the worktree, broad staging attempted before artifact cleanup,
      closed-unmerged PR handling, missing tooling, failed CI, and hollow success
      where setup/planning or inaccessible-codebase output looked successful.

      ## Output schema

      Return one single JSON object and no prose. Required fields:
      schema_version, terminal_state, terminal_success, confidence, reason,
      required_next_action, hollow_success_detected, evidence_used.

      `confidence` must be high, medium, or low. Only confidence=high may claim
      terminal_success=true. Medium or low confidence must choose a non-success
      state.

      ## Terminal vocabulary

      Success states:
      - MERGED
      - CLOSED_OBSOLETE
      - NO_DIFF_SUCCESS
      - FOLLOWUP_CREATED
      - SUPERSEDED
      - IMPLEMENTED_VERIFIED
      - ALLOW_NO_OP

      Non-success states:
      - BLOCKED_CI
      - FAILED_DIRTY_WORKTREE
      - FAILED_MEANINGFUL_DIFF
      - FAILED_CLOSED_UNMERGED
      - FAILED_PR_METADATA_UNAVAILABLE
      - FAILED_MISSING_TOOLING
      - FAILED_INVALID_EVIDENCE
      - FAILED_FINALIZER_OUTPUT
      - FAILED_MISSING_TERMINAL_EVIDENCE
      - HOLLOW_SUCCESS
      - INCOMPLETE

      ## Classification rules

      - Dirty worktree evidence cannot produce terminal_success=true.
      - Generated runtime artifacts such as `.claude/runtime`, nested `worktrees/`,
        build caches, logs, or session files are not source evidence. Classify
        them as dirty worktree evidence and require cleanup before commit,
        checkpoint, broad staging, publish, or merge.
      - Artifact Guard failures are actionable cleanup evidence, not a reason
        to weaken guards or mark the workflow successful. The required next
        action must name the artifact cleanup needed before retrying.
      - Broad staging (`git add -A`, `git add --all`, or equivalent) is unsafe
        until generated artifacts are absent and Artifact Guard has passed for
        the current worktree.
      - Missing deterministic tooling required for the selected path maps to
        FAILED_MISSING_TOOLING.
      - Stale or unavailable PR metadata maps to FAILED_PR_METADATA_UNAVAILABLE
        unless a local no-diff success is proven.
      - A closed-unmerged PR with meaningful diff maps to FAILED_CLOSED_UNMERGED.
      - Failed CI maps to BLOCKED_CI.
      - Meaningful diff with no validated publish, merge, follow-up,
        implementation-plus-verification, or explicit no-op maps to
        FAILED_MEANINGFUL_DIFF.
      - Hollow success maps to HOLLOW_SUCCESS and terminal_success=false.
      - FOLLOWUP_CREATED requires a durable PR or follow-up identifier.
      - SUPERSEDED requires a durable replacement PR or issue identifier.
      - If no more specific state applies, use INCOMPLETE.

      Return only the single JSON object. No markdown. No prose.
    output: "agentic_finalizer_output"

  - id: "validate-agentic-finalization"
    type: "bash"
    parse_json: true
    command: |
      set -euo pipefail
      # Contract: AGENTIC_FINALIZER_OUTPUT, FAILED_FINALIZER_OUTPUT, schema_version,
      # terminal_state, terminal_success, confidence, reason, required_next_action,
      # hollow_success_detected, evidence_used, finalizer_output_valid,
      # finalizer_confidence, jq -e, exit 1, confidence=high, terminal_success=true,
      # hollow_success_detected=true, FAILED_DIRTY_WORKTREE,
      # FAILED_PR_METADATA_UNAVAILABLE, BLOCKED_CI, FAILED_MEANINGFUL_DIFF.
      FINALIZER_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_agentic_finalization.sh"
      if [ ! -f "$FINALIZER_HELPER" ] && [ -n "${REPO_PATH:-}" ]; then FINALIZER_HELPER="$REPO_PATH/amplifier-bundle/tools/workflow_agentic_finalization.sh"; fi
      [ -f "$FINALIZER_HELPER" ] || { echo "ERROR: agentic finalization helper not found: $FINALIZER_HELPER" >&2; exit 2; }
      bash "$FINALIZER_HELPER" validate
    output: "workflow_result"

  - id: "workflow-complete"
    type: "bash"
    parse_json: true
    command: |
      set -euo pipefail
      # Reports workflow_result, terminal_outcome, terminal_state, terminal_success,
      # required_next_action, hollow_success_detected, evidence_used, finalizer_schema_version,
      # finalizer_confidence, finalizer_output_valid, terminal_failure, MERGED,
      # CLOSED_OBSOLETE, NO_DIFF_SUCCESS, FOLLOWUP_CREATED, SUPERSEDED, BLOCKED_CI,
      # FAILED_FINALIZER_OUTPUT, FAILED_MISSING_TOOLING, FAILED_PR_METADATA_UNAVAILABLE,
      # FAILED_DIRTY_WORKTREE, FAILED_MEANINGFUL_DIFF, HOLLOW_SUCCESS, INCOMPLETE.
      FINALIZER_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_agentic_finalization.sh"
      if [ ! -f "$FINALIZER_HELPER" ] && [ -n "${REPO_PATH:-}" ]; then FINALIZER_HELPER="$REPO_PATH/amplifier-bundle/tools/workflow_agentic_finalization.sh"; fi
      [ -f "$FINALIZER_HELPER" ] || { echo "ERROR: agentic finalization helper not found: $FINALIZER_HELPER" >&2; exit 2; }
      bash "$FINALIZER_HELPER" complete
    output: "workflow_completion"
