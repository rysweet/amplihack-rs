name: "workflow-finalize"
description: "Phase 8: cleanup, quality audit, mergeable, complete (20-22b)"
version: "1.0.0"
author: "Amplihack Team"
tags: ["development", "cleanup", "merge"]

recursion:
  max_depth: 6
  max_total_steps: 80

inputs:
  - name: worktree_setup.worktree_path
    description: "Absolute path to the per-task worktree produced by workflow-worktree (step-04). Required by bash steps in step-20b-push-cleanup and step-21-pr-ready that cd into the worktree."
  - name: repo_path
    description: "Absolute path to the repository root. Required by step-22b-final-status that runs the final status report against the parent repo."

context:
  worktree_setup: ""
  allow_no_op: false

steps:
  - id: "step-20-final-cleanup"
    agent: "amplihack:cleanup"
    prompt: |
      # Step 20: Final Cleanup and Verification

      **CRITICAL:** Original user requirements:
      {{final_requirements}}

      **Implementation:** {{pr_feedback_changes}}
      **Philosophy Check:** {{philosophy_check}}
      **Patterns Check:** {{patterns_check}}

      Final quality pass:

      1. Review all changes for philosophy compliance WITHIN user constraints
      2. Review all changes for Forbidden Pattern violations (FORBIDDEN_PATTERNS.md)
      3. Remove temporary artifacts or test files (unless user wanted them)
      4. Eliminate unnecessary complexity (without violating requirements)
      5. Verify module boundaries remain clean
      6. Ensure zero dead code or stub implementations

      **PR Cleanliness Final Check:**
      - [ ] Full diff review - all changes intentional
      - [ ] No temporary patterns (test_*.py, temp_*.js, etc.)
      - [ ] No debugging code
      - [ ] Documentation audit passed
      - [ ] Git hygiene verified

      **FINAL CHECK:** All explicit user requirements preserved.
    output: "final_cleanup"

  - id: "step-20b-push-cleanup"
    type: "bash"
    command: |
      set -euo pipefail
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-}}"
      if [ -d "${WORKTREE_SETUP_WORKTREE_PATH:-}" ]; then
        cd "$WORKTREE_SETUP_WORKTREE_PATH"
      elif [ -d "${REPO_PATH:-}" ]; then
        echo "WARNING: step-20b worktree path gone, falling back to REPO_PATH=$REPO_PATH" >&2
        cd "$REPO_PATH"
      else
        echo "WARNING: step-20b worktree path gone and REPO_PATH unset, using cwd=$(pwd)" >&2
      fi
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        echo "ERROR: step-20b-push-cleanup requires a git repo at $(pwd); either \`git init\` or rerun from a checkout" >&2
        exit 1
      fi
      export GIT_PAGER=cat
      export PAGER=cat
      export LESS=FRX
      echo "=== Pushing Cleanup Changes ==="
      current_branch=$(git branch --show-current)
      if [ -z "$current_branch" ]; then
        echo "ERROR: current branch is empty; cannot push cleanup changes from detached HEAD" >&2
        exit 1
      fi
      git add -A
      STAGED=$(git diff --cached --name-only)
      if [ -n "$STAGED" ]; then
        commit_with_pre_commit_guard() {
          local pre_commit_hook
          pre_commit_hook="$(git rev-parse --git-path hooks/pre-commit)"
          if [ -f "$pre_commit_hook" ] && [ ! -f .pre-commit-config.yaml ]; then
            PRE_COMMIT_ALLOW_NO_CONFIG=1 git commit "$@"
          elif git commit "$@"; then
            return 0
          else
            return "$?"
          fi
        }
        commit_output_file=$(mktemp -t step20b-cleanup-commit-XXXXXX)
        if commit_with_pre_commit_guard -m "final cleanup pass" >"$commit_output_file" 2>&1; then
          cat "$commit_output_file"
          rm -f "$commit_output_file"
          echo "Cleanup commit created with $(wc -l <<< "$STAGED") file(s)"
        else
          commit_rc=$?
          echo "ERROR: git commit failed during step-20b-push-cleanup (exit $commit_rc)" >&2
          cat "$commit_output_file" >&2
          rm -f "$commit_output_file"
          git --no-pager diff --cached --name-status >&2
          git --no-pager status --short >&2
          exit "$commit_rc"
        fi
      else
        echo "No staged changes from cleanup"
      fi
      push_output_file=$(mktemp -t step20b-cleanup-push-XXXXXX)
      if git rev-parse --abbrev-ref '@{u}' >/dev/null 2>&1; then
        git --no-pager pull --rebase
        if git push >"$push_output_file" 2>&1; then
          cat "$push_output_file"
          rm -f "$push_output_file"
        else
          push_rc=$?
          echo "ERROR: git push failed during step-20b-push-cleanup (exit $push_rc)" >&2
          cat "$push_output_file" >&2
          rm -f "$push_output_file"
          git --no-pager status --short >&2
          exit "$push_rc"
        fi
      else
        if git push -u origin "$current_branch" >"$push_output_file" 2>&1; then
          cat "$push_output_file"
          rm -f "$push_output_file"
        else
          push_rc=$?
          echo "ERROR: git push failed during step-20b-push-cleanup (exit $push_rc)" >&2
          cat "$push_output_file" >&2
          rm -f "$push_output_file"
          git --no-pager status --short >&2
          exit "$push_rc"
        fi
      fi
      echo "=== Cleanup Complete ==="
    output: "cleanup_push_result"

  - id: "step-20c-quality-audit"
    agent: "amplihack:core:reviewer"
    prompt: |
      # Step 20c: Quality Audit Loop

      **Requirements:** {{final_requirements}}
      **PR URL:** {{pr_url}}
      **Repository:** {{repo_path}}

      Run 3-6 quality-audit cycles over changed PR files. Each cycle must:
      1. Seek issues in security, reliability, dead code, test/doc gaps,
         silent fallbacks, swallowed errors, structural complexity, and docs.
      2. Validate findings with technical, skeptical, and adversarial reads;
         confirm only when at least two perspectives agree.
      3. Fix confirmed findings minimally, with tests where appropriate.
      4. Continue until at least cycle 3; after that stop only when no
         high/critical and at most three medium findings remain, or at cycle 6.

      Finish with a self-improvement pass for systemic critical issues.
      Output "QUALITY AUDIT: CLEAN" or list remaining findings and fixes.
    output: "quality_audit_results"

  - id: "step-21-pr-ready"
    type: "bash"
    command: |
      set -euo pipefail
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-}}"
      if [ -d "${WORKTREE_SETUP_WORKTREE_PATH:-}" ]; then
        cd "$WORKTREE_SETUP_WORKTREE_PATH"
      elif [ -d "${REPO_PATH:-}" ]; then
        echo "WARNING: step-21 worktree path gone, falling back to REPO_PATH=$REPO_PATH" >&2
        cd "$REPO_PATH"
      else
        echo "WARNING: step-21 worktree path gone and REPO_PATH unset, using cwd=$(pwd)" >&2
      fi
      export GIT_PAGER=cat GH_PAGER=cat PAGER=cat LESS=FRX
      echo "=== Step 21: Converting PR to Ready ==="
      echo ""
      PR_URL="${PR_URL:-${RECIPE_VAR_pr_url:-}}"
      PR_NUMBER="${PR_NUMBER:-${RECIPE_VAR_pr_number:-}}"
      HOST_TYPE="${REMOTE_HOST_TYPE:-other}"
      if [ "$HOST_TYPE" != "github" ]; then
        echo "INFO: non-GitHub host ($HOST_TYPE) — skipping gh pr ready" >&2
        echo "=== PR Ready: SKIPPED (no PR URL or non-GitHub host) ==="
        exit 0
      fi

      if ! command -v gh >/dev/null 2>&1; then
        echo "WARNING: gh CLI not found — skipping PR ready conversion" >&2
        echo "=== PR Ready: SKIPPED (missing gh CLI) ==="
        exit 0
      fi

      if ! timeout 30 gh auth status >/dev/null 2>&1; then
        echo "WARNING: gh CLI is unavailable or unauthenticated — skipping PR ready conversion" >&2
        echo "=== PR Ready: SKIPPED (gh auth/network unavailable) ==="
        exit 0
      fi

      pr_targets=()
      add_pr_target() {
        local target="$1"
        [[ "$target" =~ [^[:space:]] ]] || return 0
        local existing
        for existing in "${pr_targets[@]}"; do
          [ "$existing" = "$target" ] && return 0
        done
        pr_targets+=("$target")
      }

      if [[ "$PR_URL" =~ [^[:space:]] ]]; then
        add_pr_target "$PR_URL"
      fi
      if [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
        add_pr_target "$PR_NUMBER"
      elif [[ "$PR_NUMBER" =~ [^[:space:]] ]]; then
        echo "WARNING: ignoring invalid PR_NUMBER '$PR_NUMBER' for step-21-pr-ready" >&2
      fi
      if [ "${#pr_targets[@]}" -eq 0 ] && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        current_branch=$(git branch --show-current 2>/dev/null || true)
        if [[ "$current_branch" =~ [^[:space:]] ]]; then
          while IFS= read -r branch_pr_number; do
            add_pr_target "$branch_pr_number"
          done < <(timeout 60 gh pr list --head "$current_branch" --state all --json number --jq '.[].number' 2>/dev/null || true)
        fi
      fi
      if [ "${#pr_targets[@]}" -eq 0 ]; then
        echo "INFO: [skip] not a git repo or no PR_URL, valid PR_NUMBER, or branch PR found — skipping gh pr ready" >&2
        echo "=== PR Ready: SKIPPED (no PR found) ==="
        exit 0
      fi

      if ! command -v jq >/dev/null 2>&1; then
        echo "WARNING: jq CLI not found — skipping PR ready conversion" >&2
        echo "=== PR Ready: SKIPPED (missing jq CLI) ==="
        exit 0
      fi

      for pr_target in "${pr_targets[@]}"; do
        echo "--- Processing PR target: $pr_target ---"
        pr_json_file=$(mktemp -t step21-pr-view-XXXXXX)
        if timeout 60 gh pr view "$pr_target" --json number,state,isDraft,mergedAt,url >"$pr_json_file" 2>&1; then
          :
        else
          view_rc=$?
          echo "WARNING: unable to inspect PR '$pr_target' with gh (exit $view_rc); skipping this PR" >&2
          cat "$pr_json_file" >&2
          rm -f "$pr_json_file"
          continue
        fi

        pr_url=$(jq -r '.url // ""' "$pr_json_file")
        pr_state=$(jq -r '.state // ""' "$pr_json_file")
        pr_is_draft=$(jq -r '.isDraft // false' "$pr_json_file")
        pr_merged_at=$(jq -r '.mergedAt // ""' "$pr_json_file")
        rm -f "$pr_json_file"

        if [ "$pr_state" = "MERGED" ] || [ -n "$pr_merged_at" ]; then
          echo "INFO: PR is already merged — no ready-for-review action needed"
          continue
        fi
        if [ "$pr_state" = "CLOSED" ]; then
          echo "INFO: PR is closed — no ready-for-review action possible"
          continue
        fi

        if [ "$pr_is_draft" = "true" ]; then
          echo "--- Converting Draft PR to Ready ---"
          ready_output_file=$(mktemp -t step21-pr-ready-XXXXXX)
          if timeout 60 gh pr ready "$pr_url" >"$ready_output_file" 2>&1; then
            cat "$ready_output_file"
            rm -f "$ready_output_file"
          else
            ready_rc=$?
            echo "WARNING: gh pr ready failed for '$pr_url' (exit $ready_rc); continuing with visible skip" >&2
            cat "$ready_output_file" >&2
            rm -f "$ready_output_file"
            continue
          fi
        else
          echo "INFO: PR is already ready for review"
        fi

        echo "--- Adding Ready Comment ---"
        ready_body="## Ready for Final Review

        Workflow steps completed: requirements, design, implementation, tests,
        code review, philosophy compliance, cleanup, and quality audit.

        Ready for merge approval."
        comment_output_file=$(mktemp -t step21-pr-comment-XXXXXX)
        if timeout 60 gh pr comment "$pr_url" --body "$ready_body" >"$comment_output_file" 2>&1; then
          cat "$comment_output_file"
          rm -f "$comment_output_file"
        else
          comment_rc=$?
          echo "WARNING: gh pr comment failed for '$pr_url' (exit $comment_rc); PR ready state was still evaluated" >&2
          cat "$comment_output_file" >&2
          rm -f "$comment_output_file"
        fi
      done
      echo ""
      echo "=== PR Ready Step Complete ==="
    output: "pr_ready_result"

  - id: "step-22-ensure-mergeable"
    agent: "amplihack:ci-diagnostic-workflow"
    prompt: |
      # Step 21: Ensure PR is Mergeable (TASK COMPLETION POINT)

      **PR URL:** {{pr_url}}
      **Repository:** {{repo_path}}

      Verify the PR is ready to merge: CI passing, no conflicts, review
      comments addressed, and approval present. If CI fails, diagnose and fix.
      This is the task completion point.
    output: "ci_status"

  - id: "step-22b-final-status"
    type: "bash"
    command: |
      set -euo pipefail
      cd "${REPO_PATH:?step-22b-final-status requires repo_path; ensure parent recipe propagated repo_path context}"
      echo "=== WORKFLOW COMPLETE ==="
      echo ""
      export GH_PAGER=cat PAGER=cat LESS=FRX
      HOST_TYPE="${REMOTE_HOST_TYPE:-other}"
      PR_URL="${PR_URL:-}"
      if [ -z "$PR_URL" ]; then
        if [ "$HOST_TYPE" = "azdo" ]; then
          echo "PR Status: N/A (manual creation required)" >&2
        else
          echo "PR Status: N/A (no remote provider)" >&2
        fi
      elif [ "$HOST_TYPE" = "github" ]; then
        echo "PR Status:"
        if command -v gh >/dev/null 2>&1; then
          timeout 60 gh pr view "$PR_URL" --json state,mergeable,reviews,statusCheckRollup
        else
          echo "WARNING: gh CLI not found; skipping final PR status lookup" >&2
        fi
      else
        echo "WARNING: PR_URL set but host is '$HOST_TYPE'; skipping gh pr view" >&2
      fi
      echo ""
      TASK_DESC="$TASK_DESCRIPTION"
      ISSUE_NUMBER="$ISSUE_NUMBER"
      printf '=== Task: %s ===\n' "$TASK_DESC"
      case "$HOST_TYPE" in
        github) echo "=== Issue: #${ISSUE_NUMBER} ===" ;;
        azdo)   echo "=== Issue: AB#${ISSUE_NUMBER} ===" ;;
        *)      echo "=== Issue: Ref #${ISSUE_NUMBER} ===" ;;
      esac
      if [ -n "$PR_URL" ]; then
        printf '=== PR: %s ===\n' "$PR_URL"
      elif [ "$HOST_TYPE" = "azdo" ]; then
        echo "=== PR: N/A (manual creation required) ==="
      else
        echo "=== PR: N/A (no remote provider) ==="
      fi
      echo ""
      echo "All 23 workflow steps completed successfully."
    output: "final_status"

  - id: "workflow-complete"
    type: "bash"
    parse_json: true
    command: |
      TASK_VAL="$TASK_DESCRIPTION"
      export TASK_VAL
      ISSUE_VAL="$ISSUE_NUMBER"
      export ISSUE_VAL
      PR_VAL="$PR_URL"
      export PR_VAL
      jq -n \
        --arg task "${TASK_VAL}" \
        --arg issue "${ISSUE_VAL}" \
        --arg pr "${PR_VAL}" \
        '{
          workflow: "default-workflow",
          version: "2.0.0",
          task: $task,
          issue_number: $issue,
          pr_url: $pr,
          status: "complete",
          steps_completed: 23,
          phases_completed: [
            "requirements-clarification", "design", "implementation",
            "testing", "review", "merge"
          ],
          mandatory_steps_completed: {
            step_0_preparation: true,
            step_14_version_bump: true,
            step_17_pr_review: true,
            step_18_implement_feedback: true
          },
          philosophy_compliant: true,
          ready_to_merge: true
        }'
    output: "workflow_result"
