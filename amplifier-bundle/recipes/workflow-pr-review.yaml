name: "workflow-pr-review"
description: "Phase 7: PR review cycle — compliance, reviewer, gates (17a-19d)"
version: "1.0.0"
author: "Amplihack Team"
tags: ["development", "review", "pr"]
recursion:
  max_depth: 6
  max_total_steps: 80
inputs:
  - name: worktree_setup.worktree_path
    description: "Absolute path to the per-task worktree produced by workflow-worktree (step-04). Required by bash steps in step-18c-push-feedback-changes that cd into the worktree. step-19c-zero-bs-verification falls back to REPO_PATH or cwd if the worktree is already cleaned up."
context:
  worktree_setup: ""
  allow_no_op: false
steps:
  - id: "step-17a-compliance-verification"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true'"
    command: |
      echo "=== Step 17a: Step 13 Compliance Verification ===" && \
      echo "" && \
      GATE_OUTPUT="$LOCAL_TESTING_GATE" && \
      if [ -z "$GATE_OUTPUT" ] || [ "$GATE_OUTPUT" = "''" ]; then \
        echo "COMPLIANCE FAILURE: Step 13 (outside-in testing) produced no output." && \
        echo "" && \
        echo "The outside-in testing step (step-13-local-testing) must be completed" && \
        echo "before the PR review phase can begin." && \
        echo "" && \
        echo "Required: Invoke the qa-team skill (outside-in-testing alias also works), document the" && \
        echo "detected toolchains, chosen validation strategy, and at least 2 test scenarios in the" && \
        echo "PR description under 'Step 13: Local Testing Results'." && \
        exit 1 ; \
      fi && \
      echo "Compliance check: local_testing_gate is populated." && \
      echo "" && \
      echo "Verify PR description contains 'Step 13: Local Testing Results' section" && \
      echo "with detected toolchains, chosen strategy, and actual test execution evidence (not just planning)." && \
      echo "" && \
      echo "=== Compliance Check PASSED ==="
    output: "step_13_compliance_check"
  - id: "step-17b-reviewer-agent"
    agent: "amplihack:reviewer"
    condition: "terminal_state.terminal_success != 'true'"
    prompt: |
      # Step 17b: Comprehensive Code Review (MANDATORY)
      **PR URL:** {{pr_publish_result.pr_url}}
      **Requirements:** {{final_requirements}}
      **Implementation:** {{review_feedback}}
      **Review Checklist:**
      - [ ] Code quality and standards
      - [ ] Test coverage adequate
      - [ ] No TODOs, stubs, or swallowed exceptions
      - [ ] No unimplemented functions
      - [ ] Logic correctness
      - [ ] Edge case handling
      **Actions:**
      1. Perform comprehensive code review
      2. Identify issues and improvements
      3. **POST review comments on PR** (this is required evidence)
      **Output:** Review findings and confirmation posted to PR.
    output: "pr_review"
  - id: "step-17c-security-review"
    agent: "amplihack:security"
    condition: "terminal_state.terminal_success != 'true'"
    prompt: |
      # Step 17c: Security Review (MANDATORY)
      **PR URL:** {{pr_publish_result.pr_url}}
      **Implementation:** {{review_feedback}}
      **Previous Review:** {{pr_review}}
      Security review of the PR:
      - [ ] Verify all security requirements met
      - [ ] Check for any new vulnerabilities
      - [ ] Confirm sensitive data handling
      - [ ] Review authentication/authorization if applicable
      - [ ] Check for injection vulnerabilities
      **Actions:**
      1. Perform security analysis
      2. **POST security findings as PR comments** (this is required evidence)
      **Output:** Security findings and confirmation posted to PR.
    output: "pr_security_review"
  - id: "step-17d-philosophy-guardian"
    agent: "amplihack:philosophy-guardian"
    condition: "terminal_state.terminal_success != 'true'"
    prompt: |
      # Step 17d: Philosophy Guardian Review (MANDATORY)
      **PR URL:** {{pr_publish_result.pr_url}}
      **Implementation:** {{review_feedback}}
      **Code Review:** {{pr_review}}
      Philosophy compliance review:
      - [ ] Ruthless simplicity achieved
      - [ ] Bricks & studs pattern followed
      - [ ] Zero-BS implementation (no stubs, faked APIs, swallowed exceptions)
      - [ ] No over-engineering
      - [ ] Clean module boundaries
      **Actions:**
      1. Verify philosophy compliance
      2. **POST philosophy check as PR comment** (this is required evidence)
      **Output:** Compliance status and confirmation posted to PR.
    output: "pr_philosophy_review"
  - id: "step-17e-address-blocking-issues"
    agent: "amplihack:builder"
    condition: "terminal_state.terminal_success != 'true'"
    prompt: |
      # Step 17e: Address Blocking Issues (MANDATORY)
      **PR Review:** {{pr_review}}
      **Security Review:** {{pr_security_review}}
      **Philosophy Review:** {{pr_philosophy_review}}
      Review all findings from Steps 16a-16d and address any blocking issues:
      1. Identify blocking issues from each review
      2. Implement fixes for each blocking issue
      3. If issues found, re-run applicable reviews after fixing
      **Output:** Summary of blocking issues found and how they were addressed.
      If no blocking issues, state "No blocking issues found."
    output: "blocking_issues_addressed"
  - id: "step-17f-verification-gate"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true'"
    command: |
      echo "=== STEP 17 VERIFICATION GATE ===" && \
      echo "" && \
      echo "Before proceeding, verify ALL of the following:" && \
      echo "" && \
      echo "  ✓ Did I invoke the REVIEWER agent? → Yes (output captured)" && \
      echo "  ✓ Did I invoke the SECURITY agent? → Yes (output captured)" && \
      echo "  ✓ Did I invoke the PHILOSOPHY-GUARDIAN agent? → Yes (output captured)" && \
      echo "  ✓ Did I check for FORBIDDEN PATTERN violations? → Yes" && \
      echo "  ✓ Are all three reviews POSTED to the PR as comments?" && \
      echo "  ✓ All blocking issues have been addressed?" && \
      echo "" && \
      echo "If any verification fails, STOP and complete the missing step." && \
      echo "" && \
      echo "=== GATE PASSED - Proceed to Step 18 ==="
    output: "step_17_gate_status"
  - id: "step-18a-analyze-feedback"
    agent: "amplihack:architect"
    condition: "terminal_state.terminal_success != 'true'"
    prompt: |
      # Step 18a: Analyze Review Feedback (MANDATORY)
      **PR Review:** {{pr_review}}
      **Security Review:** {{pr_security_review}}
      **Philosophy Review:** {{pr_philosophy_review}}
      Analyze ALL feedback from Step 16 reviews:
      1. Categorize each item: blocking issues vs. suggestions vs. questions
      2. Prioritize blocking issues first
      3. Create action plan for addressing each item
      **Output:** Structured analysis of all feedback with action plan.
    output: "feedback_analysis"
  - id: "step-18b-implement-feedback"
    agent: "amplihack:builder"
    condition: "terminal_state.terminal_success != 'true'"
    prompt: |
      # Step 18b: Implement Review Feedback (MANDATORY)
      **Feedback Analysis:** {{feedback_analysis}}
      **PR Review:** {{pr_review}}
      **Security Review:** {{pr_security_review}}
      **Philosophy Review:** {{pr_philosophy_review}}
      **Current Implementation:** {{review_feedback}}
      **Checklist:**
      - [ ] Address EVERY blocking issue
      - [ ] Address suggestions where appropriate
      - [ ] For disagreements, document reasoning
      - [ ] Ensure changes don't introduce new issues
      **Output:** Summary of changes for each feedback item.
    output: "pr_feedback_changes"
  - id: "step-18c-push-feedback-changes"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true'"
    command: |
      set -euo pipefail
      export GIT_PAGER=cat
      export PAGER=cat
      export LESS=FRX
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-}}"
      cd "${WORKTREE_SETUP_WORKTREE_PATH:?step-18c-push-feedback-changes requires worktree_setup.worktree_path; ensure parent recipe ran worktree-setup and propagated outputs}"
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        echo "ERROR: step-18c-push-feedback-changes requires a git repo at $(pwd); either \`git init\` or rerun from a checkout" >&2
        exit 1
      fi
      echo "=== Pushing Review Feedback Changes ==="
      current_branch=$(git branch --show-current)
      if [ -z "$current_branch" ]; then
        echo "ERROR: current branch is empty; cannot push review feedback changes from detached HEAD" >&2
        exit 1
      fi
      RUNTIME_ARTIFACT_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${REPO_PATH:-$(pwd)}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="$(pwd)/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.copilot/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.amplihack/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || { echo "ERROR: workflow runtime artifact helper not found (searched AMPLIHACK_HOME, REPO_PATH, worktree, ~/.copilot, ~/.amplihack): $RUNTIME_ARTIFACT_HELPER" >&2; exit 2; }
      # shellcheck source=/dev/null
      . "$RUNTIME_ARTIFACT_HELPER"
      preflight_known_workflow_runtime_artifacts .
      amplihack hygiene artifact-guard --repo . --mode pre-publish
      git add -A
      STAGED=$(git diff --cached --name-only)
      if [ -n "$STAGED" ]; then
        GIT_IDENTITY_HELPER="${AMPLIHACK_HOME:-$(git rev-parse --show-toplevel)}/amplifier-bundle/tools/git-identity.sh"; [ -f "$GIT_IDENTITY_HELPER" ] || GIT_IDENTITY_HELPER="$(git rev-parse --show-toplevel)/amplifier-bundle/tools/git-identity.sh"; [ -f "$GIT_IDENTITY_HELPER" ] || { echo "ERROR: git identity helper not found: $GIT_IDENTITY_HELPER" >&2; exit 2; }; . "$GIT_IDENTITY_HELPER"
        commit_output_file=$(mktemp -t step18c-review-feedback-commit-XXXXXX)
        commit_with_pre_commit_guard() {
          local pre_commit_hook
          amplihack_prepare_git_commit_identity
          pre_commit_hook="$(git rev-parse --git-path hooks/pre-commit)"
          if [ -f "$pre_commit_hook" ] && [ ! -f .pre-commit-config.yaml ]; then
            PRE_COMMIT_ALLOW_NO_CONFIG=1 git commit "$@"
          elif git commit "$@"; then
            return 0
          else
            return "$?"
          fi
        }
        if commit_with_pre_commit_guard -m "address review feedback" -m "Implemented reviewer suggestions; fixed identified issues; updated per security review; addressed philosophy compliance items" >"$commit_output_file" 2>&1; then
          commit_rc=0
        else
          commit_rc=$?
        fi
        if [ "$commit_rc" -eq 0 ]; then
          cat "$commit_output_file"
          rm -f "$commit_output_file"
          echo "Review feedback commit created with $(wc -l <<< "$STAGED") file(s)"
        else
          echo "ERROR: git commit failed during step-18c-push-feedback-changes (exit $commit_rc)" >&2
          cat "$commit_output_file" >&2
          rm -f "$commit_output_file"
          git --no-pager diff --cached --name-status >&2
          git --no-pager status --short >&2
          exit "$commit_rc"
        fi
      else
        echo "No staged changes from review feedback"
      fi
      push_output_file=$(mktemp -t step18c-review-feedback-push-XXXXXX)
      git_remote_with_retry() {
        local rc attempt
        : >"$push_output_file"
        for attempt in 1 2 3; do
          "$@" >>"$push_output_file" 2>&1 && return 0
          rc=$?
          [ "$attempt" -lt 3 ] || return "$rc"
          echo "WARNING: $* failed (exit $rc); retrying ($attempt/3)" >>"$push_output_file"
        done
      }
      push_rc=0
      if git rev-parse --abbrev-ref '@{u}' >/dev/null 2>&1; then
        if git_remote_with_retry git pull --rebase; then
          git_remote_with_retry git push || push_rc=$?
        else
          push_rc=$?
        fi
      else
        git_remote_with_retry git push -u origin "$current_branch" || push_rc=$?
      fi
      if [ "$push_rc" -eq 0 ]; then
        cat "$push_output_file"
        rm -f "$push_output_file"
      else
        echo "ERROR: git push failed during step-18c-push-feedback-changes (exit $push_rc); git pull --rebase may also have failed" >&2
        cat "$push_output_file" >&2
        rm -f "$push_output_file"
        git --no-pager status --short >&2
        exit "$push_rc"
      fi
      echo "=== Changes Pushed ==="
    output: "feedback_push_result"
  - id: "step-18d-respond-to-comments"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true'"
    command: |
      echo "=== Responding to Review Comments ===" && \
      echo "" && \
      echo "Post responses to each review comment on the PR explaining:" && \
      echo "  - What was done to address the feedback" && \
      echo "  - Any disagreements with reasoning" && \
      echo "" && \
      echo "Use: gh pr comment <pr_number> --body 'Response text'" && \
      echo "" && \
      echo "=== Comment Responses Complete ==="
    output: "comment_responses"
  - id: "step-18e-verification-gate"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true'"
    command: |
      echo "=== STEP 18 VERIFICATION GATE ===" && \
      echo "" && \
      echo "Before proceeding, verify ALL of the following:" && \
      echo "" && \
      echo "  ✓ Did I address EVERY feedback comment (not just some)?" && \
      echo "  ✓ Did I respond to each comment on the PR?" && \
      echo "  ✓ Did I use the builder agent for implementation changes?" && \
      echo "  ✓ Are all tests still passing?" && \
      echo "" && \
      echo "If any verification fails, STOP and complete the missing step." && \
      echo "" && \
      echo "=== GATE PASSED - Proceed to Step 19 ==="
    output: "step_18_gate_status"
  - id: "step-19a-philosophy-check"
    agent: "amplihack:reviewer"
    condition: "terminal_state.terminal_success != 'true'"
    prompt: |
      # Step 19a: Philosophy Compliance Review (MANDATORY)
      **Implementation:** {{pr_feedback_changes}}
      **Requirements:** {{final_requirements}}
      Philosophy compliance verification:
      - [ ] Ruthless simplicity achieved
      - [ ] No over-engineering or unnecessary complexity
      - [ ] Implementation aligns with project philosophy
      - [ ] No Forbidden Pattern violations (FORBIDDEN_PATTERNS.md): no error swallowing, no silent fallbacks, no data loss, no shell anti-patterns (|| true, >/dev/null), no async misuse, no config divergence, no validation gaps
      - [ ] All tests passing
      - [ ] Documentation complete and accurate
      **Output:** Detailed philosophy compliance findings.
    output: "philosophy_check"
  - id: "step-19b-patterns-check"
    agent: "amplihack:patterns"
    condition: "terminal_state.terminal_success != 'true'"
    prompt: |
      # Step 19b: Pattern Compliance Review (MANDATORY)
      **Implementation:** {{pr_feedback_changes}}
      Pattern compliance verification:
      - [ ] Design patterns used correctly
      - [ ] Architectural patterns followed
      - [ ] Code organization patterns maintained
      - [ ] No anti-patterns introduced
      - [ ] No Forbidden Patterns (error swallowing, silent fallbacks, || true, >/dev/null, fire-and-forget async, unchecked HTTP responses, log-only catches)
      **Output:** Pattern compliance findings with any violations.
    output: "patterns_check"
  - id: "step-19c-zero-bs-verification"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true'"
    command: |
      set -euo pipefail
      echo "=== ZERO-BS VERIFICATION ==="
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-}}"
      if [ -d "${WORKTREE_SETUP_WORKTREE_PATH:-}" ]; then cd "$WORKTREE_SETUP_WORKTREE_PATH"; elif [ -d "${REPO_PATH:-}" ]; then echo "WARNING: step-19c worktree path gone, falling back to REPO_PATH=$REPO_PATH" >&2; cd "$REPO_PATH"; else echo "WARNING: step-19c worktree path gone and REPO_PATH unset, using cwd=$(pwd)" >&2; fi
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then echo "ERROR: step-19c-zero-bs-verification requires a git repo; run git init or rerun from a checkout" >&2; exit 1; fi
      echo "Scanning for Zero-BS violations..."
      scan_or_none() {
        local label=$1 pattern=$2 rc tracked_rc untracked_rc=1 file tmp; shift 2
        local files=()
        echo "--- $label ---"
        if git grep -n -E "$pattern" -- "$@"; then tracked_rc=0; else tracked_rc=$?; fi
        if [ "$tracked_rc" -ne 0 ] && [ "$tracked_rc" -ne 1 ]; then
          echo "ERROR: git grep failed during $label (exit $tracked_rc)" >&2; return "$tracked_rc"
        fi
        tmp=$(mktemp -t step19c-untracked-XXXXXX)
        if git ls-files --others --exclude-standard -z -- "$@" >"$tmp"; then
          mapfile -d '' -t files <"$tmp"; rm -f "$tmp"
        else
          rc=$?; rm -f "$tmp"; echo "ERROR: git ls-files failed during $label (exit $rc)" >&2; return "$rc"
        fi
        if [ "${#files[@]}" -gt 0 ]; then
          if grep -n -E -H -- "$pattern" "${files[@]}"; then untracked_rc=0; else untracked_rc=$?; fi
        fi
        if [ "$untracked_rc" -ne 0 ] && [ "$untracked_rc" -ne 1 ]; then
          echo "ERROR: grep failed during untracked $label (exit $untracked_rc)" >&2; return "$untracked_rc"
        fi
        [ "$tracked_rc" -eq 0 ] || [ "$untracked_rc" -eq 0 ] || echo "None found"
      }
      scan_or_none "Checking for TODO/FIXME comments" "(TODO|FIXME)" '*.rs' '*.ts' '*.js' '*.sh' '*.bash' '*.md' '*.yaml' '*.yml' Makefile Dockerfile
      scan_or_none "Checking for stub indicators" "(todo!|unimplemented!|panic!.*stub)" '*.rs'
      scan_or_none "Rust: bail/panic stubs (zero-stubs policy)" 'bail!\("not implemented|bail!\("TODO|bail!\("unimplemented|panic!\("not implemented|panic!\("TODO' '*.rs'
      echo "--- Checking for Forbidden Patterns ---"
      scan_or_none "Shell: || true, >/dev/null 2>&1, set +e" '\|\| true|\|\| :|>/dev/null 2>&1|2>/dev/null|&>/dev/null|set \+e' '*.sh' '*.bash' Makefile Dockerfile
      scan_or_none "Rust: unwrap without context, expect without message" '\.unwrap\(\)$|\.expect\(\"\"\)' '*.rs'
      scan_or_none "TypeScript/JS: empty catch, catch return undefined" 'catch.*\{.*\}$|catch.*return undefined|catch.*return \[\]' '*.ts' '*.js'
      echo ""
      echo "=== Zero-BS Verification Complete ==="
    output: "zero_bs_check"
  - id: "step-19d-verification-gate"
    type: "bash"
    condition: "terminal_state.terminal_success != 'true'"
    command: |
      PHIL_CHECK="$PHILOSOPHY_CHECK"
      PAT_CHECK="$PATTERNS_CHECK"
      PHIL_SUMMARY=$(printf '%.1024s' "$PHIL_CHECK")
      PAT_SUMMARY=$(printf '%.1024s' "$PAT_CHECK")
      printf '%s\n' "=== STEP 19 VERIFICATION GATE ===" "" "Before proceeding, verify ALL of the following:" "" "  ✓ Did I invoke the REVIEWER agent for philosophy check?" "  ✓ Did I invoke the PATTERNS agent?" "  ✓ Did I complete the zero-BS verification?" "  ✓ Did I check for Forbidden Pattern violations?" "  ✓ Are all findings documented?" "  ✓ Any issues found have been addressed?" ""
      echo "Philosophy check (first 1KB): $PHIL_SUMMARY"
      echo "Patterns check (first 1KB): $PAT_SUMMARY"
      printf '%s\n' "" "If any verification fails, STOP and complete the missing step." "" "=== GATE PASSED - Proceed to Step 20 ==="
    output: "step_19_gate_status"
