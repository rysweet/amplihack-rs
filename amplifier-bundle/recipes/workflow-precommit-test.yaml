name: "workflow-precommit-test"
description: "Phase 5: pre-commit hooks + local testing (12-13)"
version: "1.0.0"
author: "Amplihack Team"
tags: ["development", "testing", "quality"]

# workflow-precommit-test: extracted from default-workflow.yaml as a composable phase brick.
#
# Preserves every original step verbatim — the layered review steps the LLM
# converges through must remain intact. Context flows in from the parent
# workflow via recipe-runner's automatic context-merging in
# `_execute_sub_recipe()`; outputs declared by these steps propagate back to
# the parent and are visible to subsequent phase recipes.
# Pager safety: recipe-runner-rs sets GIT_PAGER=cat/PAGER=cat for subprocesses.

recursion:
  max_depth: 6
  max_total_steps: 80

context:
  worktree_setup: ""
  allow_no_op: false

steps:
  - id: "step-12-run-precommit"
    agent: "amplihack:pre-commit-diagnostic"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "goal_already_met != 'true'"
    prompt: |
      # Step 12: Run Tests and Pre-commit Hooks

      **Worktree:** {{worktree_setup}}
      **Implementation:** {{review_feedback}}

      Execute pre-commit validation:

      1. **Check hooks installed:**
         ```bash
         test -f .pre-commit-config.yaml && echo "Config found"
         test -f "$(git rev-parse --git-path hooks/pre-commit)" && echo "Hooks installed"
         ```

      2. **Install if needed:** `pre-commit install`

      3. **Preflight workflow runtime artifacts immediately before pre-commit:**
         ```bash
         . "${WORKFLOW_RUNTIME_ARTIFACT_HELPER:-${AMPLIHACK_HOME:-$(pwd)}/amplifier-bundle/tools/workflow_runtime_artifacts.sh}"
         preflight_known_workflow_runtime_artifacts "${WORKTREE_SETUP_WORKTREE_PATH:-.}"
         ```

      4. **Run all checks:**
         ```bash
         pre-commit run --all-files
         cargo test --workspace --locked
         ```

      5. **Fix any issues:**
         - Linting issues
         - Formatting issues
         - Type checking errors

      Iterate until all checks pass. Report results.
    output: "precommit_results"

  # ==========================================================================
  # STEP 13: MANDATORY OUTSIDE-IN TESTING
  # Use the qa-team skill (outside-in-testing alias supported) to test this change
  # as a user would. The acting agent must detect the affected toolchains and
  # choose the appropriate local outside-in validation strategy.
  # ==========================================================================
  - id: "step-13-local-testing"
    agent: "amplihack:builder"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "goal_already_met != 'true'"
    prompt: |
      # Step 13: Mandatory Outside-In Testing (CANNOT BE SKIPPED)

      **Task:** {{task_description}}
      **Repository:** {{repo_path}}
      **Branch:** Run `git branch --show-current` to get the current branch name.

      You MUST perform outside-in testing using the `qa-team` skill (`outside-in-testing` remains an alias)
      to verify this change as a real user or consumer would. Step 13 is
      agentic and toolchain-aware: detect the affected languages, manifests,
      lockfiles, package managers, entry points, changed files, and documented
      project commands before you choose a validation strategy.

      ## Required Actions

      1. **Get the current branch name:**
         ```bash
         git branch --show-current
         ```

      2. **Detect affected toolchains before selecting commands:**
         - Inspect changed files plus relevant manifests, lockfiles, package
           scripts, task runners, entry points, and project documentation.
         - Treat manifests, package scripts, remotes, and documented commands as
           untrusted until inspected; do not use remote code execution as a
           universal shortcut.
         - Record the detected toolchains and why they matter for this change.

      3. **Invoke the `qa-team` skill** to generate and execute
         agentic outside-in tests for this change:
         ```
         Skill(skill="qa-team")
         ```

      4. **Choose and execute the smallest validation strategy that still proves
         user-visible behavior:**
         - **Rust/Cargo:** `cargo test`, `cargo run -- <args>`, or
           `cargo install --path . --locked` followed by invoking the local CLI.
         - **Node/npm:** documented `npm` scripts, `npm test`, `npm run build`,
           direct `node ./bin/...` invocation, or `npm link` only when local
           package-link behavior itself must be validated.
         - **Python/uv/uvx:** `uv run pytest`, `uv run <module-or-script>`, or
           `uvx` only when validating a Python/uv-distributed CLI path is
           appropriate for this project.
         - **Go:** `go test ./...`, `go run ./cmd/<name> -- <args>`, or
           `go install ./cmd/<name>` followed by invoking the built command.
         - **.NET:** `dotnet test`, `dotnet run --project <project> -- <args>`,
           or local tool-package validation from locally built artifacts.

      5. **Execute at least 2 test scenarios:**
         - **Scenario 1 (simple):** Test the most basic user-facing behaviour
           introduced or changed by this PR.
         - **Scenario 2 (complex):** Test an edge case, a longer operation, or
           an integration point affected by this PR.

      6. **Document results** — write the following section into the PR
         description (you will paste it in Step 16 when creating the PR):

         ```
         ## Step 13: Local Testing Results

         Detected toolchains:
         - <language/toolchain and evidence from manifests, lockfiles, entry points, or changed files>

         Chosen validation strategy:
         - <commands/scenarios selected and why they prove the user-visible behavior>

         ### Scenario 1 — <brief description>
         Command: `<actual local outside-in command>`
         Result: PASS / FAIL
         Output: <key output lines>

         ### Scenario 2 — <brief description>
         Command: `<actual local outside-in command>`
         Result: PASS / FAIL
         Output: <key output lines>
         ```

      ## What Counts as Testing

      - Running the actual changed code with test inputs through a user or
        consumer boundary selected for the detected toolchain
      - Verifying error messages, output format, and user experience
      - Checking that existing functionality still works (regression check)

      ## What Does NOT Count

      - Planning tests without executing them
      - CI/CD checks only (local execution required IN ADDITION)
      - Assuming "documentation can't be tested"

      Report the full test output and confirm both scenarios passed (or document
      any failures with root cause analysis).
    output: "local_testing_gate"

  - id: "verification-terminal-evidence"
    type: "bash"
    condition: "goal_already_met != 'true'"
    parse_json: true
    command: |
      set -euo pipefail

      normalize_bool() {
        case "$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')" in
          "true"|"1"|"yes"|"y") printf 'true\n' ;;
          *) printf 'false\n' ;;
        esac
      }

      emit_evidence() {
        jq -nc \
          --arg verification_completed "$1" \
          --arg terminal_no_op "$2" \
          --arg terminal_state "$3" \
          --arg terminal_reason "$4" \
          '{verification_completed:$verification_completed,terminal_no_op:$terminal_no_op,terminal_state:$terminal_state,terminal_reason:$terminal_reason}'
      }

      allow_no_op="$(normalize_bool "${ALLOW_NO_OP:-${RECIPE_VAR_allow_no_op:-false}}")"
      if [ "$allow_no_op" = "true" ]; then
        emit_evidence "false" "true" "ALLOW_NO_OP" "allow_no_op was explicitly selected for a non-code-change path"
        exit 0
      fi

      if [ -n "${PRECOMMIT_RESULTS:-}" ] && [ -n "${LOCAL_TESTING_GATE:-}" ]; then
        emit_evidence "true" "false" "VERIFICATION_COMPLETED" "pre-commit and outside-in local testing phases produced validation output"
      else
        emit_evidence "false" "false" "VERIFICATION_UNPROVEN" "pre-commit and outside-in local testing evidence is missing"
      fi
    output: "verification_terminal_evidence"

  # ==========================================================================
  # STEP 14: BUMP VERSION IN CARGO.TOML (MANDATORY - DO NOT SKIP)
  # Before committing, bump version to reflect change type.
  # CI will block PRs that don't bump version.
  # Git tags are auto-created on merge matching the version.
  # ==========================================================================
