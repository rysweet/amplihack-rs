name: "workflow-prep"
description: "Phase 1a: requirements + issue creation (steps 00-03b)"
version: "1.0.0"
author: "Amplihack Team"
tags: ["development", "prep", "requirements"]
# workflow-prep: extracted from default-workflow.yaml as a composable phase brick.
# Context flows in from the parent workflow via recipe-runner's automatic context-merging in
# `_execute_sub_recipe()`; outputs declared by these steps propagate back to
# the parent and are visible to subsequent phase recipes.
# Pager safety: recipe-runner-rs sets GIT_PAGER=cat/PAGER=cat for subprocesses.
recursion:
  max_depth: 6
  max_total_steps: 80
context: {}
steps:
  # STEP 0: WORKFLOW PREPARATION (MANDATORY - DO NOT SKIP)
  # Creates tracking structure. Must complete before ANY implementation work.
  # Prevents "completion bias" - ensures mandatory review steps not skipped.
  # ==========================================================================
  - id: "step-00-workflow-preparation"
    type: "bash"
    command: |
      echo "=== WORKFLOW PREPARATION COMPLETE ==="
      echo ""
      echo "23-Step Workflow Initialized (with granular sub-steps for Steps 17-19):"
      echo "  Step 0: Workflow Preparation - CURRENT"
      echo "  Step 1: Prepare Workspace"
      echo "  Step 2: Rewrite/Clarify Requirements"
      echo "  Step 3: Create GitHub Issue"
      echo "  Step 4: Setup Worktree/Branch"
      echo "  Step 5: Research and Design"
      echo "  Step 6: Retcon Documentation"
      echo "  Step 7: TDD - Write Tests First"
      echo "  Step 8: Implement Solution"
      echo "  Step 9: Refactor and Simplify"
      echo "  Step 10: Review Before Commit"
      echo "  Step 11: Incorporate Feedback"
      echo "  Step 12: Run Pre-commit Hooks"
      echo "  Step 13: Mandatory Local Testing"
      echo "  Step 14: Bump Version (MANDATORY)"
      echo "  Step 15: Commit and Push"
      echo "  Step 16: Open PR as Draft"
      echo "  Step 17: Review the PR (MANDATORY - 6 sub-steps with verification gate)"
      echo "    17a: Step 13 Compliance Verification"
      echo "    17b: Comprehensive Code Review (reviewer agent)"
      echo "    17c: Security Review (security agent)"
      echo "    17d: Philosophy Guardian Review (philosophy-guardian agent)"
      echo "    17e: Address Blocking Issues (builder agent)"
      echo "    17f: Verification Gate"
      echo "  Step 18: Implement Review Feedback (MANDATORY - 5 sub-steps with verification gate)"
      echo "    18a: Analyze Feedback"
      echo "    18b: Implement Feedback (builder agent)"
      echo "    18c: Push Changes"
      echo "    18d: Respond to Comments"
      echo "    18e: Verification Gate"
      echo "  Step 19: Philosophy Compliance Check (4 sub-steps with verification gate)"
      echo "    19a: Philosophy Review (reviewer agent)"
      echo "    19b: Pattern Check (patterns agent)"
      echo "    19c: Zero-BS Verification"
      echo "    19d: Verification Gate"
      echo "  Step 20: Final Cleanup"
      echo "  Step 20c: Quality Audit Loop (3+ cycles, multi-agent validation)"
      echo "  Step 21: Convert PR to Ready"
      echo "  Step 22: Ensure PR Mergeable"
      echo ""
      # FIX (#469/#311): Use env vars — safe against injection and word-splitting.
      TASK_DESC="$TASK_DESCRIPTION"
      printf 'Task: %s\n' "$TASK_DESC"
      printf 'Repository: %s\n' "$REPO_PATH"
    output: "workflow_init"

  # STEP 1: PREPARE THE WORKSPACE
  - id: "step-01-prepare-workspace"
    type: "bash"
    command: |
      cd "$REPO_PATH"
      echo "=== Step 1: Preparing Workspace ==="
      echo ""
      echo "Current directory: $(pwd)"
      echo ""
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        echo "ERROR: step-01-prepare-workspace requires a git repo at $(pwd); either \`git init\` or rerun from a checkout" >&2
        exit 1
      fi
      echo "--- Git Status ---"; STATUS_RC=0
      git status || STATUS_RC=$?
      [ "$STATUS_RC" -eq 0 ] || echo "WARNING: git status failed (exit $STATUS_RC) — continuing with degraded workspace diagnostics after repository validation succeeded" >&2
      echo ""
      echo "--- Fetching Latest ---"
      FETCH_RC=0
      git fetch --all --no-tags 2>/dev/null || FETCH_RC=$?
      if [ "$FETCH_RC" -ne 0 ]; then
        echo "WARNING: git fetch failed (exit $FETCH_RC) — continuing with local branch state" >&2
        REMOTE_URL=$(git remote get-url origin 2>/dev/null || true)
        case "$REMOTE_URL" in
          *dev.azure.com*|*visualstudio.com*)
            echo "WARNING: ADO remote detected. Remediation steps:" >&2
            echo "  1. Run 'az login' to refresh Azure credentials" >&2
            echo "  2. Configure git credential-manager: git config credential.helper manager" >&2
            echo "  3. Or set a Personal Access Token (PAT) for authentication" >&2
            ;;
          *)
            echo "WARNING: Check remote credentials or network connectivity" >&2
            ;;
        esac
      fi
      echo ""
      echo "--- Current Branch ---"
      git branch --show-current
      echo ""
      echo "=== Workspace Prepared ==="
      echo ""
      # ── Pre-agent validation guard (issue #453) ──────────────────────
      # Do NOT add project validation commands (npm test, npm run build,
      # cargo test, etc.) outside this conditional. Validation only runs
      # when explicitly opted in via SKIP_PRE_AGENT_VALIDATION="false".
      # Default is "true" (skip) to avoid blocking on large codebases.
      if [ "$SKIP_PRE_AGENT_VALIDATION" = "false" ]; then
        echo "--- Pre-agent Validation (opted in) ---"
        echo "Add project-specific validation commands here per repository."
        echo "--- Pre-agent Validation Complete ---"
      else
        echo "--- Pre-agent Validation: SKIPPED (SKIP_PRE_AGENT_VALIDATION=$SKIP_PRE_AGENT_VALIDATION) ---"
      fi
    output: "workspace_status"

  # STEP 2: REWRITE AND CLARIFY REQUIREMENTS
  - id: "step-02-clarify-requirements"
    agent: "amplihack:prompt-writer"
    prompt: |
      # Step 2: Rewrite and Clarify Requirements
      **Task Description:** {{task_description}}
      **Initial Requirements:** {{requirements}}
      Your role is to clarify and structure the task requirements.
      **Actions Required:**
      1. Identify explicit user requirements that CANNOT be optimized away
      2. Remove ambiguity from the task description
      3. Define clear success criteria
      4. Document acceptance criteria
      **Output Format:**
      ```json
      {
        "task_summary": "one-line clear summary",
        "explicit_requirements": ["list of must-have features"],
        "acceptance_criteria": ["how to verify completion"],
        "out_of_scope": ["what this does NOT include"],
        "assumptions": ["assumptions being made"],
        "questions_resolved": ["clarifications made autonomously"],
        "estimated_complexity": "low/medium/high",
        "classification": "feature/bugfix/refactor/other"
      }
      ```
      Use your best judgment to work autonomously. Pass explicit requirements to ALL subsequent agents.
    output: "clarified_requirements"
    parse_json: true

  - id: "step-02b-analyze-codebase"
    agent: "amplihack:architect"
    prompt: |
      # Step 2b: Analyze Existing Codebase Context
      **Task:** {{task_description}}
      **Clarified Requirements:** {{clarified_requirements}}
      **Repository:** {{repo_path}}
      ## IMPORTANT: Emit progress markers throughout this analysis
      This step runs under a watchdog that times out if no output is seen for
      60+ seconds. You MUST emit a progress line before each major exploration
      phase so the recipe runner can see activity. Use this format:

      ```
      ## Progress: [Phase name] — [brief description]
      ```

      ## Exploration Phases
      Work through these phases in order, emitting a progress marker before each:
      **Phase 1 — Project structure**
      Print: `## Progress: Phase 1/4 — Scanning project structure`
      Use Glob to identify top-level layout, key config files (Cargo.toml,
      package.json, etc.), and source directory organization.
      **Phase 2 — Relevant code paths**
      Print: `## Progress: Phase 2/4 — Searching for task-relevant code`
      Use Grep to find code related to the task: relevant class/function names,
      imports, config keys, and patterns mentioned in the requirements.
      **Phase 3 — Dependencies and integration points**
      Print: `## Progress: Phase 3/4 — Analyzing dependencies and interfaces`
      Read key files (imports, interfaces, config) to understand how components
      connect. Identify external dependencies relevant to the task.
      **Phase 4 — Synthesis**
      Print: `## Progress: Phase 4/4 — Synthesizing findings`
      Compile findings into a structured summary.
      ## Output
      Provide a codebase context summary covering:
      1. Relevant existing code and patterns
      2. Files that will likely need modification
      3. Dependencies and integration points
      4. Potential conflicts or considerations
      Use glob and grep to explore the codebase. Avoid web searches.
    output: "codebase_analysis"

  - id: "step-02c-resolve-ambiguity"
    agent: "amplihack:ambiguity"
    prompt: |
      # Step 2c: Resolve Any Remaining Ambiguity
      **Task:** {{task_description}}
      **Clarified Requirements:** {{clarified_requirements}}
      **Codebase Analysis:** {{codebase_analysis}}
      Review for any remaining ambiguity in the requirements.
      If ambiguity exists:
      - Resolve it using best judgment
      - Document the decisions made
      - Explain rationale
      If no ambiguity:
      - Confirm requirements are clear
      - Proceed with confidence
      Output final, unambiguous requirements ready for design phase.
    output: "final_requirements"

  # ==========================================================================
  # STEP 02d: DETECT REMOTE HOST TYPE
  # Output propagates via parent context to all downstream sub-recipes.
  # ==========================================================================
  - id: "step-02d-detect-host-type"
    type: "bash"
    command: |
      set -euo pipefail; cd "$REPO_PATH"
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        echo "[skip] not a git repo — defaulting to 'other'" >&2
        printf 'other'; exit 0
      fi
      REMOTE_URL=$(git remote get-url origin 2>/dev/null || echo "")
      REMOTE_URL_LC="${REMOTE_URL,,}"
      case "$REMOTE_URL_LC" in
        *://*) REST="${REMOTE_URL_LC#*://}"; REST="${REST##*@}"; REMOTE_HOST="${REST%%[/:]*}" ;;
        *@*:*) REST="${REMOTE_URL_LC##*@}"; REMOTE_HOST="${REST%%[:/]*}" ;;
        *) REMOTE_HOST="${REMOTE_URL_LC%%[/:]*}" ;;
      esac
      case "$REMOTE_HOST" in
        github.com) HT="github" ;;
        dev.azure.com|ssh.dev.azure.com|visualstudio.com|*.visualstudio.com) HT="azdo" ;;
        *) HT="other" ;;
      esac
      echo "INFO: Remote host type: $HT" >&2
      printf '%s' "$HT"
    output: "remote_host_type"

  - id: "step-03-create-issue"
    type: "bash"
    command: |
      set -euo pipefail
      cd "$REPO_PATH"
      echo "=== Step 3: Creating Tracking Issue ===" >&2
      TASK_DESC="$TASK_DESCRIPTION"
      ISSUE_TITLE="${TASK_DESC//$'\n'/ }"; ISSUE_TITLE="${ISSUE_TITLE//$'\r'/ }"; ISSUE_TITLE="${ISSUE_TITLE:0:200}"
      ISSUE_REQS="$FINAL_REQUIREMENTS"
      sanitize_saved_preference_notices() {
        # Filter exact launcher preference notices from generated requirements.
        # Example filtered notice: ℹ NODE_OPTIONS=--max-old-space-size=32768 (saved preference). To change: ~/.amplihack/config
        # Legitimate task text mentioning NODE_OPTIONS must remain intact.
        # Preserved legitimate requirement: Ensure the workflow rejects unsafe NODE_OPTIONS values passed by the caller.
        awk '/^ℹ NODE_OPTIONS=--max-old-space-size=[0-9]+ \(saved preference\)(\. To change: .+)?$/ { next } { print }'
      }
      SANITIZED_ISSUE_REQS="$(printf '%s\n' "$ISSUE_REQS" | sanitize_saved_preference_notices)"
      HOST_TYPE="${REMOTE_HOST_TYPE:-other}"; EXISTING_ISSUE_NUMBER="${ISSUE_NUMBER:-}"
      case "$HOST_TYPE" in
        github|azdo|other) ;;
        azure-devops) HOST_TYPE="azdo" ;;
        *) echo "WARN: Unexpected REMOTE_HOST_TYPE — using local tracking" >&2; HOST_TYPE="other" ;;
      esac
      derive_local_tracking_id() {
        if [[ "$EXISTING_ISSUE_NUMBER" =~ ^#?([0-9]+)$ ]]; then
          printf 'local-issue-%s' "${BASH_REMATCH[1]}"
        elif [[ "$EXISTING_ISSUE_NUMBER" =~ AB#([0-9]+)|_workitems/edit/([0-9]+) ]]; then
          printf 'local-ab-%s' "${BASH_REMATCH[1]:-${BASH_REMATCH[2]}}"
        elif [[ "$EXISTING_ISSUE_NUMBER" =~ local-(issue|ab)-([0-9]+)$ ]]; then
          printf '%s' "$EXISTING_ISSUE_NUMBER"
        elif [[ "$TASK_DESC" =~ ([Ii]ssue[[:space:]#]*|#)([0-9]+) ]]; then
          printf 'local-issue-%s' "${BASH_REMATCH[2]}"
        elif [[ "$TASK_DESC" =~ AB#([0-9]+) ]]; then
          printf 'local-ab-%s' "${BASH_REMATCH[1]}"
        else
          printf 'local-%s' "$(printf '%s' "$TASK_DESC" | sha256sum | cut -c1-12)"
        fi
      }
      emit_local_metadata() { LOCAL_REF="$(derive_local_tracking_id)"; LOCAL_NUM=""; [[ "$LOCAL_REF" =~ local-(issue|ab)-([0-9]+)$ ]] && LOCAL_NUM="${BASH_REMATCH[2]}"; printf 'tracking_system=local\ntracking_reference=%s\ntracking_issue=%s\nissue_creation=local-tracking\n' "$LOCAL_REF" "$LOCAL_REF"; [ -n "$LOCAL_NUM" ] && printf 'issue_number=%s\n' "$LOCAL_NUM"; return 0; }
      sanitize_cli_output() { printf '%s\n' "$1" | head -c 4000 | sed -E 's#https?://[^[:space:]]*@#https://<redacted>@#g; s#gh[pousr]_[A-Za-z0-9_]{8,}#<redacted-token>#g; s#github_pat_[A-Za-z0-9_]+#<redacted-token>#g'; }
      REF_ISSUE_NUM=""
      if [[ "$TASK_DESC" =~ AB#([0-9]+) ]]; then REF_ISSUE_NUM="${BASH_REMATCH[1]}"
      elif [[ "$TASK_DESC" =~ \#([0-9]+) ]]; then REF_ISSUE_NUM="${BASH_REMATCH[1]}"; fi
      [ -n "$REF_ISSUE_NUM" ] && ! [[ "$REF_ISSUE_NUM" =~ ^[0-9]+$ ]] && REF_ISSUE_NUM=""
      case "$HOST_TYPE" in
      other) echo "INFO: Using local tracking for issue management (remote: other)" >&2; emit_local_metadata; exit 0 ;;
      azdo) [[ "$EXISTING_ISSUE_NUMBER" =~ ^[0-9]+$ ]] && { printf 'ISSUE_REFERENCE=AB#%s\n' "$EXISTING_ISSUE_NUMBER" >> "${GITHUB_OUTPUT:-/dev/null}"; printf 'AB#%s\n' "$EXISTING_ISSUE_NUMBER"; exit 0; } ;;
      github) ;;
      esac
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then echo "[skip] not a git repo — using local tracking" >&2; emit_local_metadata; exit 0; fi
      case "$HOST_TYPE" in
      github)
        if [ -n "$REF_ISSUE_NUM" ]; then
          EXISTING_URL=$(timeout 60 gh issue view "$REF_ISSUE_NUM" --json url --jq '.url // ""' 2>/dev/null || echo '')
          [ -n "$EXISTING_URL" ] && { printf '%s\n' "$EXISTING_URL"; exit 0; }
        fi
        SEARCH_Q="${ISSUE_TITLE:0:100}"
        if [ -n "$SEARCH_Q" ]; then
          FOUND_URL=$(timeout 60 gh issue list --state open --search "$SEARCH_Q" --json url --jq '.[0].url // ""' 2>/dev/null || echo '')
          [ -n "$FOUND_URL" ] && { printf '%s\n' "$FOUND_URL"; exit 0; }
        fi
        ISSUE_BODY=$(printf '## Task Description\n%s\n\n## Requirements\n%s\n\n## Acceptance Criteria\n- [ ] All explicit requirements met\n- [ ] Tests passing\n- [ ] Philosophy compliant\n- [ ] Documentation updated\n\n## Classification\nGenerated via default-workflow recipe\n' "$TASK_DESC" "$SANITIZED_ISSUE_REQS")
        LABEL_NAME="workflow:default"
        timeout 30 gh label create "$LABEL_NAME" --color "0366d6" --description "Created by default-workflow recipe" 2>/dev/null || true
        gh_create_issue() { timeout 60 gh issue create --title "$ISSUE_TITLE" --body "$ISSUE_BODY" "$@" 2>&1; }
        try_gh_create() { GH_ISSUE_RC=0; GH_ISSUE_OUTPUT=$(gh_create_issue --label "$LABEL_NAME") || GH_ISSUE_OUTPUT=$(gh_create_issue) || GH_ISSUE_RC=$?; }
        try_gh_create; [ "$GH_ISSUE_RC" -eq 0 ] && { printf '%s\n' "$GH_ISSUE_OUTPUT"; exit 0; }
        if [[ "$GH_ISSUE_OUTPUT" =~ Could\ not\ resolve\ to\ a\ Repository|[Rr]epository\ not\ found|[Rr]epository.*inaccessible|HTTP\ 404 ]]; then
          echo "WARNING: GitHub issue creation failed because the repository could not be resolved or accessed; using local tracking metadata instead." >&2
          echo "WARNING: gh reported repository access/resolution failure." >&2
          emit_local_metadata; exit 0
        fi
        echo "ERROR: GitHub issue creation failed." >&2
        sanitize_cli_output "$GH_ISSUE_OUTPUT" >&2
        exit 1
        ;;
      azdo|azure-devops)
        REMOTE_URL=$(git remote get-url origin 2>/dev/null || echo "")
        AZDO_ORG=""; AZDO_PROJECT=""
        if [[ "$REMOTE_URL" =~ dev\.azure\.com/([^/]+)/([^/]+)/ ]]; then
          AZDO_ORG="${BASH_REMATCH[1]}"; AZDO_PROJECT="${BASH_REMATCH[2]}"
        elif [[ "$REMOTE_URL" =~ ([^/.]+)\.visualstudio\.com/([^/]+)/ ]]; then
          AZDO_ORG="${BASH_REMATCH[1]}"; AZDO_PROJECT="${BASH_REMATCH[2]}"
        elif [[ "$REMOTE_URL" =~ ssh\.dev\.azure\.com[:/]v3/([^/]+)/([^/]+)/ ]]; then
          AZDO_ORG="${BASH_REMATCH[1]}"; AZDO_PROJECT="${BASH_REMATCH[2]}"
        fi
        _pct_decode() {
          local e="$1" d="" i=0 ch hex
          while [ "$i" -lt "${#e}" ]; do
            ch="${e:$i:1}"
            if [ "$ch" = "%" ] && [ "$((i+2))" -le "${#e}" ]; then
              hex="${e:$((i+1)):2}"
              if [[ "$hex" =~ ^[0-9a-fA-F]{2}$ ]]; then
                [ "$hex" = "00" ] && { echo "WARN: NUL byte in percent-encoding" >&2; echo ""; return 1; }
                printf -v tmp "\\x$hex"; d+="$tmp"; i=$((i+3)); continue
              fi
              echo "WARN: Invalid percent-encoding '%${hex}' — using local tracking" >&2
              echo ""; return 1
            fi
            d+="$ch"; i=$((i+1))
          done
          printf '%s' "$d"
        }
        [ -n "$AZDO_ORG" ] && { AZDO_ORG=$(_pct_decode "$AZDO_ORG") || { AZDO_ORG=""; AZDO_PROJECT=""; }; }
        [ -n "$AZDO_PROJECT" ] && { AZDO_PROJECT=$(_pct_decode "$AZDO_PROJECT") || { AZDO_ORG=""; AZDO_PROJECT=""; }; }
        if [[ -n "$AZDO_ORG" ]] && ! [[ "$AZDO_ORG" =~ ^[a-zA-Z0-9._-]+$ ]]; then
          echo "WARN: AZDO_ORG contains unexpected characters — using local tracking" >&2
          AZDO_ORG=""
        fi
        # Project names may contain spaces (decoded from %20)
        if [[ -n "$AZDO_PROJECT" ]] && ! [[ "$AZDO_PROJECT" =~ ^[a-zA-Z0-9._[:space:]-]+$ ]]; then
          echo "WARN: AZDO_PROJECT contains unexpected characters — using local tracking" >&2
          AZDO_PROJECT=""
        fi
        if command -v az >/dev/null 2>&1 && [ -n "$AZDO_ORG" ] && [ -n "$AZDO_PROJECT" ]; then
          AZDO_ORG_URL="https://dev.azure.com/${AZDO_ORG}"
          if [ -n "$REF_ISSUE_NUM" ]; then
            WI_URL=$(timeout 60 az boards work-item show --id "$REF_ISSUE_NUM" --org "$AZDO_ORG_URL" --query "url" -o tsv 2>/dev/null || echo "")
            [ -n "$WI_URL" ] && { echo "INFO: Reusing work item AB#$REF_ISSUE_NUM" >&2; printf '%s\n' "$WI_URL"; exit 0; }
          fi
          WI_RESULT=$(timeout 60 az boards work-item create --title "$ISSUE_TITLE" --type "Task" \
            --org "$AZDO_ORG_URL" --project "$AZDO_PROJECT" --query "[id,url]" -o tsv 2>/dev/null || echo "")
          if [ -n "$WI_RESULT" ]; then
            read -r _ WI_URL <<< "$WI_RESULT"
            [ -n "$WI_URL" ] && { printf '%s\n' "$WI_URL"; exit 0; }
          fi
          echo "WARN: az boards work-item create failed — using local tracking" >&2
        else
          echo "WARN: 'az' CLI not found or org/project empty — using local tracking for AzDO remote" >&2
        fi
        ;;
      esac
      echo "INFO: Using local tracking for issue management (remote: $HOST_TYPE)" >&2
      emit_local_metadata
    output: "issue_creation"
    parse_json: false
  - id: "step-03b-extract-issue-number"
    type: "bash"
    command: |
      # Extract issue number — handles GitHub, AzDO, and local tracking.
      ISSUE_CREATION="$ISSUE_CREATION"; TASK_DESC_RAW="$TASK_DESCRIPTION"
      EXTRACTED=""
      LOCAL_TRACKING_RE='(^|[[:space:]])(tracking_reference|tracking_issue)=(local-[a-zA-Z0-9._:-]+|local-tracking:[a-zA-Z0-9._:-]+)($|[[:space:]])'
      LOCAL_MARKER_RE='(^|[[:space:]])(tracking_system=local|issue_creation=local-tracking|(tracking_reference|tracking_issue)=local[^[:space:]]*)($|[[:space:]])'
      if [[ "$ISSUE_CREATION" =~ $LOCAL_TRACKING_RE ]]; then printf ''; exit 0; elif [[ "$ISSUE_CREATION" =~ $LOCAL_MARKER_RE ]]; then echo "ERROR: local tracking metadata missing valid local reference." >&2; exit 1; fi
      if [[ "$ISSUE_CREATION" =~ issues/([0-9]+) ]]; then EXTRACTED="${BASH_REMATCH[1]}"
      elif [[ "$ISSUE_CREATION" =~ pull/([0-9]+) ]]; then PR_NUMBER="${BASH_REMATCH[1]}"
        command -v gh >/dev/null 2>&1 && EXTRACTED=$(timeout 60 gh pr view "$PR_NUMBER" --json closingIssuesReferences --jq '.closingIssuesReferences[0].number // ""' 2>/dev/null || echo '')
        [ -z "$EXTRACTED" ] && EXTRACTED="$PR_NUMBER"
      elif [[ "$ISSUE_CREATION" =~ _workitems/edit/([0-9]+) ]]; then EXTRACTED="${BASH_REMATCH[1]}"
      elif [[ "$ISSUE_CREATION" =~ AB#([0-9]+) ]]; then EXTRACTED="${BASH_REMATCH[1]}"
      elif [[ "$ISSUE_CREATION" =~ issue_number=([0-9]+) ]]; then EXTRACTED="${BASH_REMATCH[1]}"
      elif [[ "$TASK_DESC_RAW" =~ AB#([0-9]+) ]]; then EXTRACTED="${BASH_REMATCH[1]}"
      elif [[ "$TASK_DESC_RAW" =~ \#([0-9]+) ]]; then EXTRACTED="${BASH_REMATCH[1]}"
      fi
      if [ -z "$EXTRACTED" ]; then
        echo "ERROR: step-03b failed to extract issue number from issue_creation output." >&2
        printf '%s\n' "$ISSUE_CREATION" | head -c 4000 | sed -E 's#https?://[^[:space:]]*@#https://<redacted>@#g; s#gh[pousr]_[A-Za-z0-9_]{8,}#<redacted-token>#g; s#github_pat_[A-Za-z0-9_]+#<redacted-token>#g' >&2
        exit 1
      fi
      printf '%s' "$EXTRACTED"
    output: "issue_number"
  # STEP 4: SETUP WORKTREE AND BRANCH
