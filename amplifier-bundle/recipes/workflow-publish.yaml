name: "workflow-publish"
description: "Phase 6: bump + commit + push + draft PR + outside-in (14-16b)"
version: "1.0.0"
author: "Amplihack Team"
tags: ["development", "version", "pr"]
# workflow-publish: default-workflow phase brick. Parent context is merged by
# recipe-runner and declared outputs propagate to later phase recipes.
# Pager safety: recipe-runner-rs sets GIT_PAGER=cat/PAGER=cat for subprocesses.
recursion:
  max_depth: 6
  max_total_steps: 80

inputs:
  - name: worktree_setup.worktree_path
    description: "Absolute path to the per-task worktree produced by workflow-worktree (step-04). Required by bash steps that cd into the worktree (step-15, step-16)."
  - name: repo_path
    description: "Absolute path to the repository root. Provided by parent recipe context."

context:
  worktree_setup: ""
  allow_no_op: false
  terminal_success: "false"
  terminal_state: ""
  terminal_reason: ""
  publish_status: ""
  should_publish: "true"
  should_finalize: "true"
  should_run_ci_wait: "true"
  should_merge: "true"

steps:
  - id: "publish-terminal-state"
    type: "recipe"
    recipe: "workflow-terminal-state"

  - id: "step-14-bump-version"
    agent: "amplihack:architect"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "goal_already_met != 'true' && terminal_state.terminal_success != 'true' && terminal_state.should_publish == 'true'"
    prompt: |
       # Step 14: Bump Version in Cargo.toml (MANDATORY)

       Before committing, bump `Cargo.toml` to match the change type.

       **Task:** {{task_description}}

       Required:
       1. Review `git diff main...HEAD`.
       2. Classify as PATCH (fix/docs/refactor), MINOR (backward-compatible feature/API), or MAJOR (breaking).
       3. Update the `[workspace.package].version` line ONLY when the change type warrants it:
          - **PATCH (fix/docs/refactor): DO NOT modify the `version = "X.Y.Z"` line.**
            Leave `[workspace.package].version` exactly as-is and set
            `new_version` equal to `current_version` in the output JSON.
            A bugfix/docs/refactor branch MUST NOT bump the workspace version.
          - **MINOR (backward-compatible feature/API): bump the minor** (X.Y.Z → X.(Y+1).0).
          - **MAJOR (breaking): bump the major** (X.Y.Z → (X+1).0.0).
       4. Verify the resulting version matches the classification (unchanged for PATCH).

       Useful commands:
       ```bash
       cd {{repo_path}}
       git diff main...HEAD --stat
       CURRENT_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
       echo "Current version: $CURRENT_VERSION"
       # PATCH: leave the version line untouched (no sed).
       # MINOR/MAJOR only:
       # sed -i 's/version = "X.Y.Z"/version = "NEW.VERSION"/' Cargo.toml
       grep -E '^version = ' Cargo.toml | head -1
       ```

       **Output JSON:**
       ```json
       {
         "current_version": "X.Y.Z",
         "new_version": "A.B.C",
         "change_classification": "PATCH|MINOR|MAJOR",
         "rationale": "explanation of why this version bump",
         "changes_summary": "brief summary of what changed"
       }
       ```

       The version bump must be included in the Step 15 implementation commit.
    output: "version_bump"
    parse_json: true

  - id: "step-14b-sync-lockfile"
    type: "bash"
    condition: "goal_already_met != 'true' && terminal_state.terminal_success != 'true' && terminal_state.should_publish == 'true'"
    command: |
      set -euo pipefail
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-${REPO_PATH:-}}}"
      cd "${WORKTREE_SETUP_WORKTREE_PATH:?step-14b requires worktree_setup.worktree_path from step-04 (workflow-worktree); ensure parent recipe ran worktree-setup and propagated outputs}"
      # Issue #915: step-14 bumps the workspace version in Cargo.toml but leaves
      # Cargo.lock stale. Every pre-commit gate (artifact-guard, cargo-clippy,
      # cargo-test) runs with --locked, so step-15 fails deterministically with
      # "cannot update the lock file ... because --locked was passed". Keep the
      # lock IN SYNC (do NOT weaken --locked) using an offline, network-free
      # update. Skip gracefully on non-Rust workspaces.
      if [ -f Cargo.toml ] && [ -f Cargo.lock ]; then
        echo "step-14b: syncing Cargo.lock to bumped version (offline)"
        cargo update --workspace --offline
      else
        echo "step-14b: no Cargo.toml/Cargo.lock present; skipping lockfile sync (non-Rust workspace)"
      fi

  - id: "step-14c-sync-package-json"
    type: "bash"
    condition: "goal_already_met != 'true' && terminal_state.terminal_success != 'true' && terminal_state.should_publish == 'true'"
    command: |
      set -euo pipefail
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-${REPO_PATH:-}}}"
      cd "${WORKTREE_SETUP_WORKTREE_PATH:?step-14c requires worktree_setup.worktree_path from step-04 (workflow-worktree); ensure parent recipe ran worktree-setup and propagated outputs}"
      # Issue #925: step-14 bumps [workspace.package].version in Cargo.toml and
      # step-14b keeps Cargo.lock in sync, but NOTHING syncs the root
      # package.json "version". The contract test
      # `package_json_version_matches_root_workspace_version` then fails in CI
      # (exit 100) because package.json is left stale, and no pre-commit gate
      # catches it. Sync package.json.version to the workspace version with a
      # ROBUST read (scoped [workspace.package] parse, offline) and a ROBUST
      # JSON edit (jq, falling back to python3 json) — never brittle text
      # munging. Skip gracefully when package.json is absent (non-JS workspace).
      if [ ! -f package.json ]; then
        echo "step-14c: no package.json present; skipping npm version sync (non-JS workspace)"
        exit 0
      fi
      if [ ! -f Cargo.toml ]; then
        echo "step-14c: no Cargo.toml present; cannot determine workspace version; skipping"
        exit 0
      fi
      # Read [workspace.package].version robustly: a SCOPED parse of only the
      # [workspace.package] table (offline, network-free). This is NOT an
      # unscoped grep of the first `version =` line, which would pick up an
      # unrelated table. As a defensive fallback, prefer `cargo metadata
      # --offline` if the scoped parse yields nothing.
      WS_VERSION="$(awk -F'"' '
        /^\[workspace\.package\]/ { in_ws = 1; next }
        /^\[/ { in_ws = 0 }
        in_ws && /^[[:space:]]*version[[:space:]]*=/ { print $2; exit }
      ' Cargo.toml)"
      # Fallback: resolve the workspace ROOT package by its resolved id
      # (.resolve.root) — NOT `select(.source == null)`, which matches ALL local
      # members and is nondeterministic when members declare divergent versions.
      if [ -z "${WS_VERSION:-}" ] && command -v cargo >/dev/null 2>&1 && command -v jq >/dev/null 2>&1; then
        WS_VERSION="$(cargo metadata --no-deps --format-version=1 --offline 2>/dev/null \
          | jq -r '.resolve.root as $r | (.packages[] | select(.id == $r) | .version) // empty' 2>/dev/null || true)"
      fi
      if [ -z "${WS_VERSION:-}" ]; then
        # Non-standard layout or unreadable version: skip cleanly (mirror-only
        # step; never a hard failure). Matches requirement R4 and the reference doc.
        echo "step-14c: could not read [workspace.package].version; skipping package.json sync"
        exit 0
      fi
      echo "step-14c: syncing package.json version to workspace version ${WS_VERSION}"
      if command -v jq >/dev/null 2>&1; then
        # Write to a temp file IN THE SAME DIRECTORY so `mv` is an atomic,
        # same-filesystem rename, and preserve the original file permissions.
        _tmp="$(mktemp ./package.json.XXXXXX)"
        trap 'rm -f "$_tmp"' EXIT
        chmod --reference=package.json "$_tmp" 2>/dev/null || true
        jq --arg v "$WS_VERSION" '.version = $v' package.json > "$_tmp"
        mv "$_tmp" package.json
        trap - EXIT
      else
        # Same atomic contract as the jq path: write a temp file IN THE SAME
        # DIRECTORY (so os.replace is an atomic same-filesystem rename) and copy
        # the original file mode so permissions (e.g. 0644) are preserved.
        WS_VERSION="$WS_VERSION" python3 -c 'import json, os, tempfile; p = "package.json"; d = json.load(open(p, encoding="utf-8")); d["version"] = os.environ["WS_VERSION"]; _dir = os.path.dirname(os.path.abspath(p)); _fd, _tmp = tempfile.mkstemp(dir=_dir, prefix="package.json."); os.write(_fd, (json.dumps(d, indent=2) + "\n").encode("utf-8")); os.close(_fd); os.chmod(_tmp, os.stat(p).st_mode & 0o7777); os.replace(_tmp, p)'
      fi

  - id: "step-14g-artifact-guard"
    type: "bash"
    condition: "goal_already_met != 'true' && terminal_state.terminal_success != 'true' && terminal_state.should_publish == 'true'"
    command: |
      set -euo pipefail
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-${REPO_PATH:-}}}"
      cd "${WORKTREE_SETUP_WORKTREE_PATH:?step-14g requires worktree_setup.worktree_path from step-04 (workflow-worktree); ensure parent recipe ran worktree-setup and propagated outputs}"
      amplihack hygiene artifact-guard --repo . --mode pre-publish

  - id: "step-15-commit-push"
    type: "bash"
    condition: "goal_already_met != 'true' && terminal_state.terminal_success != 'true' && terminal_state.should_publish == 'true'"
    command: |
      set -euo pipefail
      export GIT_PAGER=cat
      export PAGER=cat
      export LESS=FRX
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-${REPO_PATH:-}}}"
      cd "${WORKTREE_SETUP_WORKTREE_PATH:?step-15 requires worktree_setup.worktree_path from step-04 (workflow-worktree); ensure parent recipe ran worktree-setup and propagated outputs}"
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        echo "ERROR: step-15-commit-push requires a git repo at $(pwd); either \`git init\` or rerun from a checkout" >&2
        exit 1
      fi
      # Security: refuse to commit/push on protected branches (guards REPO_PATH fallback)
      _CURRENT_BRANCH=$(git branch --show-current 2>/dev/null || echo "")
      if [ "$_CURRENT_BRANCH" = "main" ] || [ "$_CURRENT_BRANCH" = "master" ]; then echo "ERROR: step-15 landed on protected branch '$_CURRENT_BRANCH' — refusing to commit. Worktree setup likely failed." >&2; exit 1; fi
      echo "=== Step 15: Commit and Push ===" >&2
      # FIX (#495): commit_result MUST be emitted on every exit path so step-16
      # (PR creation) can be gated on the actual push outcome. Trap installed
      # AFTER var init, BEFORE any failing command — reordering produces invalid JSON.
      if ! command -v jq >/dev/null 2>&1; then
        echo "ERROR: jq is required by step-15 (commit_result emission)." >&2
        exit 2
      fi
      redact_sensitive_file() {
        sed -E 's#(https?://)[^@[:space:]]+@#\1REDACTED@#g' "$1"
      }
      pushed="false"; sha=""; branch=""; reason="aborted"
      _emit_commit_result() {
        jq -nc --arg pushed "$pushed" --arg sha "$sha" --arg branch "$branch" --arg reason "$reason" \
          '{pushed:$pushed,sha:$sha,branch:$branch,reason:$reason}'
      }
      trap _emit_commit_result EXIT
      branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")
      echo "--- Staging Changes ---" >&2
      RUNTIME_ARTIFACT_HELPER="${WORKFLOW_RUNTIME_ARTIFACT_HELPER:-${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_runtime_artifacts.sh}"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${REPO_PATH:-$(pwd)}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="$(pwd)/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.copilot/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.amplihack/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || { echo "ERROR: workflow runtime artifact helper not found (searched WORKFLOW_RUNTIME_ARTIFACT_HELPER, AMPLIHACK_HOME, REPO_PATH, worktree, ~/.copilot, ~/.amplihack): $RUNTIME_ARTIFACT_HELPER" >&2; exit 2; }
      . "$RUNTIME_ARTIFACT_HELPER"
      preflight_known_workflow_runtime_artifacts .
      amplihack hygiene artifact-guard --repo . --mode pre-publish
      git add -A
      echo "--- Creating Commit ---" >&2
      # FIX (#469/#311): Use env vars — safe against injection and word-splitting.
      TASK_DESC="$TASK_DESCRIPTION"
      ISSUE_NUMBER="$ISSUE_NUMBER"
      # FIX (#944): Derive the conventional-commit prefix from the real change
      # type reported by step-14-bump-version instead of hardcoding 'feat:'. A
      # hardcoded 'feat:' made pure bugfix branches trip the version-bump gate
      # (observed on #920/#943, requiring manual reverts).
      #   PATCH -> fix:   MINOR -> feat:   MAJOR -> feat!:
      # The classification is read from the step-14 output (surfaced by the
      # recipe runner as RECIPE_VAR_version_bump__change_classification; the
      # VERSION_BUMP__CHANGE_CLASSIFICATION uppercase form is a defensive
      # fallback). When unset/unknown, fall back to a bugfix-intent heuristic on
      # the task description, defaulting to feat: to preserve legacy behavior.
      CHANGE_CLASS="${RECIPE_VAR_version_bump__change_classification:-${VERSION_BUMP__CHANGE_CLASSIFICATION:-}}"
      case "$(printf '%s' "$CHANGE_CLASS" | tr '[:lower:]' '[:upper:]')" in
        PATCH) COMMIT_PREFIX="fix: " ;;
        MINOR) COMMIT_PREFIX="feat: " ;;
        MAJOR) COMMIT_PREFIX="feat!: " ;;
        *)
          case "$(printf '%s' "$TASK_DESC" | tr '[:upper:]' '[:lower:]')" in
            *bug*|*bugfix*|*fix*) COMMIT_PREFIX="fix: " ;;
            *)                    COMMIT_PREFIX="feat: " ;;
          esac
          ;;
      esac
      COMMIT_TITLE=$(printf '%s%.72s' "$COMMIT_PREFIX" "$(printf '%s' "$TASK_DESC" | tr '\n\r' ' ' | head -1)")
      # FIX #684: Host-aware commit references
      HOST_TYPE="${REMOTE_HOST_TYPE:-other}"
      case "$HOST_TYPE" in
        github) ISSUE_REF="Closes #${ISSUE_NUMBER}"; ISSUE_IMPL="issue #${ISSUE_NUMBER}" ;;
        azdo)   ISSUE_REF="AB#${ISSUE_NUMBER}"; ISSUE_IMPL="AB#${ISSUE_NUMBER}" ;;
        *)      ISSUE_REF="Ref #${ISSUE_NUMBER}"; ISSUE_IMPL="issue #${ISSUE_NUMBER}" ;;
      esac
      COMMIT_MSG=$(printf '%s\n\nImplements %s\n\nChanges:\n- Implementation as per design specification\n- Tests added for new functionality\n- Documentation updated\n\n%s' "$COMMIT_TITLE" "$ISSUE_IMPL" "$ISSUE_REF")
      if [ -n "$(git diff --cached --name-only)" ]; then
        GIT_IDENTITY_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(git rev-parse --show-toplevel)}}/amplifier-bundle/tools/git-identity.sh"; [ -f "$GIT_IDENTITY_HELPER" ] || GIT_IDENTITY_HELPER="$(git rev-parse --show-toplevel)/amplifier-bundle/tools/git-identity.sh"; [ -f "$GIT_IDENTITY_HELPER" ] || { echo "ERROR: git identity helper not found: $GIT_IDENTITY_HELPER" >&2; exit 2; }; . "$GIT_IDENTITY_HELPER"
        amplihack_prepare_git_commit_identity
        git commit -m "$COMMIT_MSG"
      else
        # FIX (#282): hollow-success false-positive when agent worked in an
        # alternate worktree. Check if the current branch has new commits
        # in any other worktree before declaring hollow success.
        CURRENT_BRANCH=$(git branch --show-current)
        ALT_WORKTREE_COMMITS=0
        if [ -n "$CURRENT_BRANCH" ] && git rev-parse --abbrev-ref '@{u}' >/dev/null 2>&1; then
          ALT_WORKTREE_COMMITS=$(git rev-list --count '@{u}..HEAD' 2>/dev/null || echo 0)
        fi
        if [ "$ALT_WORKTREE_COMMITS" -gt 0 ]; then
          echo "INFO: Nothing staged in ${WORKTREE_SETUP_WORKTREE_PATH:-(unset)}, but the" >&2
          echo "current branch '$CURRENT_BRANCH' is $ALT_WORKTREE_COMMITS commit(s) ahead of upstream." >&2
          git --no-pager log --oneline -"$ALT_WORKTREE_COMMITS" >&2
        else
          echo "INFO: Nothing staged to commit; continuing so already-pushed meaningful work can be published or classified." >&2
        fi
      fi
      echo "--- Pushing to Remote ---" >&2
      # REL-002: Detect missing upstream tracking branch before rev-list
      if ! git rev-parse --abbrev-ref '@{u}' >/dev/null 2>&1; then
        echo "WARNING: No upstream tracking branch configured — skipping push" >&2
        reason="no-upstream"
        exit 0
      fi
      COMMITS_AHEAD=$(git rev-list --count @{u}..HEAD)
      if [ "$COMMITS_AHEAD" -ne 0 ]; then
        pull_output_file=$(mktemp -t step15-pull-XXXXXX)
        if git pull --rebase >"$pull_output_file" 2>&1; then
          redact_sensitive_file "$pull_output_file" >&2
          rm -f "$pull_output_file"
        else
          pull_rc=$?
          sanitized=$(redact_sensitive_file "$pull_output_file" | tr '\n' ' ' | head -c 500)
          reason="pull-failed: ${sanitized}"
          echo "ERROR: git pull --rebase failed (exit $pull_rc)" >&2
          redact_sensitive_file "$pull_output_file" >&2
          rm -f "$pull_output_file"
          exit "$pull_rc"
        fi
        # FIX (#495): capture push stderr, redact tokens before reason emission.
        push_stderr_file=$(mktemp -t step15-push-XXXXXX)
        # shellcheck disable=SC2064
        trap "rm -f \"$push_stderr_file\"; _emit_commit_result" EXIT
        if git push 2>"$push_stderr_file"; then
          # Mutate `pushed` ONLY after successful push — step-16's gate contract.
          pushed="true"
          raw_sha=$(git rev-parse HEAD 2>/dev/null || echo "")
          if printf '%s' "$raw_sha" | grep -qE '^[0-9a-f]{40}$'; then
            sha="$raw_sha"
          fi
          reason="pushed"
        else
          push_rc=$?
          sanitized=$(redact_sensitive_file "$push_stderr_file" | tr '\n' ' ' | head -c 500)
          reason="push-failed: ${sanitized}"
          echo "ERROR: git push failed (exit $push_rc)" >&2
          redact_sensitive_file "$push_stderr_file" >&2
          exit "$push_rc"
        fi
      else
        echo "INFO: Nothing to push - branch is already up to date with remote" >&2
        raw_sha=$(git rev-parse HEAD 2>/dev/null || echo "")
        if printf '%s' "$raw_sha" | grep -qE '^[0-9a-f]{40}$'; then
          sha="$raw_sha"
        fi
        pushed="true"
        reason="already-pushed"
      fi
      echo "=== Commit and Push Complete ===" >&2
    output: "commit_result"
    parse_json: true

  - id: "step-16-create-draft-pr"
    type: "bash"
    condition: "goal_already_met != 'true' && terminal_state.terminal_success != 'true' && terminal_state.should_publish == 'true' && commit_result.pushed == 'true'"
    command: |
      set -euo pipefail
      export GIT_PAGER=cat PAGER=cat LESS=FRX
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-${REPO_PATH:-}}}"
      cd "${WORKTREE_SETUP_WORKTREE_PATH:?step-16 requires worktree_setup.worktree_path from step-04 (workflow-worktree); ensure parent recipe ran worktree-setup and propagated outputs}"
      git rev-parse --is-inside-work-tree >/dev/null 2>&1 || { echo "ERROR: step-16-create-draft-pr requires a git repo at $(pwd); either \`git init\` or rerun from a checkout" >&2; exit 1; }
      _CURRENT_BRANCH=$(git branch --show-current 2>/dev/null || echo "")
      if [ "$_CURRENT_BRANCH" = "main" ] || [ "$_CURRENT_BRANCH" = "master" ]; then echo "ERROR: step-16 landed on protected branch '$_CURRENT_BRANCH' — refusing to create PR. Worktree setup likely failed." >&2; exit 1; fi
      HOST_TYPE="${REMOTE_HOST_TYPE:-other}"
      if [ "$HOST_TYPE" != "github" ]; then :; fi
      RUNTIME_ARTIFACT_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${REPO_PATH:-$(pwd)}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="$(pwd)/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.copilot/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${HOME:-/root}/.amplihack/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || { echo "ERROR: workflow runtime artifact helper not found (searched AMPLIHACK_HOME, REPO_PATH, worktree, ~/.copilot, ~/.amplihack): $RUNTIME_ARTIFACT_HELPER" >&2; exit 2; }
      # shellcheck source=/dev/null
      . "$RUNTIME_ARTIFACT_HELPER"
      preflight_known_workflow_runtime_artifacts .
      # Contract implemented by workflow_publish_pr.sh: --state all; gh pr view; headRefName; headRefOid; mergedAt; git diff --quiet; terminal_status; non-github.
      # Base-ref contract: resolve_pr_base_ref checks refs/remotes/origin/HEAD, runs git remote set-head origin -a, falls back through origin/master origin/develop, and fails with ERROR: no supported remote base ref found.
      # Metadata contract: ISSUE_NUM, git diff, git log, git diff --name-only, Changed files, Validation, Behavior, Risk, and step-13 shape PR title/body context.
      # PUBLISH_STATE="no-diff"; PUBLISH_STATE="existing-open-pr"; PUBLISH_STATE="already-merged"; PUBLISH_STATE="closed-after-merge"; PUBLISH_STATE="closed-unmerged-with-diff".
      # Provider-aware states: GitHub preserves existing scoped PR behavior; AzDO uses REMOTE_HOST_TYPE=azdo with az repos pr list/create.
      # Terminal vocabulary: MERGED, CLOSED_OBSOLETE, NO_DIFF_SUCCESS, FOLLOWUP_CREATED, EXISTING_OPEN_PR, BLOCKED_CI, BLOCKED_PROVIDER.
      # gh pr create is called by the helper only after PUBLISH_STATE classification.
      # gh pr create failed is surfaced by workflow_publish_pr.sh as FAILED_PR_CREATE.
      PUBLISH_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_publish_pr.sh"
      if [ ! -f "$PUBLISH_HELPER" ] && [ -n "${REPO_PATH:-}" ]; then PUBLISH_HELPER="$REPO_PATH/amplifier-bundle/tools/workflow_publish_pr.sh"; fi
      [ -f "$PUBLISH_HELPER" ] || { echo "ERROR: workflow publish helper not found: $PUBLISH_HELPER" >&2; exit 1; }
      bash "$PUBLISH_HELPER"
    output: "pr_publish_result"
    parse_json: true

  - id: "step-16b-outside-in-fix-loop"
    agent: "amplihack:builder"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "goal_already_met != 'true' && terminal_state.terminal_success != 'true' && terminal_state.should_publish == 'true'"
    prompt: |
       # Step 16b: Outside-In Testing and Fix Loop (MANDATORY)

       Test from the PR branch as a user would, fix failures, and update the PR.

       **Task:** {{task_description}}
       **PR URL:** {{pr_publish_result.pr_url}}

       Required:
       1. Get the current branch with `git branch --show-current`.
       2. Detect affected languages, manifests, lockfiles, package managers,
          entry points, changed files, and documented project commands before
          choosing a validation strategy.
       3. Invoke `Skill(skill="qa-team")`.
       4. Run at least one simple and one edge/integration scenario through the
          appropriate outside-in user or consumer boundary for the detected
          toolchain. Examples include local `cargo`, `npm`, `uv`/Python, `go`,
          or `dotnet` commands; `uvx` is only appropriate for Python/uv CLI
          distribution validation when that project shape warrants it.
       5. If a test fails, diagnose, fix, commit, push, and retry up to 3 times:
          ```bash
          GIT_IDENTITY_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(git rev-parse --show-toplevel)}}/amplifier-bundle/tools/git-identity.sh"
          [ -f "$GIT_IDENTITY_HELPER" ] || GIT_IDENTITY_HELPER="$(git rev-parse --show-toplevel)/amplifier-bundle/tools/git-identity.sh"
          . "$GIT_IDENTITY_HELPER"
          amplihack hygiene artifact-guard --repo . --mode pre-publish && git add -A
          amplihack_prepare_git_commit_identity
          git commit -m "fix: <describe the fix found during outside-in testing>"
          git pull --rebase && git push
          ```
       6. If failures persist after 3 iterations, document them honestly.

