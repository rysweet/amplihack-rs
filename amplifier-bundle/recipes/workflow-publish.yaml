name: "workflow-publish"
description: "Phase 6: bump + commit + push + draft PR + outside-in (14-16b)"
version: "1.0.0"
author: "Amplihack Team"
tags: ["development", "version", "pr"]

# workflow-publish: default-workflow phase brick. Parent context is merged by
# recipe-runner and declared outputs propagate to later phase recipes.

recursion:
  max_depth: 6
  max_total_steps: 80

inputs:
  - name: worktree_setup.worktree_path
    description: "Absolute path to the per-task worktree produced by workflow-worktree (step-04). Required by bash steps that cd into the worktree (step-15, step-16)."
  - name: repo_path
    description: "Absolute path to the repository root. Provided by parent recipe context."

context:
  worktree_setup: ""
  allow_no_op: false

steps:
  - id: "step-14-bump-version"
    agent: "amplihack:architect"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "goal_already_met != 'true'"
    prompt: |
       # Step 14: Bump Version in Cargo.toml (MANDATORY)

       Before committing, bump `Cargo.toml` to match the change type.

       **Task:** {{task_description}}

       Required:
       1. Review `git diff main...HEAD`.
       2. Classify as PATCH (fix/docs/refactor), MINOR (backward-compatible feature/API), or MAJOR (breaking).
       3. Read and update the current `version = "X.Y.Z"` line in the workspace Cargo.toml.
       4. Verify the new version.

       Useful commands:
       ```bash
       cd {{repo_path}}
       git diff main...HEAD --stat
       CURRENT_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
       echo "Current version: $CURRENT_VERSION"
       # sed -i 's/version = "X.Y.Z"/version = "NEW.VERSION"/' Cargo.toml
       grep -E '^version = ' Cargo.toml | head -1
       ```

       **Output JSON:**
       ```json
       {
         "current_version": "X.Y.Z",
         "new_version": "A.B.C",
         "change_classification": "PATCH|MINOR|MAJOR",
         "rationale": "explanation of why this version bump",
         "changes_summary": "brief summary of what changed"
       }
       ```

       The version bump must be included in the Step 15 implementation commit.
    output: "version_bump"
    parse_json: true

  - id: "step-15-commit-push"
    type: "bash"
    condition: "goal_already_met != 'true'"
    command: |
      set -euo pipefail
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-}}"
      cd "${WORKTREE_SETUP_WORKTREE_PATH:?step-15 requires worktree_setup.worktree_path from step-04 (workflow-worktree); ensure parent recipe ran worktree-setup and propagated outputs}"
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        echo "ERROR: step-15-commit-push requires a git repo at $(pwd); either \`git init\` or rerun from a checkout" >&2
        exit 1
      fi
      echo "=== Step 15: Commit and Push ===" >&2
      # FIX (#495): commit_result MUST be emitted on every exit path so step-16
      # (PR creation) can be gated on the actual push outcome. Trap installed
      # AFTER var init, BEFORE any failing command — reordering produces invalid JSON.
      if ! command -v jq >/dev/null 2>&1; then
        echo "ERROR: jq is required by step-15 (commit_result emission)." >&2
        exit 2
      fi
      pushed="false"; sha=""; branch=""; reason="aborted"
      _emit_commit_result() {
        jq -nc --arg pushed "$pushed" --arg sha "$sha" --arg branch "$branch" --arg reason "$reason" \
          '{pushed:$pushed,sha:$sha,branch:$branch,reason:$reason}'
      }
      trap _emit_commit_result EXIT
      branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")
      echo "--- Staging Changes ---" >&2
      git add -A
      echo "--- Creating Commit ---" >&2
      # FIX (#469/#311): Use env vars — safe against injection and word-splitting.
      TASK_DESC="$TASK_DESCRIPTION"
      ISSUE_NUMBER="$ISSUE_NUMBER"
      COMMIT_TITLE=$(printf 'feat: %.72s' "$(printf '%s' "$TASK_DESC" | tr '\n\r' ' ' | head -1)")
      COMMIT_MSG=$(printf '%s\n\nImplements issue #%s\n\nChanges:\n- Implementation as per design specification\n- Tests added for new functionality\n- Documentation updated\n\nCloses #%s' "$COMMIT_TITLE" "$ISSUE_NUMBER" "$ISSUE_NUMBER")
      if [ -n "$(git diff --cached --name-only)" ]; then
        git commit -m "$COMMIT_MSG"
      else
        # FIX (#282): hollow-success false-positive when agent worked in an
        # alternate worktree. Check if the current branch has new commits
        # in any other worktree before declaring hollow success.
        CURRENT_BRANCH=$(git branch --show-current)
        ALT_WORKTREE_COMMITS=0
        if [ -n "$CURRENT_BRANCH" ] && git rev-parse --abbrev-ref '@{u}' >/dev/null 2>&1; then
          ALT_WORKTREE_COMMITS=$(git rev-list --count '@{u}..HEAD' 2>/dev/null || echo 0)
        fi
        if [ "$ALT_WORKTREE_COMMITS" -gt 0 ]; then
          echo "INFO: Nothing staged in ${WORKTREE_SETUP_WORKTREE_PATH:-(unset)}, but the" >&2
          echo "current branch '$CURRENT_BRANCH' is $ALT_WORKTREE_COMMITS commit(s) ahead of upstream." >&2
          git --no-pager log --oneline -"$ALT_WORKTREE_COMMITS" >&2
        else
          echo "ERROR: Nothing staged to commit. Implementation may have written files outside the worktree." >&2
          git --no-pager status >&2
          reason="nothing-to-commit"
          exit 1
        fi
      fi
      echo "--- Pushing to Remote ---" >&2
      # REL-002: Detect missing upstream tracking branch before rev-list
      if ! git rev-parse --abbrev-ref '@{u}' >/dev/null 2>&1; then
        echo "WARNING: No upstream tracking branch configured — skipping push" >&2
        reason="no-upstream"
        exit 0
      fi
      COMMITS_AHEAD=$(git rev-list --count @{u}..HEAD)
      if [ "$COMMITS_AHEAD" -ne 0 ]; then
        # REL-001: surface rebase conflict diagnostics, no stderr suppression
        git pull --rebase
        # FIX (#495): capture push stderr, redact tokens before reason emission.
        push_stderr_file=$(mktemp -t step15-push-XXXXXX)
        # shellcheck disable=SC2064
        trap "rm -f \"$push_stderr_file\"; _emit_commit_result" EXIT
        if git push 2>"$push_stderr_file"; then
          # Mutate `pushed` ONLY after successful push — step-16's gate contract.
          pushed="true"
          raw_sha=$(git rev-parse HEAD 2>/dev/null || echo "")
          if printf '%s' "$raw_sha" | grep -qE '^[0-9a-f]{40}$'; then
            sha="$raw_sha"
          fi
          reason="pushed"
        else
          push_rc=$?
          sanitized=$(sed -E 's#https://[^@[:space:]]+@#https://REDACTED@#g' "$push_stderr_file" | tr '\n' ' ' | head -c 500)
          reason="push-failed: ${sanitized}"
          echo "ERROR: git push failed (exit $push_rc)" >&2
          cat "$push_stderr_file" >&2
          exit "$push_rc"
        fi
      else
        echo "WARNING: Nothing to push - branch is up to date with remote" >&2
        reason="nothing-to-push"
      fi
      echo "=== Commit and Push Complete ===" >&2
    output: "commit_result"
    parse_json: true

  - id: "step-16-create-draft-pr"
    type: "bash"
    condition: "goal_already_met != 'true' && commit_result.pushed == 'true'"
    command: |
      set -euo pipefail
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-}}"
      cd "${WORKTREE_SETUP_WORKTREE_PATH:?step-16 requires worktree_setup.worktree_path from step-04 (workflow-worktree); ensure parent recipe ran worktree-setup and propagated outputs}"
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        echo "ERROR: step-16-create-draft-pr requires a git repo at $(pwd); either \`git init\` or rerun from a checkout" >&2
        exit 1
      fi
      echo "=== Step 16: Creating Draft PR ===" >&2

      # Idempotency guard: detect pre-existing PRs before creating one.
      CURRENT_BRANCH=$(git branch --show-current)
      ISSUE_NUM="$ISSUE_NUMBER"

      if ! [[ "$ISSUE_NUM" =~ ^[0-9]+$ ]]; then
          echo "ERROR: issue_number is not numeric: $ISSUE_NUM" >&2
          exit 1
      fi

      if ! command -v gh >/dev/null 2>&1; then
          echo "ERROR: step-16-create-draft-pr requires the GitHub CLI ('gh') on PATH." >&2
          exit 127
      fi

      sanitize_gh_stderr() {
          sed -E 's#https://[^@[:space:]]+@#https://REDACTED@#g' "$1" | tr '\n' ' ' | head -c 500
      }

      is_transient_gh_error() {
          [ -s "$1" ] && grep -Eiq 'HTTP 5[0-9][0-9]|(^|[^0-9])(502|503|504)([^0-9]|$)|rate limit|timed out|timeout|temporar|connection reset|connection refused|TLS handshake|network|server error' "$1"
      }

      gh_pr_list_or_empty() {
          local stderr_file
          local output
          local status
          local attempt
          local delay=1
          local max_attempts=3

          for attempt in 1 2 3; do
              stderr_file=$(mktemp -t step16-gh-pr-list-XXXXXX)
              if output=$(gh pr list "$@" 2>"$stderr_file"); then
                  rm -f "$stderr_file"
                  printf '%s\n' "$output"
                  return 0
              fi
              status=$?

              if [ "$attempt" -lt "$max_attempts" ] && is_transient_gh_error "$stderr_file"; then
                  echo "WARNING: gh pr list failed transiently (exit ${status}); retrying (${attempt}/${max_attempts}): $(sanitize_gh_stderr "$stderr_file")" >&2
                  rm -f "$stderr_file"
                  sleep "$delay"
                  delay=$((delay * 2))
                  continue
              fi

              echo "WARNING: gh pr list failed (exit ${status}); continuing as if no existing PR was found." >&2
              if [ -s "$stderr_file" ]; then
                  echo "gh pr list stderr: $(sanitize_gh_stderr "$stderr_file")" >&2
              fi
              rm -f "$stderr_file"
              printf '\n'
              return 0
          done
      }

      gh_pr_create_with_retry() {
          local stderr_file
          local output
          local status
          local attempt
          local delay=1
          local max_attempts=3

          for attempt in 1 2 3; do
              stderr_file=$(mktemp -t step16-gh-pr-create-XXXXXX)
              if output=$(gh pr create --draft --title "$PR_TITLE" --body "$PR_BODY" 2>"$stderr_file"); then
                  rm -f "$stderr_file"
                  printf '%s\n' "$output"
                  return 0
              fi
              status=$?

              if [ "$attempt" -lt "$max_attempts" ] && is_transient_gh_error "$stderr_file"; then
                  echo "WARNING: gh pr create failed transiently (exit ${status}); retrying (${attempt}/${max_attempts}): $(sanitize_gh_stderr "$stderr_file")" >&2
                  rm -f "$stderr_file"
                  sleep "$delay"
                  delay=$((delay * 2))
                  continue
              fi

              echo "ERROR: gh pr create failed (exit $status) — PR may already exist for this branch or GitHub API is unavailable" >&2
              if [ -s "$stderr_file" ]; then
                  echo "gh pr create stderr: $(sanitize_gh_stderr "$stderr_file")" >&2
              fi
              rm -f "$stderr_file"
              return "$status"
          done
      }

      resolve_pr_base_ref() {
          local candidate

          candidate="$(git symbolic-ref -q --short refs/remotes/origin/HEAD 2>/dev/null || true)"
          if [ -n "$candidate" ] && git rev-parse --verify --quiet "${candidate}^{commit}" >/dev/null; then
              printf '%s\n' "$candidate"
              return 0
          fi

          git remote set-head origin -a >/dev/null 2>&1 || true
          candidate="$(git symbolic-ref -q --short refs/remotes/origin/HEAD 2>/dev/null || true)"
          if [ -n "$candidate" ] && git rev-parse --verify --quiet "${candidate}^{commit}" >/dev/null; then
              printf '%s\n' "$candidate"
              return 0
          fi

          for candidate in origin/master origin/develop; do
              if git rev-parse --verify --quiet "${candidate}^{commit}" >/dev/null; then
                  printf '%s\n' "$candidate"
                  return 0
              fi
          done

          echo "ERROR: no supported remote base ref found. Expected origin/HEAD, origin/master, or origin/develop." >&2
          return 1
      }

      # gh pr list failures are explicit but non-blocking; empty means no PR found.
      EXISTING_PR=$(gh_pr_list_or_empty --head "$CURRENT_BRANCH" --json url --jq '.[0].url // ""')

      if [ -z "$EXISTING_PR" ]; then
          EXISTING_PR=$(gh_pr_list_or_empty --json url,headRefName --jq "[.[] | select(.headRefName | test(\"issue-$ISSUE_NUM\"))] | .[0].url // \"\"")
      fi

      if [ -n "$EXISTING_PR" ]; then
          echo "INFO: PR already exists — skipping creation" >&2
          echo "Existing PR: $EXISTING_PR" >&2
          printf '%s\n' "$EXISTING_PR"
          exit 0
      fi

      BASE_REF="$(resolve_pr_base_ref)"
      BASE_BRANCH="${BASE_REF#origin/}"
      COMMITS_AHEAD=$(git rev-list --count "${BASE_REF}..HEAD" 2>/dev/null || echo "0")

      if [ "$COMMITS_AHEAD" -eq 0 ]; then
          echo "ERROR: 0 commits ahead of ${BASE_BRANCH} and no related PR found for issue-$ISSUE_NUM." >&2
          echo "This is a hollow-success condition: the workflow ran but produced no commits." >&2
          echo "Possible causes:" >&2
          echo "  1. step-15-commit-push failed silently (check commit_result output)" >&2
          echo "  2. Implementation agents wrote files outside the worktree" >&2
          echo "  3. Work was done on a different branch" >&2
          git --no-pager log --oneline -5 >&2
          exit 1
      fi

      TASK_DESC="$TASK_DESCRIPTION"
      PR_DESIGN="${design_spec:-${DESIGN_SPEC:-${RECIPE_VAR_design_spec:-${RECIPE_VAR_DESIGN_SPEC:-}}}}"
      PR_TITLE="${TASK_DESC//$'\n'/ }"
      PR_TITLE="${PR_TITLE//$'\r'/ }"
      PR_TITLE="${PR_TITLE:0:200}"
      PR_BODY=$(printf '## Summary\n%s\n\n## Issue\nCloses #%s\n\n## Changes\n%s\n\n## Testing\n- Unit tests added\n- Local testing completed\n- Pre-commit hooks pass\n\n## Checklist\n- [x] Tests pass\n- [x] Documentation updated\n- [x] No stubs or TODOs\n- [ ] Code review completed\n- [ ] Philosophy check passed\n\n---\n*This PR was created as a draft for review before merging.*\n' "$TASK_DESC" "$ISSUE_NUM" "$PR_DESIGN")
      gh_pr_create_with_retry
    output: "pr_url"

  - id: "step-16b-outside-in-fix-loop"
    agent: "amplihack:builder"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "goal_already_met != 'true'"
    prompt: |
       # Step 16b: Outside-In Testing and Fix Loop (MANDATORY)

       Test from the PR branch as a user would, fix failures, and update the PR.

       **Task:** {{task_description}}
       **PR URL:** {{pr_url}}

       Required:
       1. Get branch and remote with `git branch --show-current` and `git remote get-url origin`.
       2. Invoke `Skill(skill="qa-team")`.
       3. Run at least one simple and one edge/integration scenario via:
       ```bash
       uvx --from git+<remote-url>@<branch-name> amplihack <command>
       ```
       4. If a test fails, diagnose, fix, commit, push, and retry up to 3 times:
          ```bash
          git add -A && git commit -m "fix: <describe the fix found during outside-in testing>"
          git pull --rebase && git push
          ```
       5. If failures persist after 3 iterations, document them honestly.

       Update the PR description with a "Step 16b: Outside-In Testing Results"
       section listing each scenario, command, result, key output, and fix count.
    output: "outside_in_fix_loop_results"

  # ==========================================================================
  # STEP 17: REVIEW THE PR (MANDATORY - DO NOT SKIP)
  # Granular sub-steps with verification gates to prevent completion bias.
  # Each sub-step invokes a specific agent and requires evidence.
  # ==========================================================================
