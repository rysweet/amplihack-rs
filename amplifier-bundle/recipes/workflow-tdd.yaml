name: "workflow-tdd"
description: "Phase 3: TDD — tests, implement, no-op guard (07-08c)"
version: "1.0.0"
author: "Amplihack Team"
tags: ["development", "tdd", "implementation"]

# Pager safety: recipe-runner-rs sets GIT_PAGER=cat/PAGER=cat for subprocesses.

# workflow-tdd: composable phase brick extracted from default-workflow.yaml.
# Context flows in via recipe-runner's _execute_sub_recipe(); outputs propagate
# back to the parent and are visible to subsequent phase recipes.
#
# FIX #611: TDD steps do NOT check goal_already_met (closed issue ≠ complete).
# FIX #615: step-08c is an AGENTIC two-step verifier (work-verifier agent +
#   enforce-verdict bash gate), replacing the legacy bash hollow-success guard.
#   Verdicts: WORK_VERIFIED→exit 0, INSUFFICIENT_EVIDENCE→warn+exit 0,
#   HOLLOW_SUCCESS→exit 1. See issue #615 for full design.
recursion:
  max_depth: 6
  max_total_steps: 80

context:
  worktree_setup: ""
  allow_no_op: false

steps:
  - id: "step-07-write-tests"
    agent: "amplihack:tester"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    prompt: |
      # Step 7: TDD - Write Tests First

      **Task:** {{task_description}}
      **Requirements:** {{final_requirements}}
      **Design Specification:** {{design_spec}}
      **Documentation:** {{final_documentation}}

      Following Test-Driven Development methodology:

      Write FAILING tests that specify the expected behavior:
      - Unit tests for each component
      - Integration tests for workflows
      - Edge case tests
      - Error handling tests

      These tests should:
      - Define the contract for the implementation
      - Fail initially (code doesn't exist yet)
      - Pass once implementation is complete

      Output test files with clear file path headers.
    output: "test_spec"

  - id: "step-08-implement"
    agent: "amplihack:builder"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    prompt: |
      # Step 8: Implement the Solution

      **Task:** {{task_description}}
      **Requirements:** {{final_requirements}}
      **Design Specification:** {{design_spec}}
      **Documentation:** {{final_documentation}}
      **Tests (must pass):** {{test_spec}}

      Implement the solution following the design.

      **Rules (in order of authority):**
      0. **The user's task description is authoritative.** If the existing code already
         appears to satisfy the requirements, that is a SIGNAL THAT YOU MISREAD THE
         TASK — re-read it more carefully and apply the requested change anyway. Do
         NOT exit without modifying files unless the task is provably impossible
         (e.g., contradicts laws of physics, references nonexistent platforms). A
         "no-op" outcome must be explicitly justified in the output.
      1. You MUST modify or create at least one file unless rule 0's "provably
         impossible" exception applies. Reading code is not implementing.
      2. Follow the design closely.
      3. Make failing tests pass iteratively.
      4. NO stubs, TODOs, or placeholder code.
      5. NO swallowed exceptions.
      6. NO faked APIs or data.
      7. Clear error messages.
      8. Appropriate logging.

      **Self-verification before declaring done:**
      - Run `git status` and `git diff --stat` in your working directory.
      - If the diff is empty, you have NOT implemented anything. Re-read the task
        and try again. Do not produce a final output until you have either (a)
        written changes that show in `git diff`, or (b) determined the task is
        provably impossible per rule 0.

      **Output (structured — all sections required):**
      - `Files modified:` — newline-separated list of paths you created or edited.
        If empty, you must include a `No-op justification:` section explaining why
        rule 0's "provably impossible" exception applies. Empty list with no
        justification = workflow failure.
      - `Diff summary:` — one line per file describing the change.
      - Complete implementation code (all files), with `# File: path/to/file.ext`
        headers.
      - Brief explanation of key decisions.
      - Any deviations from design (with justification).
    output: "implementation"

  # STEP 8c: AGENTIC WORK-VERIFIER — replaces legacy bash hollow-success guard (#615).
  # Two-step pair: work-verifier (agent→JSON verdict) + enforce-verdict (bash→exit code).
  - id: "step-08c-work-verifier"
    agent: "amplihack:analyzer"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    prompt: |
      # Step 8c: Work Verifier (agentic)

      You are the WORK VERIFIER. step-08-implement reported `STATUS: COMPLETE`.
      Decide whether that claim is supported by **concrete artifacts** and emit
      a JSON verdict on the very last line of your output. This step replaces
      the legacy six-escape-hatch bash guard — see
      https://github.com/rysweet/amplihack-rs/issues/615.

      ## Inputs
      **Original task (authoritative — judge intent against this):**
      {{task_description}}
      **Linked issue:** #{{issue_number}}
      **Implement-step output (look for `Files modified:`, `Diff summary:`,
      `No-op justification:`, and the orchestration sentinel
      `No files modified — orchestration task`):**
      {{implementation}}
      **`allow_no_op` opt-out (orchestration / docs-only / audit / meta):**
      {{allow_no_op}}

      ## Investigation (use shell tools; ALL evidence must be real)
      Be LIBERAL about WHERE work landed; STRICT about WHETHER it landed.
      Skip checks only when irrelevant; mention which you skipped and why.

      IMPORTANT: A clean working tree after a successful commit/push is
      CORRECT behavior — it means work was committed, not that no work was
      done. Prioritize git log and PR evidence over working tree state.

      1. **Local commits since branch point (PRIMARY)** —
         `git log --oneline origin/main..HEAD` (fall back to `origin/HEAD`).
         Empty commits and no-op edits do NOT count.
      2. **Already-merged-during-implement** — the agent may have committed,
         pushed, opened a scoped PR, and auto-merged into `origin/main` all
         within step-08; in that case `git merge-base HEAD origin/main` equals
         HEAD. Detect with `git fetch --quiet origin main || true`,
         `git log --oneline --since='6 hours ago' origin/main -- .`, and only
         persisted PR URL/number or `workflow_pr_scope.sh` with explicit repo,
         headRefName, baseRefName, headRefOid, isCrossRepository=false,
         expected_pr_title_prefix, created_after, and issue/work-item scope.
      3. **Sibling branches / worktrees** — `git branch -a --contains HEAD` and `git worktree list`.
      4. **Linked GitHub issue** —
         `gh issue view {{issue_number}} --json state,closedByPullRequestsReferences`
         (skip if `{{issue_number}}` is empty). If the issue is `CLOSED` by a
         merged PR whose diff matches the task, verdict = `WORK_VERIFIED`
         (this is the issue #360 case the legacy guard handled).
      5. **Scoped PR evidence** — use only a persisted PR URL/number or
         `workflow_pr_scope.sh`; `gh pr view` is acceptable only for that scoped
         PR. Zero/multiple candidates are ambiguous and do not count.
      6. **Working tree (SECONDARY)** — `git status --porcelain` and
         `git diff --stat HEAD`. Uncommitted edits and untracked files count
         as additional evidence, but a clean tree is NOT evidence of no work.
      7. **TDD/checkpoint commit evidence (issue #658)** — a fresh
         `checkpoint-after-implementation` commit from the TDD window counts
         as concrete work when it contains task-related tests or
         implementation, even when the worktree is clean. In particular,
         treat non-empty commits with the subject
         `wip: checkpoint after implementation (steps 7-8)` as valid
         evidence of committed implementation when the diff matches the task.
         This is the expected path when step-08 legitimately committed
         implementation before the verifier ran.
      8. **Intent match** — for every artifact, decide whether it actually
         relates to the task description. Empty files, comment-only changes,
         or unrelated edits do NOT count.
      9. **True no-op detection** — if there are no commits, a clean worktree,
         no related PR, no issue closure, and no TDD artifact matching the
         task, emit `HOLLOW_SUCCESS`. Do not convert a real no-op into
         `WORK_VERIFIED` merely because a branch, issue, or prior workflow run
         exists.

      ## Fast-path opt-outs (parity with legacy guard, issue #425)
      * If `allow_no_op` is the literal string `"true"` (orchestration /
        docs-only / audit / meta classification), emit `WORK_VERIFIED`
        with rationale `"orchestration opt-out — allow_no_op=true"`.
      * If the implement-step output contains the canonical sentinel
        `No files modified — orchestration task` (em-dash U+2014, exact
        match), emit `WORK_VERIFIED` with rationale
        `"orchestration sentinel matched"`.

      ## Verdicts
      * `WORK_VERIFIED` — at least one concrete artifact addresses the task.
      * `HOLLOW_SUCCESS` — no concrete artifact addresses the task. Fails the recipe.
      * `INSUFFICIENT_EVIDENCE` — investigation inconclusive (no network, ambiguous
        wording, etc). The bash gate warns loudly but lets the workflow continue,
        so use this only when you genuinely cannot decide.

      ## Output (REQUIRED)
      Write whatever investigation prose you like, then on the **very last
      line** emit a single JSON object — no code fence, no trailing text:

      {"verdict": "WORK_VERIFIED" | "HOLLOW_SUCCESS" | "INSUFFICIENT_EVIDENCE", "evidence": ["<artifact ref or SHA>", ...], "rationale": "<one paragraph>"}

      The bash gate extracts the last JSON object from your stdout. If you
      emit malformed JSON the gate treats the verdict as
      `INSUFFICIENT_EVIDENCE` (loud warning, recipe continues) so a
      verifier-formatting bug never masks a real failure.
    output: "verdict_json"

  - id: "step-08c-enforce-verdict"
    type: "bash"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    # Issue #615: maps the work-verifier's JSON verdict onto exit code.
    #
    # Fast-path opt-outs preserved from the legacy guard (issue #425):
    #   * Orchestration sentinel in implement output -> exit 0.
    #   * ALLOW_NO_OP=true (orchestration / docs-only / audit / meta) -> exit 0.
    # Both opt-outs run BEFORE parsing the verdict so callers that legitimately
    # produce no working-tree edits never get blocked, even if the verifier
    # step itself fails or is skipped.
    command: |
      set -euo pipefail
      IMPL="${IMPLEMENTATION:-}"
      VERDICT_RAW="${VERDICT_JSON:-}"

      # ----------------------------------------------------------------------
      # Fast-path opt-outs (issue #425 parity).
      # ----------------------------------------------------------------------
      _ORCH_SENTINEL='No files modified — orchestration task'
      if [ -n "$IMPL" ] && printf '%s' "$IMPL" | grep -qF -- "$_ORCH_SENTINEL"; then
        echo "INFO: step-08c-enforce-verdict orchestration opt-out — sentinel matched (issue #425)." >&2
        echo "  Skipping work-verifier verdict for orchestration / docs-only task." >&2
        exit 0
      fi
      if [ "${ALLOW_NO_OP:-false}" = "true" ]; then
        echo "INFO: step-08c-enforce-verdict orchestration opt-out — ALLOW_NO_OP=true (issue #425)." >&2
        echo "  Skipping work-verifier verdict; classification permits no working-tree edits." >&2
        exit 0
      fi

      # ----------------------------------------------------------------------
      # Parse the verifier's JSON verdict (last JSON object on stdout).
      # ----------------------------------------------------------------------
      if [ -z "$VERDICT_RAW" ]; then
        echo "WARN: step-08c-work-verifier produced no output. Treating as INSUFFICIENT_EVIDENCE per fail-safe contract (issue #615)." >&2
        echo "  Letting workflow continue with a loud warning rather than masking a possible real failure." >&2
        exit 0
      fi

      # Extract the last line that looks like a JSON object. Tolerates the
      # verifier mixing prose with the final JSON line.
      VERDICT_LINE=$(printf '%s\n' "$VERDICT_RAW" | grep -E '^[[:space:]]*\{.*"verdict"' | awk 'NF {line=$0} END {print line}' || true)
      if [ -z "$VERDICT_LINE" ]; then
        # Fall back to scanning the entire blob with jq for the first valid
        # JSON object containing a "verdict" key.
        VERDICT_LINE=$(printf '%s' "$VERDICT_RAW" | jq -c 'select(type=="object" and has("verdict"))' 2>/dev/null | awk 'NF {line=$0} END {print line}' || true)
      fi
      if [ -z "$VERDICT_LINE" ]; then
        echo "WARN: step-08c-work-verifier output did not contain a parseable JSON verdict. Treating as INSUFFICIENT_EVIDENCE (issue #615)." >&2
        echo "--- verifier stdout (truncated to 4000 bytes) ---" >&2
        printf '%s\n' "${VERDICT_RAW:0:4000}" >&2
        echo "--- end ---" >&2
        exit 0
      fi

      VERDICT=$(printf '%s' "$VERDICT_LINE" | jq -r '.verdict // "INSUFFICIENT_EVIDENCE"' 2>/dev/null || echo "INSUFFICIENT_EVIDENCE")

      # Issue #624: Normalize common LLM synonym verdicts before the case gate.
      case "$VERDICT" in
        VERIFIED|SUCCESS|APPROVED|PASS|PASSED) VERDICT="WORK_VERIFIED" ;;
        FAILED|NO_WORK|EMPTY|NO_ARTIFACTS)     VERDICT="HOLLOW_SUCCESS" ;;
        INCONCLUSIVE|UNKNOWN|UNCLEAR|PARTIAL)  VERDICT="INSUFFICIENT_EVIDENCE" ;;
      esac

      case "$VERDICT" in
        WORK_VERIFIED)
          echo "INFO: step-08c work-verifier APPROVED (issue #615)." >&2
          printf '%s\n' "$VERDICT_LINE" | jq . >&2 || printf '%s\n' "$VERDICT_LINE" >&2
          exit 0
          ;;
        INSUFFICIENT_EVIDENCE)
          echo "WARN: step-08c work-verifier returned INSUFFICIENT_EVIDENCE — letting workflow continue with a loud warning (issue #615)." >&2
          printf '%s\n' "$VERDICT_LINE" | jq . >&2 || printf '%s\n' "$VERDICT_LINE" >&2
          exit 0
          ;;
        HOLLOW_SUCCESS)
          echo "ERROR: step-08c work-verifier rejected step-08-implement with HOLLOW_SUCCESS (issue #615)." >&2
          echo "  The implement step claimed COMPLETE but the verifier could not find concrete artifacts that address the task." >&2
          printf '%s\n' "$VERDICT_LINE" | jq . >&2 || printf '%s\n' "$VERDICT_LINE" >&2
          exit 1
          ;;
        *)
          # Issue #624: Unknown verdicts fail-safe to INSUFFICIENT_EVIDENCE.
          # An LLM producing novel verdict strings should never hard-fail a
          # recipe that already has real artifacts (e.g. an open PR).
          echo "WARN: step-08c unknown verdict '$VERDICT' — fail-safe to INSUFFICIENT_EVIDENCE (issue #624)." >&2
          printf '%s\n' "$VERDICT_LINE" | jq . >&2 || printf '%s\n' "$VERDICT_LINE" >&2
          exit 0
          ;;
      esac
    output: "implementation_noop_guard"

  - id: "step-08b-integration"
    agent: "amplihack:integration"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    prompt: |
      # Step 8b: External Service Integration

      **Implementation:** {{implementation}}
      **Design Specification:** {{design_spec}}

      Handle external service connections:
      - API client implementations
      - Service adapters
      - Error handling for external calls
      - Retry logic and resilience

      Skip if no external integrations are required.
    output: "integration_code"

  - id: "checkpoint-after-implementation"
    type: "bash"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    # FIX (#4231): Limit env var size to prevent E2BIG when prior steps
    # (implementation, test_spec, design_spec) produce large outputs.
    max_env_value_bytes: 65536
    command: |
      set -euo pipefail
      export GIT_PAGER=cat
      export PAGER=cat
      export LESS=FRX
      : "${WORKTREE_SETUP_WORKTREE_PATH:=${RECIPE_VAR_worktree_setup__worktree_path:-${REPO_PATH:-}}}"
      cd "${WORKTREE_SETUP_WORKTREE_PATH:?checkpoint-after-implementation requires worktree_setup.worktree_path from step-04 (workflow-worktree); ensure parent recipe ran worktree-setup and propagated outputs}"
      if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        echo "ERROR: checkpoint-after-implementation requires a git repo at $(pwd); either \`git init\` or rerun from a checkout" >&2
        exit 1
      fi
      echo "=== Checkpoint: Staging Implementation ==="
      if [ -f Cargo.toml ] && command -v cargo >/dev/null 2>&1; then
        cargo fmt --all
      fi
      RUNTIME_ARTIFACT_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || RUNTIME_ARTIFACT_HELPER="${REPO_PATH:-$(pwd)}/amplifier-bundle/tools/workflow_runtime_artifacts.sh"
      [ -f "$RUNTIME_ARTIFACT_HELPER" ] || { echo "ERROR: workflow runtime artifact helper not found: $RUNTIME_ARTIFACT_HELPER" >&2; exit 2; }
      # shellcheck source=/dev/null
      . "$RUNTIME_ARTIFACT_HELPER"
      preflight_known_workflow_runtime_artifacts .
      amplihack hygiene artifact-guard --repo . --mode pre-publish
      GIT_IDENTITY_HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(git rev-parse --show-toplevel)}}/amplifier-bundle/tools/git-identity.sh"; [ -f "$GIT_IDENTITY_HELPER" ] || GIT_IDENTITY_HELPER="$(git rev-parse --show-toplevel)/amplifier-bundle/tools/git-identity.sh"; [ -f "$GIT_IDENTITY_HELPER" ] || { echo "ERROR: git identity helper not found: $GIT_IDENTITY_HELPER" >&2; exit 2; }; . "$GIT_IDENTITY_HELPER"
      git add -A
      STAGED=$(git diff --cached --name-only)
      if [ -n "$STAGED" ]; then
        commit_with_pre_commit_guard() {
          local pre_commit_hook
          amplihack_prepare_git_commit_identity
          pre_commit_hook="$(git rev-parse --git-path hooks/pre-commit)"
          if [ -f "$pre_commit_hook" ] && [ ! -f .pre-commit-config.yaml ]; then
            PRE_COMMIT_ALLOW_NO_CONFIG=1 git commit "$@"
          elif git commit "$@"; then
            return 0
          else
            return "$?"
          fi
        }
        commit_output_file=$(mktemp -t checkpoint-implementation-commit-XXXXXX)
        if commit_with_pre_commit_guard -m "wip: checkpoint after implementation (steps 7-8)

      Automatic checkpoint to preserve work in progress.
      Tests and implementation saved before refactoring phase." >"$commit_output_file" 2>&1; then
          cat "$commit_output_file"
          rm -f "$commit_output_file"
          echo "Checkpoint commit created with $(wc -l <<< "$STAGED") file(s)"
        else
          commit_rc=$?
          echo "ERROR: git commit failed during checkpoint-after-implementation (exit $commit_rc)" >&2
          cat "$commit_output_file" >&2
          rm -f "$commit_output_file"
          git --no-pager diff --cached --name-status >&2
          git --no-pager status --short >&2
          exit "$commit_rc"
        fi
      else
        echo "No staged changes to checkpoint"
      fi
      echo "=== Checkpoint Complete ==="
    output: "impl_checkpoint"

  - id: "implementation-terminal-evidence"
    type: "bash"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    parse_json: true
    command: |
      set -euo pipefail
      HELPER="${AMPLIHACK_HOME:-${REPO_PATH:-$(pwd)}}/amplifier-bundle/tools/workflow_implementation_evidence.sh"
      [ -f "$HELPER" ] || HELPER="${REPO_PATH:-$(pwd)}/amplifier-bundle/tools/workflow_implementation_evidence.sh"
      [ -f "$HELPER" ] || { echo "ERROR: workflow implementation evidence helper not found: $HELPER" >&2; exit 2; }
      bash "$HELPER"
    output: "implementation_terminal_evidence"
