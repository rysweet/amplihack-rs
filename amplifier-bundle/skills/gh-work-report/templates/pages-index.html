<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Work Reports</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        header {
            text-align: center;
            padding: 3rem 0 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        header h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }
        .report-list {
            list-style: none;
        }
        .report-list li {
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            transition: border-color 0.2s;
        }
        .report-list li:hover {
            border-color: var(--accent);
        }
        .report-list a {
            display: flex;
            align-items: center;
            padding: 1rem 1.25rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 1rem;
        }
        .report-list a:hover {
            color: var(--accent-hover);
        }
        .report-list a::before {
            content: '📊';
            margin-right: 0.75rem;
            font-size: 1.25rem;
        }
        .badge {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2em;
            padding: 0.2em 0.75em;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: auto;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 GitHub Work Reports</h1>
            <p>Automated activity reports across all GitHub accounts</p>
        </header>

        <main>
            <ul class="report-list">
                <!-- REPORT_LIST_START -->
                <li class="empty-state">No reports yet — reports will appear here after the first workflow run.</li>
                <!-- REPORT_LIST_END -->
            </ul>
        </main>

        <footer>
            Generated by <a href="https://github.com">gh-work-report</a> skill
        </footer>
    </div>
</body>
</html>
