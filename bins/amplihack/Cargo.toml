[package]
name = "amplihack"
description = "CLI binary for amplihack"
version.workspace = true
edition.workspace = true
license.workspace = true

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/{ name }-{ target }.tar.gz"
bin-dir = "{ bin }{ binary-ext }"
pkg-fmt = "tgz"
disabled-strategies = ["quick-install", "compile"]

[[bin]]
name = "amplihack"
path = "src/main.rs"

[dependencies]
amplihack-types = { workspace = true }
amplihack-state = { workspace = true }
amplihack-hooks = { workspace = true }
amplihack-cli = { workspace = true }
anyhow = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tempfile = { workspace = true }

[[test]]
name = "cli_launch"
path = "../../tests/integration/cli_launch_test.rs"

[[test]]
name = "cargo_lock_cxx_consistency"
path = "../../tests/integration/cargo_lock_cxx_consistency_test.rs"

# WS3: --skip-update-check flag integration tests
[[test]]
name = "skip_update_check_flag"
path = "../../tests/integration/skip_update_check_flag_test.rs"
