[package]
name = "amplihack"
description = "CLI binary for amplihack"
version.workspace = true
edition.workspace = true
license.workspace = true
default-run = "amplihack"

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/{ name }-{ target }.tar.gz"
bin-dir = "{ bin }{ binary-ext }"
pkg-fmt = "tgz"
disabled-strategies = ["quick-install", "compile"]

[[bin]]
name = "amplihack"
path = "src/main.rs"

[[bin]]
name = "scan-invisible-chars"
path = "src/bin/scan_invisible_chars.rs"

[dependencies]
amplihack-types = { workspace = true }
amplihack-state = { workspace = true }
amplihack-hooks = { workspace = true }
amplihack-cli = { workspace = true }
anyhow = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }

[dev-dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
tempfile = { workspace = true }
libc = { workspace = true }
regex = { workspace = true }
shell-words = { workspace = true }
base64 = "0.22"

