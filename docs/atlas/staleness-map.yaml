# Staleness triggers (regenerate the mapped layer when these paths change)
layers:
  repo-surface: ["Cargo.toml", "crates/*/Cargo.toml", "bins/*/Cargo.toml"]
  compile-deps: ["**/Cargo.toml"]
  runtime-topology: ["bins/*/**"]
  service-components: ["crates/*/src/**", "bins/*/src/**"]
  ast-lsp-bindings: ["crates/*/src/**"]
  api-contracts: ["crates/amplihack-cli/src/commands/**"]
  data-flow: ["crates/amplihack-state/**", "crates/amplihack-memory/**"]
  user-journeys: ["crates/amplihack-cli/src/commands/**", "crates/amplihack-hooks/**"]
