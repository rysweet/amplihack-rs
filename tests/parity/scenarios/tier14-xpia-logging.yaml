cases:
  - name: copilot-pre-tool-use-logs-allow-with-session-id
    argv: ["copilot"]
    timeout: 20
    env:
      AMPLIHACK_SKIP_UPDATE: "1"
      PATH: "${SANDBOX_ROOT}/bin:${PATH}"
    setup: |
      mkdir -p bin .claude/tools/xpia/hooks
      cp /tmp/amploxy-copilot-3336-parity-pr/.claude/tools/xpia/hooks/pre_tool_use.py .claude/tools/xpia/hooks/pre_tool_use.py
      cat > bin/copilot <<'SCRIPT'
      #!/usr/bin/env bash
      if [[ "${1:-}" == "--version" ]]; then
        echo "copilot/cli/1.0.0"
        exit 0
      fi
      if [[ "${1:-}" == "plugin" && "${2:-}" == "marketplace" && "${3:-}" == "add" ]]; then
        exit 0
      fi
      cat > "$SANDBOX_ROOT/pre-tool-input.json" <<'JSON'
      {"session_id":"test-session-custom-999","transcript_path":"/tmp/test-transcript.jsonl","cwd":".","permission_mode":"bypassPermissions","hook_event_name":"PreToolUse","tool_name":"Bash","tool_input":{"command":"echo logging_test"},"tool_use_id":"toolu_test_000"}
      JSON
      .github/hooks/pre-tool-use < "$SANDBOX_ROOT/pre-tool-input.json" > "$SANDBOX_ROOT/pre_tool_use_output.json"
      python3 - <<'PY'
      import json
      import time
      from pathlib import Path
      log_file = Path.home() / ".claude" / "logs" / "xpia" / f"rust_security_{time.strftime('%Y%m%d')}.log"
      entry = json.loads(log_file.read_text().strip().splitlines()[-1])
      summary = {
          "event_type": entry["event_type"],
          "backend": entry["backend"],
          "session_id": entry["data"]["session_id"],
          "is_valid": entry["data"]["is_valid"],
          "risk_level": entry["data"]["risk_level"],
          "threats": entry["data"]["threats"],
      }
      Path("log_summary.json").write_text(json.dumps(summary, indent=2) + "\n")
      PY
      exit 0
      SCRIPT
      chmod +x bin/copilot
    compare:
      - exit_code
      - jsonfs:pre_tool_use_output.json
      - jsonfs:log_summary.json

