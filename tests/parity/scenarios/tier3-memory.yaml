cases:
  - name: memory-tree-sqlite
    argv: ["memory", "tree", "--backend", "sqlite"]
    setup: |
      python - <<'PY'
      from datetime import datetime
      from amplihack.memory.database import MemoryDatabase
      from amplihack.memory.models import MemoryEntry, MemoryType

      db = MemoryDatabase()
      db.store_memory(
          MemoryEntry(
              id="m1",
              session_id="test_session",
              agent_id="agent_alpha",
              memory_type=MemoryType.CONVERSATION,
              title="Hello",
              content="world",
              metadata={"confidence": 0.9},
              created_at=datetime(2026, 1, 2, 3, 4, 5),
              accessed_at=datetime(2026, 1, 2, 3, 5, 5),
              importance=8,
          )
      )
      db.store_memory(
          MemoryEntry(
              id="m2",
              session_id="test_session",
              agent_id="agent_alpha",
              memory_type=MemoryType.CONTEXT,
              title="Ctx",
              content="context",
              metadata={"usage_count": 3},
              created_at=datetime(2026, 1, 2, 3, 4, 6),
              accessed_at=datetime(2026, 1, 2, 3, 4, 6),
          )
      )
      db.close()
      PY
    # Rust correctly reports "Backend: sqlite"; Python currently reports "Backend: unknown"
    # because cli_visualize falls back to "unknown" when get_capabilities() is unavailable
    # in the parity sandbox. Normalize both to a placeholder so the rest of the tree output
    # is still compared. See: rysweet/amplihack-rs#77
    stdout_normalize_patterns:
      - match: "Backend: (sqlite|unknown)"
        replace: "Backend: <backend>"
    compare: ["stdout", "stderr", "exit_code"]

