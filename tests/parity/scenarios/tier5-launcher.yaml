# Tier 5: Launcher A/B tests.
# Compares the environment and arguments passed to Claude Code
# when launched via Python vs Rust.
#
# NOTE: Most launcher tests moved to tier7-launcher-parity.yaml which has
# 18 comprehensive tests with proper timeout handling. Only tests that
# reliably pass in sandboxed environments are kept here.
#
# Master issue: rysweet/amplihack-rs#25

cases:
  # ============================================================================
  # Launcher argument passing
  # ============================================================================

  # LA2: Launch with extra args passed through
  # The fake claude filters --dangerously-skip-permissions because that flag's
  # presence/absence is a known Python-vs-Rust divergence already documented
  # and tracked by gap-launch-adds-skip-permissions in tier5-gap-tests.yaml.
  # This test validates that *user-specified* extra args pass through unchanged.
  - name: launcher-passthrough-args
    argv: ["launch", "--", "--verbose", "--model", "sonnet"]
    timeout: 15
    env:
      PATH: "${SANDBOX_ROOT}/bin:${PATH}"
      AMPLIHACK_NONINTERACTIVE: "1"
    setup: |
      mkdir -p bin
      cat > bin/claude <<'SCRIPT'
      #!/usr/bin/env bash
      # Filter out framework-injected --dangerously-skip-permissions so both
      # engines produce the same output for user-specified arg comparison.
      # The --dangerously-skip-permissions divergence (Python injects it, Rust
      # does not yet) is separately tracked in gap-launch-adds-skip-permissions.
      printf '%s\n' "$@" | grep -v '^--dangerously-skip-permissions$' > "$SANDBOX_ROOT/claude_args.txt"
      exit 0
      SCRIPT
      chmod +x bin/claude
    compare:
      - exit_code
      - fs:claude_args.txt

  # LA5: Nesting detection — second launch should detect nesting
  - name: launcher-nesting-detection
    argv: ["launch"]
    timeout: 15
    env:
      PATH: "${SANDBOX_ROOT}/bin:${PATH}"
      AMPLIHACK_NONINTERACTIVE: "1"
      AMPLIHACK_SESSION_ID: "outer-session"
      AMPLIHACK_DEPTH: "1"
    setup: |
      mkdir -p bin
      cat > bin/claude <<'SCRIPT'
      #!/usr/bin/env bash
      echo "DEPTH=$AMPLIHACK_DEPTH" > "$SANDBOX_ROOT/nesting.txt"
      echo "SESSION=$AMPLIHACK_SESSION_ID" >> "$SANDBOX_ROOT/nesting.txt"
      exit 0
      SCRIPT
      chmod +x bin/claude
    compare:
      - exit_code
      - fs:nesting.txt
